<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website PiP Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .examples {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .example-btn {
            padding: 8px 16px;
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .example-btn:hover {
            background: #667eea;
            color: white;
        }

        .viewer {
            position: relative;
            height: 600px;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .pip-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .pip-btn {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .pip-btn:hover {
            background: white;
            transform: scale(1.05);
        }

        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: white;
            text-align: center;
            padding: 40px;
        }

        .placeholder-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .info {
            padding: 20px 30px;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            margin: 20px 30px;
            border-radius: 5px;
        }

        .info strong {
            color: #856404;
        }

        .status {
            padding: 10px 30px;
            background: #d4edda;
            border-left: 4px solid #28a745;
            margin: 0 30px 20px;
            border-radius: 5px;
            display: none;
        }

        .status.error {
            background: #f8d7da;
            border-left-color: #dc3545;
        }

        /* Hidden elements for PiP */
        #pip-canvas { 
            display: none; 
        }
        
        #pip-video { 
            display: none; 
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .input-group {
                flex-direction: column;
            }

            .viewer {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Website PiP Viewer</h1>
            <p>Watch any website in Picture-in-Picture mode</p>
        </div>

        <div class="controls">
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Enter website URL (e.g., https://www.youtube.com)">
                <button class="btn-primary" id="loadBtn">Load Website</button>
            </div>

            <div class="examples">
                <button class="example-btn" data-url="https://www.youtube.com">YouTube</button>
                <button class="example-btn" data-url="https://www.twitch.tv">Twitch</button>
                <button class="example-btn" data-url="https://vimeo.com">Vimeo</button>
                <button class="example-btn" data-url="https://www.netflix.com">Netflix</button>
            </div>
        </div>

        <div class="info">
            <strong>💡 Tip:</strong> For best results, use video streaming websites. Some sites may not load due to security restrictions.
        </div>

        <div class="status" id="status"></div>

        <div class="viewer" id="viewer">
            <div class="placeholder" id="placeholder">
                <div class="placeholder-icon">📺</div>
                <h2>Enter a URL above to get started</h2>
                <p>Your website will appear here in Picture-in-Picture mode</p>
            </div>
            <iframe id="websiteFrame" style="display: none;"></iframe>
            <div class="pip-controls" id="pipControls" style="display: none;">
                <button class="pip-btn" id="pipBtn">🔲 Toggle PiP</button>
            </div>
        </div>
    </div>

    <!-- Hidden canvas and video for PiP -->
    <canvas id="pip-canvas" width="640" height="360"></canvas>
    <video id="pip-video" autoplay muted></video>

    <script>
        // Global variables
        let currentUrl = '';
        let animationFrame = null;
        let frameCount = 0;

        const pipCanvas = document.getElementById('pip-canvas');
        const pipVideo = document.getElementById('pip-video');
        const ctx = pipCanvas.getContext('2d');
        const urlInput = document.getElementById('urlInput');
        const loadBtn = document.getElementById('loadBtn');
        const pipBtn = document.getElementById('pipBtn');
        const exampleBtns = document.querySelectorAll('.example-btn');

        function showStatus(message, isError = false) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status' + (isError ? ' error' : '');
            status.style.display = 'block';
            setTimeout(() => {
                status.style.display = 'none';
            }, 5000);
        }

        function setUrl(url) {
            urlInput.value = url;
            loadWebsite();
        }

        function loadWebsite() {
            const url = urlInput.value.trim();
            
            if (!url) {
                alert('Please enter a URL');
                return;
            }

            // Add https:// if not present
            let fullUrl = url;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                fullUrl = 'https://' + url;
            }

            currentUrl = fullUrl;

            const frame = document.getElementById('websiteFrame');
            const placeholder = document.getElementById('placeholder');
            const pipControls = document.getElementById('pipControls');

            frame.src = fullUrl;
            frame.style.display = 'block';
            placeholder.style.display = 'none';
            pipControls.style.display = 'flex';

            showStatus('Website loaded! Click "Toggle PiP" to activate Picture-in-Picture mode.');
        }

        function drawCanvas() {
            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, 640, 360);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 640, 360);
            
            // Animated circles
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            for (let i = 0; i < 5; i++) {
                const x = 320 + Math.cos(frameCount * 0.02 + i) * 150;
                const y = 180 + Math.sin(frameCount * 0.02 + i) * 100;
                ctx.beginPath();
                ctx.arc(x, y, 30 + i * 10, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Text
            ctx.fillStyle = 'white';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🎬 PiP Mode Active', 320, 150);
            
            ctx.font = '20px Arial';
            const displayUrl = currentUrl.length > 40 ? currentUrl.substring(0, 40) + '...' : currentUrl;
            ctx.fillText(displayUrl || 'No website loaded', 320, 200);
            
            ctx.font = '16px Arial';
            ctx.fillText('Frame: ' + frameCount, 320, 240);
            
            frameCount++;
        }

        async function togglePiP() {
            try {
                // Exit PiP if already active
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                    if (animationFrame) {
                        cancelAnimationFrame(animationFrame);
                        animationFrame = null;
                    }
                    showStatus('PiP mode deactivated');
                    return;
                }

                // Start drawing on canvas
                function animate() {
                    drawCanvas();
                    animationFrame = requestAnimationFrame(animate);
                }
                animate();

                // Capture canvas stream
                const stream = pipCanvas.captureStream(30);
                pipVideo.srcObject = stream;
                
                // Wait for video to be ready
                await pipVideo.play();
                
                // Request PiP
                await pipVideo.requestPictureInPicture();
                
                showStatus('✅ PiP mode activated! You can now move the window around.');
                
                // Handle PiP close
                pipVideo.addEventListener('leavepictureinpicture', () => {
                    if (animationFrame) {
                        cancelAnimationFrame(animationFrame);
                        animationFrame = null;
                    }
                    showStatus('PiP mode closed');
                }, { once: true });
                
            } catch (error) {
                console.error('PiP error:', error);
                showStatus('❌ PiP mode failed: ' + error.message, true);
            }
        }

        // Event listeners
        loadBtn.addEventListener('click', loadWebsite);
        pipBtn.addEventListener('click', togglePiP);

        exampleBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                const url = this.getAttribute('data-url');
                setUrl(url);
            });
        });

        urlInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loadWebsite();
            }
        });
    </script>
</body>
</html>
