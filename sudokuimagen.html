<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudoku Image Generator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 32px 20px; }
.app { max-width: 560px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 28px; letter-spacing: -0.3px; }
h1 span { color: #7c6cfc; }

.section { margin-bottom: 22px; }
.label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 8px; display: block; }

input[type="text"] {
  width: 100%; padding: 10px 14px; background: #0f0f1a; border: 1px solid #333;
  color: #e0e0e0; font-size: 13px; font-family: 'Courier New', monospace;
  border-radius: 6px; outline: none; letter-spacing: 0.05em;
  transition: border-color 0.15s;
}
input[type="text"]:focus { border-color: #7c6cfc; }
input[type="text"].valid { border-color: #3b6d11; }
input[type="text"].invalid { border-color: #a32d2d; }

.char-hint { font-size: 11px; font-family: 'Courier New', monospace; color: #555; margin-top: 5px; }
.char-hint.ok { color: #639922; }
.char-hint.err { color: #e24b4a; }

.gen-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }

select, input[type="number"] {
  width: 100%; padding: 8px 10px; background: #0f0f1a; border: 1px solid #333;
  color: #e0e0e0; font-size: 13px; border-radius: 6px; outline: none;
  transition: border-color 0.15s; font-family: inherit;
}
select:focus, input[type="number"]:focus { border-color: #7c6cfc; }

.btn-fill {
  width: 100%; padding: 9px; background: #1e1e3a; border: 1px solid #7c6cfc;
  color: #a89eff; font-size: 13px; border-radius: 6px; cursor: pointer;
  font-family: inherit; transition: background 0.15s;
}
.btn-fill:hover { background: #2a2a50; }

.divider { border: none; border-top: 1px solid #222; margin: 24px 0; }

.size-row { display: flex; align-items: center; gap: 14px; }
input[type="range"] {
  flex: 1; accent-color: #7c6cfc; height: 4px; cursor: pointer;
}
.size-val { font-size: 13px; font-family: 'Courier New', monospace; color: #aaa; min-width: 52px; }

.btn-gen {
  width: 100%; padding: 13px; background: #7c6cfc; border: none;
  color: #fff; font-size: 15px; font-weight: 600; border-radius: 8px;
  cursor: pointer; margin-top: 24px; font-family: inherit;
  transition: background 0.15s, opacity 0.15s;
}
.btn-gen:hover { background: #6a5ae0; }
.btn-gen:disabled { opacity: 0.4; cursor: default; }

.preview { margin-top: 28px; display: none; }
.preview canvas { display: block; max-width: 100%; border-radius: 6px; border: 1px solid #333; }
.btn-dl {
  display: block; width: 100%; margin-top: 12px; padding: 10px;
  background: #0f0f1a; border: 1px solid #444; color: #ccc;
  font-size: 13px; border-radius: 6px; cursor: pointer; font-family: inherit;
  transition: border-color 0.15s, color 0.15s;
}
.btn-dl:hover { border-color: #7c6cfc; color: #a89eff; }

.err-msg { font-size: 12px; color: #e24b4a; margin-top: 8px; display: none; }
</style>
</head>
<body>
<div class="app">
  <h1>Sudoku <span>Image Generator</span></h1>

  <div class="section">
    <span class="label">Puzzle string (81 digits, 0 = empty)</span>
    <input type="text" id="puzzle-input" maxlength="81"
      placeholder="530070000600195000098000060800060003..."
      oninput="onPuzzleInput()">
    <div class="char-hint" id="char-hint">0 / 81</div>
  </div>

  <div class="section">
    <span class="label">Or generate one</span>
    <div class="gen-row">
      <div>
        <select id="diff">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
          <option value="impossible">Impossible</option>
        </select>
      </div>
      <div>
        <input type="number" id="clues" value="40" min="17" max="81" placeholder="Clues">
      </div>
      <div>
        <button class="btn-fill" id="btn-fill" onclick="fillFromAPI()">Fill ↓</button>
      </div>
    </div>
    <div class="err-msg" id="api-err">Could not reach the API. Try again.</div>
  </div>

  <hr class="divider">

  <div class="section">
    <span class="label">Image size</span>
    <div class="size-row">
      <input type="range" id="size" min="200" max="1200" step="50" value="540"
        oninput="document.getElementById('size-val').textContent = this.value + ' px'">
      <span class="size-val" id="size-val">540 px</span>
    </div>
  </div>

  <button class="btn-gen" id="btn-gen" onclick="generateImage()" disabled>Generate image</button>

  <div class="preview" id="preview">
    <canvas id="canvas"></canvas>
    <button class="btn-dl" onclick="download()">Download PNG</button>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbyUr2PcBtci1rhIIdD4bfLF5nqDd4ffIbNzBvsfbwEJbxuZk7C8oqGr2eSFKnX8l4uC/exec';

function onPuzzleInput() {
  const v = document.getElementById('puzzle-input').value.replace(/\s/g,'');
  const hint = document.getElementById('char-hint');
  hint.textContent = v.length + ' / 81';
  hint.className = 'char-hint' + (v.length === 81 ? ' ok' : v.length > 81 ? ' err' : '');
  const inp = document.getElementById('puzzle-input');
  inp.className = v.length === 81 ? 'valid' : v.length > 0 ? 'invalid' : '';
  document.getElementById('btn-gen').disabled = v.length !== 81;
}

async function fillFromAPI() {
  const btn = document.getElementById('btn-fill');
  const errEl = document.getElementById('api-err');
  errEl.style.display = 'none';
  btn.textContent = '...';
  btn.disabled = true;

  const diff = document.getElementById('diff').value;
  const clues = parseInt(document.getElementById('clues').value) || 40;

  try {
    let params;
    if (diff === 'impossible') {
      params = { method: 'generate', impossible: 1, clues, count: 1 };
    } else {
      const ranges = { easy: [0, 0.33], medium: [0.33, 0.67], hard: [0.67, 1.0] };
      const [min, max] = ranges[diff];
      params = { method: 'generate', min, max, clues, count: 1 };
    }
    const url = API + '?' + new URLSearchParams(params).toString();
    const r = await fetch(url);
    const data = await r.json();
    const puzzle = Array.isArray(data.puzzles) ? data.puzzles[0] : data.puzzle;
    if (!puzzle) throw new Error('No puzzle');
    document.getElementById('puzzle-input').value = puzzle;
    onPuzzleInput();
  } catch(e) {
    errEl.style.display = 'block';
  }

  btn.textContent = 'Fill ↓';
  btn.disabled = false;
}

function generateImage() {
  const puzzle = document.getElementById('puzzle-input').value.replace(/\s/g,'');
  if (puzzle.length !== 81) return;

  const size = parseInt(document.getElementById('size').value);
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  const PAD = Math.round(size * 0.04);
  const GRID = size - PAD * 2;
  const CELL = GRID / 9;

  canvas.width = size;
  canvas.height = size;

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, size, size);

  ctx.strokeStyle = '#cccccc';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 9; i++) {
    ctx.beginPath();
    ctx.moveTo(PAD + i * CELL, PAD);
    ctx.lineTo(PAD + i * CELL, PAD + GRID);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(PAD, PAD + i * CELL);
    ctx.lineTo(PAD + GRID, PAD + i * CELL);
    ctx.stroke();
  }

  ctx.strokeStyle = '#222222';
  ctx.lineWidth = Math.max(1, size * 0.004);
  for (let b = 0; b <= 3; b++) {
    ctx.beginPath();
    ctx.moveTo(PAD + b * 3 * CELL, PAD);
    ctx.lineTo(PAD + b * 3 * CELL, PAD + GRID);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(PAD, PAD + b * 3 * CELL);
    ctx.lineTo(PAD + GRID, PAD + b * 3 * CELL);
    ctx.stroke();
  }

  ctx.strokeStyle = '#111111';
  ctx.lineWidth = Math.max(2, size * 0.006);
  ctx.strokeRect(PAD, PAD, GRID, GRID);

  const fontSize = Math.round(CELL * 0.52);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `bold ${fontSize}px Georgia, serif`;
  ctx.fillStyle = '#111111';

  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      const v = puzzle[r * 9 + c];
      if (v && v !== '0') {
        ctx.fillText(v, PAD + c * CELL + CELL / 2, PAD + r * CELL + CELL / 2);
      }
    }
  }

  document.getElementById('preview').style.display = 'block';
  canvas.style.width = Math.min(size, 540) + 'px';
  canvas.style.height = Math.min(size, 540) + 'px';
}

function download() {
  const puzzle = document.getElementById('puzzle-input').value.replace(/\s/g,'').slice(0,81);
  const canvas = document.getElementById('canvas');
  const a = document.createElement('a');
  a.download = 'sudoku.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
