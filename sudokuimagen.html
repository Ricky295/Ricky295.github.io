
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudoku Stitcher</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 32px 20px; }
.app { max-width: 560px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 24px; letter-spacing: -0.3px; }
h1 span { color: #7c6cfc; }
.label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 8px; display: block; }
.section { margin-bottom: 20px; }

input[type="text"] {
  width: 100%; padding: 10px 14px; background: #0f0f1a; border: 1px solid #333;
  color: #e0e0e0; font-size: 13px; font-family: 'Courier New', monospace;
  border-radius: 6px; outline: none; letter-spacing: 0.05em; transition: border-color 0.15s;
}
input[type="text"]:focus { border-color: #7c6cfc; }
input[type="text"].valid { border-color: #3b6d11; }
input[type="text"].invalid { border-color: #a32d2d; }
.char-hint { font-size: 11px; font-family: 'Courier New', monospace; color: #555; margin-top: 5px; }
.char-hint.ok { color: #639922; }
.char-hint.err { color: #e24b4a; }

.gen-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
select, input[type="number"] {
  width: 100%; padding: 8px 10px; background: #0f0f1a; border: 1px solid #333;
  color: #e0e0e0; font-size: 13px; border-radius: 6px; outline: none; font-family: inherit;
  transition: border-color 0.15s;
}
select:focus, input[type="number"]:focus { border-color: #7c6cfc; }

.btn-fill {
  width: 100%; padding: 8px 6px; background: #1e1e3a; border: 1px solid #7c6cfc;
  color: #a89eff; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: inherit;
  transition: background 0.15s; white-space: nowrap;
}
.btn-fill:hover { background: #2a2a50; }
.btn-fill:disabled { opacity: 0.5; cursor: default; }

.divider { border: none; border-top: 1px solid #222; margin: 22px 0; }

.size-row { display: flex; align-items: center; gap: 14px; }
input[type="range"] { flex: 1; accent-color: #7c6cfc; cursor: pointer; }
.size-val { font-size: 13px; font-family: 'Courier New', monospace; color: #aaa; min-width: 56px; }

.btn-gen {
  width: 100%; padding: 13px; background: #7c6cfc; border: none; color: #fff;
  font-size: 15px; font-weight: 600; border-radius: 8px; cursor: pointer;
  margin-top: 8px; font-family: inherit; transition: background 0.15s, opacity 0.15s;
}
.btn-gen:hover { background: #6a5ae0; }
.btn-gen:disabled { opacity: 0.4; cursor: default; }

.preview { margin-top: 28px; display: none; }
.preview canvas { display: block; max-width: 100%; border-radius: 6px; border: 1px solid #333; }
.btn-dl {
  display: block; width: 100%; margin-top: 12px; padding: 10px;
  background: #0f0f1a; border: 1px solid #444; color: #ccc; font-size: 13px;
  border-radius: 6px; cursor: pointer; font-family: inherit; transition: border-color 0.15s, color 0.15s;
}
.btn-dl:hover { border-color: #7c6cfc; color: #a89eff; }
.gen-status { font-size: 12px; font-family: 'Courier New', monospace; color: #7c6cfc; margin-top: 8px; min-height: 16px; }

/* --- multi-sudoku list --- */
.list-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.list-head h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: #888; font-weight: 600; }
.btn-add {
  padding: 7px 14px; background: #7c6cfc; border: none; color: #fff; font-size: 13px;
  font-weight: 600; border-radius: 6px; cursor: pointer; font-family: inherit; transition: background 0.15s;
}
.btn-add:hover { background: #6a5ae0; }

.card {
  background: #15152a; border: 1px solid #2a2a45; border-radius: 10px;
  padding: 18px; margin-bottom: 16px;
}
.card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-title { font-size: 14px; font-weight: 600; color: #fff; }
.btn-remove {
  background: none; border: 1px solid #4a2b2b; color: #d17070; font-size: 11px;
  padding: 5px 10px; border-radius: 5px; cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.btn-remove:hover { background: #2a1515; border-color: #a32d2d; }
.btn-remove:disabled { opacity: 0.3; cursor: default; }

.thumb-wrap { margin-top: 12px; text-align: center; }
.thumb-wrap canvas { max-width: 140px; border-radius: 4px; border: 1px solid #333; }

.global-size { margin: 28px 0 8px 0; }
</style>
</head>
<body>
<div class="app">
  <h1>Sudoku <span>Stitcher</span></h1>

  <div class="list-head">
    <h2 id="list-count">Sudokus list (1)</h2>
    <button class="btn-add" onclick="addCard()">+ Add</button>
  </div>

  <div id="cards"></div>

  <div class="global-size">
    <span class="label">Combined image width</span>
    <div class="size-row">
      <input type="range" id="global-size" min="200" max="1600" step="10" value="540"
        oninput="document.getElementById('global-size-val').textContent = this.value + ' px'; scheduleAutoUpdate();">
      <span class="size-val" id="global-size-val">540 px</span>
    </div>
  </div>

  <button class="btn-gen" id="btn-gen" onclick="generateStitchedImage()">Generate stitched image</button>

  <div class="preview" id="preview">
    <canvas id="canvas"></canvas>
    <button class="btn-dl" onclick="download()">Download PNG</button>
  </div>
</div>

<script>
// ── newsudoku.js (bundled, unchanged core generator logic) ─────────────────

function convertToMatrix(sudokuString) {
    if (sudokuString.length !== 81) throw new Error("Sudoku string must be exactly 81 characters long.");
    const matrix = [];
    for (let i = 0; i < 9; i++) {
        const row = Array.from(sudokuString.substring(i*9,(i+1)*9), c => parseInt(c));
        matrix.push(row);
    }
    return matrix;
}
function range1To9() { return [1,2,3,4,5,6,7,8,9]; }
function shuffle(array) {
    for (let i = array.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [array[i],array[j]] = [array[j],array[i]];
    }
    return array;
}
function deepCopyBoard(board) { return board.map(row => [...row]); }
function convertToString(array) { return array.flat().join(''); }

function solveGridRandomBacktracking(grid) {
    for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
            if (grid[r][c] === 0) {
                const nums = shuffle(range1To9());
                for (const num of nums) {
                    let ok = !grid[r].includes(num);
                    if (ok) for (let i = 0; i < 9; i++) if (grid[i][c] === num) { ok=false; break; }
                    if (ok) {
                        const sr = Math.floor(r/3)*3, sc = Math.floor(c/3)*3;
                        outer: for (let rb = sr; rb < sr+3; rb++) for (let cb = sc; cb < sc+3; cb++) if (grid[rb][cb] === num) { ok=false; break outer; }
                    }
                    if (ok) {
                        grid[r][c] = num;
                        if (solveGridRandomBacktracking(grid)) return true;
                        grid[r][c] = 0;
                    }
                }
                return false;
            }
        }
    }
    return true;
}
function generateSolutionRandom() {
    const s = Array(9).fill(null).map(() => Array(9).fill(0));
    solveGridRandomBacktracking(s);
    return s;
}
function getPossibleValues(board, row, col) {
    if (board[row][col] !== 0) return [];
    const used = new Set();
    for (let c = 0; c < 9; c++) used.add(board[row][c]);
    for (let r = 0; r < 9; r++) used.add(board[r][col]);
    const sr = Math.floor(row/3)*3, sc = Math.floor(col/3)*3;
    for (let r = sr; r < sr+3; r++) for (let c = sc; c < sc+3; c++) used.add(board[r][c]);
    return range1To9().filter(n => !used.has(n));
}
function eliminatePossibilities(possibilities, rP, cP, val, puzzle) {
    let contra = false;
    for (let i = 0; i < 9; i++) {
        if (possibilities[rP][i].has(val)) { possibilities[rP][i].delete(val); if (!possibilities[rP][i].size && puzzle[rP][i]===0) contra=true; }
        if (possibilities[i][cP].has(val)) { possibilities[i][cP].delete(val); if (!possibilities[i][cP].size && puzzle[i][cP]===0) contra=true; }
    }
    const sr = Math.floor(rP/3)*3, sc = Math.floor(cP/3)*3;
    for (let r = sr; r < sr+3; r++) for (let c = sc; c < sc+3; c++) {
        if (possibilities[r][c].has(val)) { possibilities[r][c].delete(val); if (!possibilities[r][c].size && puzzle[r][c]===0) contra=true; }
    }
    return contra;
}
function findHiddenSingles(puzzle, possibilities, unitType, unitIndex) {
    const updates = [];
    const cells = [];
    if (unitType==='row') for (let c=0;c<9;c++) cells.push([unitIndex,c]);
    else if (unitType==='col') for (let r=0;r<9;r++) cells.push([r,unitIndex]);
    else { const sr=Math.floor(unitIndex/3)*3, sc=(unitIndex%3)*3; for (let r=sr;r<sr+3;r++) for (let c=sc;c<sc+3;c++) cells.push([r,c]); }
    for (const val of range1To9()) {
        let found = null, count = 0;
        for (const [r,c] of cells) {
            if (puzzle[r][c]===0 && possibilities[r][c].has(val)) { count++; found=[r,c]; }
        }
        if (count===1) updates.push([found[0],found[1],val]);
    }
    return updates;
}
function findNakedSingles(puzzle, possibilities) {
    const updates = [];
    for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
        if (puzzle[r][c]===0 && possibilities[r][c].size===1) updates.push([r,c,[...possibilities[r][c]][0]]);
    }
    return updates;
}
function findAndApplyUpdates(type, puzzle, possibilities, empty) {
    let updates = [];
    if (type==='BoxHS') for (let b=0;b<9;b++) updates=updates.concat(findHiddenSingles(puzzle,possibilities,'box',b));
    else if (type==='LineHS') for (let i=0;i<9;i++) { updates=updates.concat(findHiddenSingles(puzzle,possibilities,'row',i)); updates=updates.concat(findHiddenSingles(puzzle,possibilities,'col',i)); }
    else if (type==='NakedSingle') updates=findNakedSingles(puzzle,possibilities);
    if (!updates.length) return [empty,false];
    const seen=new Set(), uniq=[];
    for (const u of updates) { const k=u.join(','); if(!seen.has(k)){seen.add(k);uniq.push(u);} }
    let contra=false;
    for (const [r,c,val] of uniq) if (puzzle[r][c]===0) { puzzle[r][c]=val; empty--; if(eliminatePossibilities(possibilities,r,c,val,puzzle)) contra=true; possibilities[r][c]=new Set(); }
    return [empty,contra];
}
function solveWithSingles(sudoku, returnDifficulty=false) {
    const puzzle=deepCopyBoard(sudoku);
    const initEmpty=puzzle.flat().filter(x=>x===0).length;
    let highestTechnique=0;
    if (!initEmpty) return returnDifficulty?0.0:puzzle;
    const poss=Array(9).fill(null).map(()=>Array(9).fill(null).map(()=>new Set()));
    let empty=0;
    for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
        if (puzzle[r][c]===0) { poss[r][c]=new Set(getPossibleValues(puzzle,r,c)); if(!poss[r][c].size) return returnDifficulty?-0.2:sudoku; empty++; }
        else poss[r][c]=new Set();
    }
    let steps=0,contra=false;
    while (empty>0) {
        const before=empty;
        [empty,contra]=findAndApplyUpdates('BoxHS',puzzle,poss,empty);
        if(contra) break; if(empty<before){steps++;continue;}
        highestTechnique=Math.max(1,highestTechnique);
        const b2=empty;
        [empty,contra]=findAndApplyUpdates('LineHS',puzzle,poss,empty);
        if(contra) break; if(empty<b2){steps++;continue;}
        highestTechnique=2;
        const b3=empty;
        [empty,contra]=findAndApplyUpdates('NakedSingle',puzzle,poss,empty);
        if(contra) break; if(empty<b3){steps++;continue;}
        break;
    }
    if (contra) return returnDifficulty?-0.2:sudoku;
    if (empty===0) { const d=initEmpty>0?steps/initEmpty:0; return returnDifficulty?(d+highestTechnique)/3:puzzle; }
    return returnDifficulty?-0.1:sudoku;
}
function generateSudoku(minD, maxD, targetClues=25) {
    while (true) {
        const solution=generateSolutionRandom();
        const puzzle=deepCopyBoard(solution);
        const positions=[];
        for (let r=0;r<9;r++) for (let c=0;c<9;c++) positions.push([r,c]);
        shuffle(positions);
        let clues=81;
        for (const [r,c] of positions) {
            if (clues<=targetClues) break;
            const orig=puzzle[r][c]; puzzle[r][c]=0;
            const d=solveWithSingles(puzzle,true);
            if (d<0) puzzle[r][c]=orig;
            else { clues--; if(clues<=targetClues && d>=minD && d<=maxD) return puzzle; }
        }
        const fd=solveWithSingles(puzzle,true);
        if (fd>=minD && fd<=maxD && clues<=targetClues+5) return puzzle;
    }
}
function seededRandom(seed) { let s=seed; return ()=>{ s=Math.sin(s)*10000; return s-Math.floor(s); }; }
function hashCode(str) { let h=0; for (let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h=h&h;} return Math.abs(h); }
function generateDailySudoku(date, offset=0) {
    const seed=hashCode(date.toISOString().split('T')[0] + (offset ? ('#'+offset) : ''));
    const orig=Math.random; Math.random=seededRandom(seed);
    const puzzle=generateSudoku(0.3,0.7,30);
    Math.random=orig; return puzzle;
}

// ── App logic: multi-card management ────────────────────────────────────────

let cardIdCounter = 0;
const cards = []; // { id, puzzleStr }

function addCard(prefill) {
    cardIdCounter++;
    const id = cardIdCounter;
    cards.push({ id, puzzleStr: prefill || '' });
    renderCards();
}

function removeCard(id) {
    const idx = cards.findIndex(c => c.id === id);
    if (idx === -1) return;
    cards.splice(idx, 1);
    renderCards();
}

function renderCards() {
    const container = document.getElementById('cards');
    container.innerHTML = '';
    document.getElementById('list-count').textContent = `Sudokus list (${cards.length})`;

    cards.forEach((card, i) => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
          <div class="card-head">
            <span class="card-title">Sudoku #${i+1}</span>
            <button class="btn-remove" ${cards.length<=1?'disabled':''} onclick="removeCard(${card.id})">Remove</button>
          </div>
          <div class="section">
            <span class="label">Puzzle string — 81 digits, 0 = empty</span>
            <input type="text" id="puzzle-input-${card.id}" maxlength="81"
              placeholder="530070000600195000098000060800060003..."
              value="${card.puzzleStr}"
              oninput="onPuzzleInput(${card.id})">
            <div class="char-hint" id="char-hint-${card.id}">${card.puzzleStr.length} / 81</div>
          </div>
          <div class="section" style="margin-bottom:0;">
            <span class="label">Generate</span>
            <div class="gen-row">
              <select id="diff-${card.id}">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
              </select>
              <input type="number" id="clues-${card.id}" value="40" min="17" max="60" title="Target clues">
              <button class="btn-fill" id="btn-fill-${card.id}" onclick="fillFromLib(${card.id})">Generate</button>
              <button class="btn-fill" id="btn-daily-${card.id}" onclick="fillDaily(${card.id})">Daily</button>
            </div>
            <div class="gen-status" id="gen-status-${card.id}"></div>
          </div>
        `;
        container.appendChild(div);
    });
}

function getCard(id) { return cards.find(c => c.id === id); }

function onPuzzleInput(id) {
    const input = document.getElementById(`puzzle-input-${id}`);
    const v = input.value.replace(/\s/g,'');
    const hint = document.getElementById(`char-hint-${id}`);
    hint.textContent = v.length + ' / 81';
    hint.className = 'char-hint' + (v.length===81?' ok':v.length>81?' err':'');
    input.className = v.length===81?'valid':v.length>0?'invalid':'';
    getCard(id).puzzleStr = v;
}

function setStatus(id, msg) { document.getElementById(`gen-status-${id}`).textContent = msg; }

function fillFromLib(id) {
    const btn = document.getElementById(`btn-fill-${id}`);
    const btn2 = document.getElementById(`btn-daily-${id}`);
    btn.disabled = btn2.disabled = true;
    btn.textContent = 'Working...';
    setStatus(id, 'Generating puzzle...');

    const diff = document.getElementById(`diff-${id}`).value;
    const clues = parseInt(document.getElementById(`clues-${id}`).value) || 40;
    const ranges = { easy:[0,0.33], medium:[0.33,0.67], hard:[0.67,1.0] };
    const [minD, maxD] = ranges[diff];

    setTimeout(() => {
        const puzzle = generateSudoku(minD, maxD, clues);
        const str = convertToString(puzzle);
        document.getElementById(`puzzle-input-${id}`).value = str;
        setStatus(id, 'Done — ' + str.split('').filter(c=>c!=='0').length + ' clues');
        onPuzzleInput(id);
        btn.textContent = 'Generate';
        btn.disabled = btn2.disabled = false;
    }, 10);
}

function fillDaily(id) {
    const btn = document.getElementById(`btn-fill-${id}`);
    const btn2 = document.getElementById(`btn-daily-${id}`);
    btn.disabled = btn2.disabled = true;
    btn2.textContent = '...';
    setStatus(id, 'Generating daily puzzle...');

    // Each card's daily puzzle offset by its position so multiple dailies in one stitch differ
    const idx = cards.findIndex(c => c.id === id);

    setTimeout(() => {
        const puzzle = generateDailySudoku(new Date(), idx);
        const str = convertToString(puzzle);
        document.getElementById(`puzzle-input-${id}`).value = str;
        setStatus(id, "Today's puzzle — " + str.split('').filter(c=>c!=='0').length + ' clues');
        onPuzzleInput(id);
        btn2.textContent = 'Daily';
        btn.disabled = btn2.disabled = false;
    }, 10);
}

// ── Drawing a single sudoku onto a given context/region ─────────────────────

function drawSudokuAt(ctx, puzzleStr, x, y, size) {
    const PAD = Math.round(size * 0.04);
    const GRID = size - PAD * 2;
    const CELL = GRID / 9;

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x, y, size, size);

    ctx.strokeStyle = '#cccccc';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= 9; i++) {
        ctx.beginPath(); ctx.moveTo(x+PAD+i*CELL, y+PAD); ctx.lineTo(x+PAD+i*CELL, y+PAD+GRID); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x+PAD, y+PAD+i*CELL); ctx.lineTo(x+PAD+GRID, y+PAD+i*CELL); ctx.stroke();
    }

    ctx.strokeStyle = '#222222';
    ctx.lineWidth = Math.max(1, size*0.004);
    for (let b = 0; b <= 3; b++) {
        ctx.beginPath(); ctx.moveTo(x+PAD+b*3*CELL, y+PAD); ctx.lineTo(x+PAD+b*3*CELL, y+PAD+GRID); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x+PAD, y+PAD+b*3*CELL); ctx.lineTo(x+PAD+GRID, y+PAD+b*3*CELL); ctx.stroke();
    }

    ctx.strokeStyle = '#111111';
    ctx.lineWidth = Math.max(2, size*0.006);
    ctx.strokeRect(x+PAD, y+PAD, GRID, GRID);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `bold ${Math.round(CELL*0.52)}px Georgia, serif`;
    ctx.fillStyle = '#111111';

    for (let r = 0; r < 9; r++) for (let c = 0; c < 9; c++) {
        const v = puzzleStr[r*9+c];
        if (v && v!=='0') ctx.fillText(v, x+PAD+c*CELL+CELL/2, y+PAD+r*CELL+CELL/2);
    }
}

function generateStitchedImage() {
    const valid = cards.filter(c => c.puzzleStr.length === 81);
    if (!valid.length) {
        alert('At least one sudoku needs a full 81-digit puzzle string before generating.');
        return;
    }

    const width = parseInt(document.getElementById('global-size').value);

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const n = valid.length;
    const totalHeight = n * width;

    canvas.width = width;
    canvas.height = totalHeight;

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, width, totalHeight);

    valid.forEach((card, i) => {
        drawSudokuAt(ctx, card.puzzleStr, 0, i * width, width);
    });

    const preview = document.getElementById('preview');
    preview.style.display = 'block';
    const displayW = Math.min(width, 540);
    const scale = displayW / width;
    canvas.style.width = displayW + 'px';
    canvas.style.height = Math.round(totalHeight * scale) + 'px';
}

function download() {
    const a = document.createElement('a');
    a.download = 'sudoku-stitched.png';
    a.href = document.getElementById('canvas').toDataURL('image/png');
    a.click();
}

let autoUpdateTimer = null;
function scheduleAutoUpdate() {
    // Only auto-refresh if a preview already exists, so first generation is explicit
    if (document.getElementById('preview').style.display !== 'block') return;
    clearTimeout(autoUpdateTimer);
    autoUpdateTimer = setTimeout(generateStitchedImage, 150);
}

// Init with one card
addCard();
</script>
</body>
</html>
