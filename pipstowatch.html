<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiP Stopwatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        #timer-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        #display { flex: 1; display: flex; justify-content: center; align-items: center; font-size: 20vw; font-weight: 800; font-variant-numeric: tabular-nums; }
        .controls { display: flex; height: 30vh; gap: 20px; }
        button { flex: 1; font-size: 3rem; font-weight: bold; border-radius: 1rem; cursor: pointer; border: none; transition: all 0.1s; display: flex; justify-content: center; align-items: center; }
        button:active { transform: scale(0.98); opacity: 0.9; }
        #canvas-capture { display: none; }
    </style>
</head>
<body>

<canvas id="canvas-capture" width="640" height="360"></canvas>
<video id="video-stream" muted autoplay playsinline style="display:none"></video>

<div id="timer-container">
    <div id="display">00:00.00</div>
    <div class="controls">
        <button id="toggleBtn" class="bg-green-600 hover:bg-green-500 text-white">Start</button>
        <button id="resetBtn" class="bg-gray-700 hover:bg-gray-600 text-white">Reset</button>
        <button id="pipBtn" class="bg-blue-600 hover:bg-blue-500 text-white">Pop Out</button>
    </div>
</div>

<script>
    let startTime, elapsedTime = 0, timerInterval;
    const display = document.getElementById('display');
    const toggleBtn = document.getElementById('toggleBtn');
    const canvas = document.getElementById('canvas-capture');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('video-stream');

    function formatTime(ms) {
        let totalSeconds = Math.floor(ms / 1000);
        let minutes = Math.floor(totalSeconds / 60);
        let seconds = totalSeconds % 60;
        let centiseconds = Math.floor((ms % 1000) / 10);
        return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${String(centiseconds).padStart(2, '0')}`;
    }

    // Function to keep the canvas updated for the PiP stream
    function updateCanvas() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "80px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(display.innerText, canvas.width/2, canvas.height/2 + 20);
        requestAnimationFrame(updateCanvas);
    }
    updateCanvas();

    toggleBtn.addEventListener('click', () => {
        if (!timerInterval) {
            startTime = Date.now() - elapsedTime;
            timerInterval = setInterval(() => {
                elapsedTime = Date.now() - startTime;
                display.innerText = formatTime(elapsedTime);
            }, 10);
            toggleBtn.innerText = "Stop";
            toggleBtn.className = "bg-red-600 hover:bg-red-500 text-white flex-1";
        } else {
            clearInterval(timerInterval);
            timerInterval = null;
            toggleBtn.innerText = "Start";
            toggleBtn.className = "bg-green-600 hover:bg-green-500 text-white flex-1";
        }
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
        clearInterval(timerInterval);
        timerInterval = null;
        elapsedTime = 0;
        display.innerText = "00:00.00";
        toggleBtn.innerText = "Start";
        toggleBtn.className = "bg-green-600 hover:bg-green-500 text-white flex-1";
    });

    document.getElementById('pipBtn').addEventListener('click', async () => {
        const stream = canvas.captureStream(30);
        video.srcObject = stream;
        try {
            await video.requestPictureInPicture();
        } catch (err) {
            console.error("PiP failed: ", err);
            alert("Picture-in-Picture is not supported in this browser or environment.");
        }
    });
</script>
</body>
</html>
