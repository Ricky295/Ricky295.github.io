<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudoku Advent Calendar</title>
<style>
:root {
    --primary: #667eea;
    --secondary: #764ba2;
    --success: #8bc34a;
    --danger: #ff5252;
    --gold: #ffd700;
    --silver: #c0c0c0;
    --bronze: #cd7f32;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --panel-bg: rgba(255, 255, 255, 0.9);
    --highlight-bg: #e2e8f0;
    --same-num-bg: #cbd5e1;
}
body.dark {
    --card-bg: #16213e;
    --text: #e8e8e8;
    --panel-bg: rgba(15, 52, 96, 0.95);
    --highlight-bg: #2d3748;
    --same-num-bg: #4a5568;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 10px;
    transition: all 0.3s;
    color: var(--text);
}
body.dark { background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%); }

.dashboard {
    display: flex;
    width: 100%;
    max-width: 1100px;
    height: 90vh;
    background: var(--panel-bg);
    border-radius: 30px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    overflow: hidden;
    backdrop-filter: blur(10px);
}
.hero-side {
    flex: 1;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border-right: 1px solid rgba(0,0,0,0.1);
}
body.dark .hero-side { border-right: 1px solid rgba(255,255,255,0.1); }
.date-display h1 { font-size: 3.5rem; margin-bottom: 10px; }
.countdown { font-size: 1.5rem; opacity: 0.8; font-weight: 300; }
.level-system { margin-top: auto; }
.level-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; }
.progress-container { height: 35px; background: rgba(0,0,0,0.1); border-radius: 10px; overflow: hidden; position: relative; border: 2px solid var(--text); }
.progress-bar { height: 100%; background: var(--success); width: 0%; transition: width 1s ease-out; }

.grid-side {
    flex: 1.2;
    padding: 40px;
    overflow-y: auto;
    background: rgba(255,255,255,0.3);
    scroll-behavior: smooth;
}
body.dark .grid-side { background: rgba(0,0,0,0.1); }

.year-section { margin-bottom: 50px; }
.year-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 15px;
    border-bottom: 2px solid var(--text);
    padding-bottom: 10px;
}
.year-title { font-size: 2rem; font-weight: 800; }
.year-points { font-weight: bold; opacity: 0.8; }
.bonus-math { color: var(--success); font-weight: 500; font-size: 0.9rem; }

.mini-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
.mini-day {
    aspect-ratio: 1;
    background: var(--card-bg);
    border: 2px solid var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-weight: bold;
    font-size: 1rem;
    transition: transform 0.2s, background 0.2s;
    position: relative;
}
.mini-day:hover:not(.locked) { transform: scale(1.1); z-index: 2; background: var(--primary); color: white; }
.mini-day.locked { opacity: 0.3; cursor: not-allowed; }
.mini-day.done { background: var(--success); }
.mini-day.medal-🥇 { background: var(--gold); color: #000; border-color: #b8860b; }
.mini-day.medal-🥈 { background: var(--silver); color: #000; border-color: #808080; }
.mini-day.medal-🥉 { background: var(--bronze); color: #000; border-color: #8b4513; }
.pts-label { font-size: 0.6rem; margin-top: 2px; opacity: 0.8; }

.puzzle-overlay {
    position: absolute;
    inset: 0;
    background: var(--card-bg);
    z-index: 50;
    display: none;
    padding: 20px;
    flex-direction: column;
    overflow-y: auto;
}
.puzzle-overlay.show { display: flex; }

.timer-box { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 5px 0; font-size: 1.1rem; }
#timer { font-weight: bold; min-width: 60px; text-align: center; }

.grid-container { position: relative; max-width: 600px; width: 100%; margin: 5px auto; }
.grid { display: grid; grid-template-columns: repeat(9, 1fr); width: 100%; border: 3px solid #333; }
.cell { aspect-ratio: 1; border: 0.5px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; cursor: pointer; background: var(--card-bg); position: relative; transition: background 0.1s; }
.cell.given { background: rgba(0,0,0,0.05); font-weight: bold; }
.cell.highlight { background: var(--highlight-bg); }
.cell.same-num { background: var(--same-num-bg); }
.cell.sel { background: var(--primary) !important; color: white !important; z-index: 2; }
.cell.err { color: var(--danger); font-weight: bold; }
.cell:nth-child(3n) { border-right: 3px solid #333; }
.cell:nth-child(n+19):nth-child(-n+27),
.cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 3px solid #333; }

.candidate-grid { display: grid; grid-template-columns: repeat(3, 1fr); width: 100%; height: 100%; padding: 2px; }
.candidate-num { font-size: 0.65rem; display: flex; align-items: center; justify-content: center; color: #666; }
body.dark .candidate-num { color: #aaa; }
.cell.sel .candidate-num { color: rgba(255,255,255,0.85); }

.paused-overlay { position: absolute; inset: 0; background: var(--card-bg); z-index: 10; display: none; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 1.5rem; }
.paused-overlay.show { display: flex; }

.utility-bar { display: flex; justify-content: center; gap: 10px; max-width: 600px; margin: 0 auto 5px auto; width: 100%; }
.btn-util { padding: 6px 10px; border-radius: 8px; border: 1px solid var(--primary); background: transparent; color: var(--primary); font-size: 0.8rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
.btn-util:hover { background: var(--primary); color: white; }

.numpad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 600px; margin: 10px auto; width: 100%; }
.numpad button { padding: 10px; border-radius: 12px; border: 1px solid #ccc; background: var(--card-bg); color: var(--text); cursor: pointer; font-weight: bold; font-size: 1.2rem; }
.numpad button:hover { background: var(--primary); color: white; }

.top-controls { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }
.btn-round { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary); background: var(--card-bg); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; }
.modal.show { display: flex; }
.modal-content { background: var(--card-bg); padding: 40px; border-radius: 20px; text-align: center; max-width: 420px; width: 90%; position: relative; max-height: 90vh; overflow-y: auto; }

.breakdown { text-align: left; margin: 20px 0; padding: 15px; background: rgba(0,0,0,0.05); border-radius: 15px; }
.breakdown-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
.bonus-text { color: var(--success); }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; z-index: 2000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }

.mode-toggle-bar { display: flex; gap: 10px; max-width: 600px; margin: 0 auto; width: 100%; }
.mode-btn { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid var(--primary); font-weight: bold; cursor: pointer; transition: 0.2s; }

@media (max-width: 650px) {
    .dashboard { flex-direction: column; height: auto; }
    .hero-side { border-right: none; border-bottom: 1px solid rgba(0,0,0,0.1); }
    .grid-container { max-width: 95vw; }
    .cell { font-size: 1.4rem; }
    .mini-grid { grid-template-columns: repeat(4, 1fr); }
}
</style>
</head>
<body class="light">

<div class="top-controls">
    <button class="btn-round" title="Toggle Theme" onclick="toggleDark()">🌓</button>
    <button class="btn-round" title="Account Settings" onclick="openSettings()">⚙️</button>
</div>

<div class="dashboard" id="mainDashboard">
    <div class="hero-side">
        <div class="date-display">
            <h1 id="todayDate">...</h1>
            <div class="countdown" id="countdown">...</div>
        </div>
        <div class="level-system">
            <div class="level-info"><span id="levelText">Level 1</span><span id="pointsLabel">0 / 1,000 pts</span></div>
            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
        </div>
    </div>
    <div class="grid-side" id="yearGrids"></div>
</div>

<div class="puzzle-overlay" id="puzzleOverlay">
    <div onclick="closePuzzle()" style="cursor:pointer; font-weight:bold; color:var(--primary); margin-bottom:5px;">← Back</div>
    <div id="puzzleHeader" style="text-align:center;">
        <h3 id="puzzleTitle" style="font-size: 1.1rem;">Day X</h3>
        <div class="timer-box">
            <span id="timer">0:00</span>
            <button class="btn-util" id="pauseBtn" onclick="togglePause()">⏸ PAUSE</button>
        </div>
    </div>
    <div class="utility-bar">
        <button class="btn-util" onclick="manualCheck()">🔍 CHECK</button>
        <button class="btn-util" id="helpBtn" onclick="openHelp()">❓ HELP</button>
        <button class="btn-util" onclick="sharePuzzle()">🔗 SHARE</button>
        <div style="flex-grow:1; text-align:right; font-size:0.75rem; opacity:0.7; align-self:center;" id="targetDisplay">Staff: 0:00</div>
    </div>
    <div class="grid-container">
        <div class="paused-overlay" id="pausedOverlay">GAME PAUSED</div>
        <div class="grid" id="gameGrid"></div>
    </div>
    <div class="numpad" id="numpad"></div>
    <div class="mode-toggle-bar">
        <button onclick="setMode(0)" id="mode0" class="mode-btn" style="background:var(--primary); color:white;">NUMBER</button>
        <button onclick="setMode(1)" id="mode1" class="mode-btn" style="background:transparent; color:var(--primary);">PENCIL</button>
    </div>
</div>

<div class="modal" id="statsModal"></div>
<div class="modal" id="winModal"></div>
<div class="modal" id="settingsModal"></div>
<div class="toast" id="toast"></div>

<script>
const UNLOCK_KEY = "do7'eggs";
const NAMES = ["Hidden Single (Box) - Easy","Hidden Single (Box) - Hard","Hidden Single (Line) - Easy","Hidden Single (Line) - Hard","Locked Candidate - Easy","Locked Candidate - Hard","Naked Single - Easy","Naked Single - Hard","Naked Pair - Easy","Naked Pair - Hard","Hidden Pair - Easy","Hidden Pair - Hard","X-Wing - Easy","X-Wing - Hard","Skyscraper - Easy","Skyscraper - Hard","2-String Kite - Easy","2-String Kite - Hard","Y-Wing","XYZ-Wing","W-Wing","BUG+1","X-Chains","The Grand Finale"];

const HELP_URLS = [
    "https://sudoku.coach/en/learn/hidden-single",       // 1  Hidden Single (Box) - Easy
    "https://sudoku.coach/en/learn/hidden-single",       // 2  Hidden Single (Box) - Hard
    "https://sudoku.coach/en/learn/hidden-single-line",  // 3  Hidden Single (Line) - Easy
    "https://sudoku.coach/en/learn/hidden-single-line",  // 4  Hidden Single (Line) - Hard
    "https://sudoku.coach/en/learn/locked-candidates",   // 5  Locked Candidate - Easy
    "https://sudoku.coach/en/learn/locked-candidates",   // 6  Locked Candidate - Hard
    "https://sudoku.coach/en/learn/naked-single",        // 7  Naked Single - Easy
    "https://sudoku.coach/en/learn/naked-single",        // 8  Naked Single - Hard
    "https://sudoku.coach/en/learn/naked-pair",          // 9  Naked Pair - Easy
    "https://sudoku.coach/en/learn/naked-pair",          // 10 Naked Pair - Hard
    "https://sudoku.coach/en/learn/hidden-pair",         // 11 Hidden Pair - Easy
    "https://sudoku.coach/en/learn/hidden-pair",         // 12 Hidden Pair - Hard
    "https://sudoku.coach/en/learn/x-wing",              // 13 X-Wing - Easy
    "https://sudoku.coach/en/learn/x-wing",              // 14 X-Wing - Hard
    "https://sudoku.coach/en/learn/skyscraper",          // 15 Skyscraper - Easy
    "https://sudoku.coach/en/learn/skyscraper",          // 16 Skyscraper - Hard
    "https://sudoku.coach/en/learn/2-string-kite",       // 17 2-String Kite - Easy
    "https://sudoku.coach/en/learn/2-string-kite",       // 18 2-String Kite - Hard
    "https://sudoku.coach/en/learn/y-wing",              // 19 Y-Wing
    "https://sudoku.coach/en/learn/xyz-wing",            // 20 XYZ-Wing
    "https://sudoku.coach/en/learn/w-wing",              // 21 W-Wing
    "https://sudoku.coach/en/learn/bug-plus-one",        // 22 BUG+1
    "https://sudoku.coach/en/learn/x-chain",             // 23 X-Chains
    "https://sudoku.coach/en/learn/technique-overview",  // 24 The Grand Finale
];

let DATA = {
    "2026": Array(24).fill(null).map(()=>["530070000600195000098000060800060003400803001700020006060000280000419005000080079","534678912672195348198342567859761423426853791713924856961537284287419635345286179","100"]),
    "2025": Array(24).fill(null).map(()=>["530070000600195000098000060800060003400803001700020006060000280000419005000080079","534678912672195348198342567859761423426853791713924856961537284287419635345286179","120"])
};

let activePuzzle, grid, init, cand, sel=null, pencil=0, timerInterval, startTime, totalElapsed=0, isPaused=false, errs=new Set(), mistakeCount=0;

// ─── URL Param Loading ────────────────────────────────────────────────────────
function getURLParams() {
    const p = new URLSearchParams(window.location.search);
    return { y: p.get('y'), d: p.get('d') };
}

function isYearLocked(yr) {
    const now = new Date();
    const unlocked = localStorage.getItem('sudokuUnlock') === UNLOCK_KEY;
    if (unlocked) return false;
    const unlock = new Date(parseInt(yr), 11, 1); // Dec 1, yr
    return now < unlock;
}

function isDayLocked(yr, d) {
    const now = new Date();
    const unlocked = localStorage.getItem('sudokuUnlock') === UNLOCK_KEY;
    if (unlocked) return false;
    if (parseInt(yr) > now.getFullYear()) return true;
    if (parseInt(yr) === now.getFullYear()) {
        if (now.getMonth() < 11) return true; // before December
        if (d > now.getDate()) return true;
    }
    return false;
}

// ─── Candidate Auto-Removal ───────────────────────────────────────────────────
function peers(idx) {
    const r = Math.floor(idx/9), c = idx%9;
    const br = Math.floor(r/3)*3, bc = Math.floor(c/3)*3;
    const s = new Set();
    for(let i=0;i<9;i++){
        s.add(r*9+i);
        s.add(i*9+c);
        s.add((br+Math.floor(i/3))*9+(bc+i%3));
    }
    s.delete(idx);
    return s;
}

function removeCandidate(idx, val) {
    for(const p of peers(idx)) {
        const ci = cand[p].indexOf(val);
        if(ci > -1) cand[p].splice(ci,1);
    }
}

// ─── App Init ─────────────────────────────────────────────────────────────────
async function initApp() {
    try {
        const res = await fetch('https://ricky295.github.io/puzzles.json');
        if(res.ok) DATA = await res.json();
    } catch(e) { console.warn("Using local data"); }

    updateDashboard();
    loadSettings();
    setupKeyListeners();
    setInterval(updateCountdown, 1000);

    const { y, d } = getURLParams();
    if(y && d) {
        const yr = y, day = parseInt(d);
        if(DATA[yr] && day >= 1 && day <= 24) {
            if(isYearLocked(yr) || isDayLocked(yr, day)) {
                showToast(`Day ${day}, ${yr} is locked!`);
            } else {
                startPuzzle(yr, day);
            }
        }
    }
}

function setupKeyListeners() {
    window.addEventListener('keydown', (e) => {
        const overlay = document.getElementById('puzzleOverlay');
        if(!overlay.classList.contains('show') || isPaused) return;

        if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
            e.preventDefault();
            if(sel === null) { sel = 0; drawGame(); return; }
            let r = Math.floor(sel/9), c = sel%9;
            if(e.key === 'ArrowUp')    r = (r+8)%9;
            if(e.key === 'ArrowDown')  r = (r+1)%9;
            if(e.key === 'ArrowLeft')  c = (c+8)%9;
            if(e.key === 'ArrowRight') c = (c+1)%9;
            sel = r*9+c;
            drawGame();
            return;
        }

        if(e.key >= '1' && e.key <= '9') input(parseInt(e.key));
        else if(e.key === '0' || e.key === 'Backspace' || e.key === 'Delete') input(0);
        if(e.key.toLowerCase() === 'p') setMode(pencil === 0 ? 1 : 0);
    });
}

function fmtTime(s) { return Math.floor(s/60)+":"+(s%60).toString().padStart(2,'0'); }

function getLevelStats(pts) {
    const n = (500+Math.sqrt(250000+2000*pts))/1000;
    const lv = Math.floor(n);
    const s0 = 500*(lv-1)*lv, s1 = 500*lv*(lv+1);
    return { level: lv, current: pts-s0, totalRequired: s1-s0, startPts: s0 };
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function updateDashboard() {
    const now = new Date();
    document.getElementById('todayDate').textContent = now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    updateCountdown();

    const progress = JSON.parse(localStorage.getItem('sudokuProgress')||'{}');
    const container = document.getElementById('yearGrids');
    container.innerHTML = '';

    const years = Object.keys(DATA).sort((a,b)=>b-a);
    let grandTotal = 0;

    years.forEach(yr => {
        if(isYearLocked(yr)) return;

        let yrPts = 0, completedCount = 0;
        const yearData = progress[yr]||{};
        Object.keys(yearData).forEach(d=>{ yrPts += yearData[d].points||0; completedCount++; });
        const bonus = completedCount >= 24 ? 2000 : 0;
        grandTotal += yrPts + bonus;

        const section = document.createElement('div');
        section.className = 'year-section';
        section.innerHTML = `
            <div class="year-header">
                <div class="year-title">${yr}</div>
                <div class="year-points">${bonus>0?`<span class="bonus-math">${yrPts.toLocaleString()} + 2k = </span>`:''} ${(yrPts+bonus).toLocaleString()} pts</div>
            </div>
            <div class="mini-grid"></div>
        `;
        const miniGrid = section.querySelector('.mini-grid');
        for(let d=1;d<=24;d++) {
            const dayProg = yearData[d];
            const locked = isDayLocked(yr, d);
            const div = document.createElement('div');
            div.className = `mini-day ${locked?'locked':''} ${dayProg?'done medal-'+dayProg.medal:''}`;
            div.innerHTML = `<span>${d}</span>${dayProg?`<span class="pts-label">${dayProg.points}</span>`:''}`;
            div.onclick = () => { if(!locked) dayProg ? showStats(yr,d) : startPuzzle(yr,d); };
            miniGrid.appendChild(div);
        }
        container.appendChild(section);
    });

    const stats = getLevelStats(grandTotal);
    document.getElementById('levelText').textContent = `Level ${stats.level}`;
    document.getElementById('pointsLabel').textContent = `${grandTotal.toLocaleString()} / ${(stats.startPts + stats.totalRequired).toLocaleString()} pts`;
    document.getElementById('progressBar').style.width = `${Math.min(100,(stats.current/stats.totalRequired)*100)}%`;
}

// ─── Stats Modal ──────────────────────────────────────────────────────────────
function showStats(yr, d) {
    const dayProg = JSON.parse(localStorage.getItem('sudokuProgress'))[yr][d];
    const m = document.getElementById('statsModal');
    m.innerHTML = `
        <div class="modal-content">
            <h1 style="font-size:3rem">${dayProg.medal}</h1>
            <h2>Day ${d} Summary (${yr})</h2>
            <div class="breakdown">
                <div class="breakdown-row"><span>Base Score:</span><span>${dayProg.breakdown?.base}</span></div>
                <div class="breakdown-row"><span>Time Bonus:</span><span class="bonus-text">+${dayProg.breakdown?.timeBonus}</span></div>
                <div class="breakdown-row"><span>Medal Bonus:</span><span class="bonus-text">+${dayProg.breakdown?.medalBonus}</span></div>
                ${(dayProg.breakdown?.mistakeCount>0)?`<div class="breakdown-row" style="color:var(--danger)"><span>${dayProg.breakdown.mistakeCount} mistake${dayProg.breakdown.mistakeCount>1?'s':''}:</span><span>${dayProg.breakdown.mistakePointLoss}</span></div>`:''}
                <div class="breakdown-row" style="border-top:2px solid var(--text);margin-top:10px;padding-top:5px;font-weight:bold;">
                    <span>Total Score:</span><span>${dayProg.points} pts</span>
                </div>
            </div>
            <div style="display:flex;gap:10px;margin-top:20px;">
                <button onclick="startPuzzle('${yr}',${d})" style="flex:1;padding:15px;border-radius:10px;border:none;background:var(--primary);color:white;font-weight:bold;cursor:pointer;">REPLAY</button>
                <button onclick="closeModals()" style="flex:1;padding:15px;border-radius:10px;border:1px solid #ccc;background:var(--card-bg);color:var(--text);font-weight:bold;cursor:pointer;">CLOSE</button>
            </div>
        </div>`;
    m.classList.add('show');
}

// ─── Puzzle Start ─────────────────────────────────────────────────────────────
function startPuzzle(yr, d) {
    closeModals();
    const [pStr, sStr, staff] = DATA[yr][d-1];
    activePuzzle = { yr, d, sol: sStr.split('').map(Number), staff: parseInt(staff), name: NAMES[d-1] };
    init = pStr.split('').map(c => c==='0'?0:Number(c));
    grid = [...init];
    cand = Array(81).fill(0).map(()=>[]);

    errs.clear(); mistakeCount=0; sel=null; totalElapsed=0; isPaused=false; startTime=Date.now();
    document.getElementById('puzzleTitle').textContent = `${yr} Dec ${d}: ${activePuzzle.name}`;
    document.getElementById('targetDisplay').textContent = `Staff: ${fmtTime(activePuzzle.staff)}`;
    document.getElementById('puzzleOverlay').classList.add('show');
    drawGame(); drawNumpad(); startTimer();
}

// ─── Timer ────────────────────────────────────────────────────────────────────
function startTimer() {
    if(timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(()=>{
        if(!isPaused) document.getElementById('timer').textContent = fmtTime(Math.floor((Date.now()-startTime)/1000)+totalElapsed);
    },1000);
}

function togglePause() {
    if(isPaused) {
        startTime=Date.now(); isPaused=false;
        document.getElementById('pausedOverlay').classList.remove('show');
        document.getElementById('pauseBtn').textContent="⏸ PAUSE";
    } else {
        totalElapsed+=Math.floor((Date.now()-startTime)/1000); isPaused=true;
        document.getElementById('pausedOverlay').classList.add('show');
        document.getElementById('pauseBtn').textContent="▶ RESUME";
    }
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function drawGame() {
    const g = document.getElementById('gameGrid');
    g.innerHTML='';
    const selVal = sel!==null ? grid[sel] : null;
    const selRow = sel!==null ? Math.floor(sel/9) : null;
    const selCol = sel!==null ? sel%9 : null;
    const selBox = sel!==null ? Math.floor(selRow/3)*3+Math.floor(selCol/3) : null;

    for(let i=0;i<81;i++) {
        const r=Math.floor(i/9), c=i%9, val=grid[i];
        const box = Math.floor(r/3)*3+Math.floor(c/3);
        const el=document.createElement('div');
        let classes=['cell'];
        if(init[i]) classes.push('given');
        if(sel===i) classes.push('sel');
        if(errs.has(i)) classes.push('err');
        if(sel!==null && sel!==i) {
            if(r===selRow||c===selCol||box===selBox) classes.push('highlight');
            if(val!==0 && val===selVal) classes.push('same-num');
        }
        el.className=classes.join(' ');

        if(init[i]||val) {
            el.textContent=val;
        } else {
            const cd=document.createElement('div');
            cd.className='candidate-grid';
            for(let n=1;n<=9;n++) {
                const s=document.createElement('div');
                s.className='candidate-num';
                s.textContent=cand[i].includes(n)?n:'';
                cd.appendChild(s);
            }
            el.appendChild(cd);
        }
        el.onclick=()=>{ if(!isPaused){ sel=i; drawGame(); } };
        g.appendChild(el);
    }
}

// ─── Input ────────────────────────────────────────────────────────────────────
function input(n) {
    if(sel===null||init[sel]||isPaused) return;
    if(pencil && n!==0) {
        const idx=cand[sel].indexOf(n);
        if(idx>-1) cand[sel].splice(idx,1);
        else cand[sel].push(n);
    } else {
        grid[sel]=n; cand[sel]=[]; errs.delete(sel);
        if(n!==0) removeCandidate(sel, n);
    }
    drawGame();
    if(!grid.includes(0)) autoCheck();
}

function autoCheck() {
    let wrong=0;
    for(let i=0;i<81;i++) if(grid[i]!==0&&grid[i]!==activePuzzle.sol[i]){errs.add(i);wrong++;}
    if(wrong===0) win();
    else { mistakeCount+=wrong; showToast(`${wrong} mistake${wrong>1?'s':''}!`); drawGame(); }
}

// ─── Win ──────────────────────────────────────────────────────────────────────
function win() {
    clearInterval(timerInterval);
    const rawTime=Math.max(0.001, (Date.now()-startTime)/1000+totalElapsed);
    const finalTime=Math.max(1, rawTime+(mistakeCount*10*activePuzzle.d));
    const ratio=finalTime/activePuzzle.staff;
    const base=(activePuzzle.d===24)?500:(activePuzzle.d*10);
    const timeBonus=Math.max(0,Math.floor((activePuzzle.staff/finalTime)*1000));
    let medal='✅',medalBonus=0;
    if(ratio<=1.0){medal='🥇';medalBonus=300;}
    else if(ratio<=1.5){medal='🥈';medalBonus=200;}
    else if(ratio<=2.0){medal='🥉';medalBonus=100;}
    const totalPts=base+timeBonus+medalBonus;

    const cleanTimeBonus = Math.max(0, Math.floor((activePuzzle.staff / rawTime) * 1000));
    const mistakePointLoss = -(cleanTimeBonus - timeBonus);

    const prog=JSON.parse(localStorage.getItem('sudokuProgress')||'{}');
    if(!prog[activePuzzle.yr]) prog[activePuzzle.yr]={};
    if(!prog[activePuzzle.yr][activePuzzle.d]||totalPts>prog[activePuzzle.yr][activePuzzle.d].points) {
        prog[activePuzzle.yr][activePuzzle.d]={points:totalPts,medal,breakdown:{base,timeBonus,medalBonus,mistakeCount,mistakePointLoss}};
        localStorage.setItem('sudokuProgress',JSON.stringify(prog));
    }
    const m=document.getElementById('winModal');
    m.innerHTML=`
        <div class="modal-content">
            <h1 style="font-size:4rem">${medal}</h1>
            <h2>Solved!</h2>
            <div style="text-align:left;margin:15px 0;padding:15px;background:rgba(0,0,0,0.05);border-radius:15px;">
                <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span>Base Score:</span><span>${base}</span></div>
                <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span>Time Bonus:</span><span style="color:var(--success)">+${timeBonus}</span></div>
                <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span>Medal Bonus:</span><span style="color:var(--success)">+${medalBonus}</span></div>
                ${mistakeCount>0?`<div style="display:flex;justify-content:space-between;margin-bottom:6px;color:var(--danger)"><span>${mistakeCount} mistake${mistakeCount>1?'s':''}:</span><span>${mistakePointLoss}</span></div>`:''}
                <div style="display:flex;justify-content:space-between;border-top:2px solid var(--text);margin-top:8px;padding-top:8px;font-weight:bold;"><span>Total:</span><span>${totalPts} pts</span></div>
            </div>
            <button onclick="closeModals();closePuzzle();" style="width:100%;padding:15px;margin-top:20px;border-radius:10px;border:none;background:var(--primary);color:white;font-weight:bold;cursor:pointer;">Return to Calendar</button>
        </div>`;
    m.classList.add('show');
}

// ─── Numpad ───────────────────────────────────────────────────────────────────
function drawNumpad() {
    const n=document.getElementById('numpad');
    n.innerHTML='';
    for(let i=1;i<=9;i++) {
        const b=document.createElement('button');
        b.textContent=i; b.onclick=()=>input(i);
        n.appendChild(b);
    }
    const del=document.createElement('button');
    del.textContent='⌫'; del.onclick=()=>input(0);
    n.appendChild(del);
}

function setMode(m) {
    pencil=m;
    document.getElementById('mode0').style.background=m?'transparent':'var(--primary)';
    document.getElementById('mode0').style.color=m?'var(--primary)':'white';
    document.getElementById('mode1').style.background=m?'var(--primary)':'transparent';
    document.getElementById('mode1').style.color=m?'white':'var(--primary)';
}

// ─── Help ─────────────────────────────────────────────────────────────────────
function openHelp() {
    if(!activePuzzle) return;
    const url = HELP_URLS[activePuzzle.d - 1];
    window.open(url, '_blank', 'noopener,noreferrer');
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function manualCheck() {
    let wrong=0;
    for(let i=0;i<81;i++) if(grid[i]!==0&&grid[i]!==activePuzzle.sol[i]){errs.add(i);wrong++;}
    showToast(wrong>0?`Found ${wrong} error${wrong>1?'s':''}!`:"No errors!");
    drawGame();
    if(wrong>0) mistakeCount+=wrong;
}

function openSettings() {
    const m=document.getElementById('settingsModal');
    m.innerHTML=`
        <div class="modal-content">
            <h2>Settings</h2>
            <div style="display:flex;flex-direction:column;gap:10px;margin-top:20px;">
                <button onclick="settingsExport()" class="btn-util" style="width:100%;justify-content:center;">📤 Export Progress</button>
                <button onclick="settingsImportView()" class="btn-util" style="width:100%;justify-content:center;">📥 Import Progress</button>
                <button onclick="settingsResetConfirm1()" class="btn-util" style="width:100%;background:var(--danger);color:white;border-color:var(--danger);justify-content:center;">🗑️ Reset All Data</button>
                <button onclick="closeModals()" class="btn-util" style="width:100%;justify-content:center;">Close</button>
            </div>
            <div id="settingsPanel" style="margin-top:20px;"></div>
        </div>`;
    m.classList.add('show');
}

function settingsExport() {
    const raw = localStorage.getItem('sudokuProgress') || '{}';
    const b64 = btoa(String.fromCharCode(...new TextEncoder().encode(raw)));
    document.getElementById('settingsPanel').innerHTML=`
        <div style="text-align:left;">
            <p style="font-weight:bold;margin-bottom:8px;">Your export string:</p>
            <textarea readonly rows="5"
                style="width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;background:var(--card-bg);color:var(--text);font-size:0.8rem;resize:vertical;word-break:break-all;"
            >${b64}</textarea>
            <p style="font-size:0.75rem;opacity:0.6;margin-top:6px;">Copy this string and keep it safe. Use Import to restore it later.</p>
        </div>`;
}

function settingsImportView() {
    document.getElementById('settingsPanel').innerHTML=`
        <div style="text-align:left;">
            <p style="font-weight:bold;margin-bottom:8px;">Paste your export string:</p>
            <textarea id="importInput" rows="5" placeholder="Paste base64 string here..."
                style="width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;background:var(--card-bg);color:var(--text);font-size:0.8rem;resize:vertical;word-break:break-all;"></textarea>
            <div style="display:flex;gap:8px;margin-top:10px;">
                <button onclick="settingsImportDo('merge')" class="btn-util" style="flex:1;justify-content:center;">➕ Add to existing</button>
                <button onclick="settingsImportDo('replace')" class="btn-util" style="flex:1;justify-content:center;">🔄 Replace all</button>
            </div>
        </div>`;
}

function settingsImportDo(mode) {
    const raw = document.getElementById('importInput').value.trim();
    if(!raw) { showToast("No data entered."); return; }
    let imported;
    try {
        imported = JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(raw), c => c.charCodeAt(0))));
    } catch(e) {
        showToast("Invalid export string!"); return;
    }

    if(mode === 'replace') {
        localStorage.setItem('sudokuProgress', JSON.stringify(imported));
        closeModals(); updateDashboard();
        showToast("✅ Progress replaced!");
        return;
    }

    // merge: keep higher score per day
    const existing = JSON.parse(localStorage.getItem('sudokuProgress') || '{}');
    for(const yr of Object.keys(imported)) {
        if(!existing[yr]) existing[yr] = {};
        for(const d of Object.keys(imported[yr])) {
            const imp = imported[yr][d], cur = existing[yr][d];
            if(!cur || imp.points > cur.points) existing[yr][d] = imp;
        }
    }
    localStorage.setItem('sudokuProgress', JSON.stringify(existing));
    closeModals(); updateDashboard();
    showToast("✅ Progress merged!");
}

function settingsResetConfirm1() {
    document.getElementById('settingsPanel').innerHTML=`
        <div style="text-align:center;padding:10px;border:2px solid var(--danger);border-radius:12px;">
            <p style="font-weight:bold;color:var(--danger);">⚠️ This will permanently delete all your scores and progress.</p>
            <p style="margin:10px 0;font-size:0.9rem;">Are you sure?</p>
            <div style="display:flex;gap:8px;margin-top:10px;">
                <button onclick="settingsResetConfirm2()" class="btn-util" style="flex:1;background:var(--danger);color:white;border-color:var(--danger);justify-content:center;">Yes, continue</button>
                <button onclick="document.getElementById('settingsPanel').innerHTML=''" class="btn-util" style="flex:1;justify-content:center;">Cancel</button>
            </div>
        </div>`;
}

function settingsResetConfirm2() {
    document.getElementById('settingsPanel').innerHTML=`
        <div style="text-align:center;padding:10px;border:2px solid var(--danger);border-radius:12px;">
            <p style="font-weight:bold;color:var(--danger);">🚨 Last chance. This cannot be undone.</p>
            <p style="margin:10px 0;font-size:0.9rem;">All data will be gone forever.</p>
            <div style="display:flex;gap:8px;margin-top:10px;">
                <button onclick="localStorage.removeItem('sudokuProgress');closeModals();updateDashboard();showToast('Data reset.');" class="btn-util" style="flex:1;background:var(--danger);color:white;border-color:var(--danger);justify-content:center;">🗑️ Delete everything</button>
                <button onclick="document.getElementById('settingsPanel').innerHTML=''" class="btn-util" style="flex:1;justify-content:center;">Cancel</button>
            </div>
        </div>`;
}

function sharePuzzle() {
    if(!activePuzzle) return;
    const url = `${location.origin}${location.pathname}?y=${activePuzzle.yr}&d=${activePuzzle.d}`;
    navigator.clipboard.writeText(url).catch(()=>{});
    showToast("Link copied!");
}

function closeModals() { document.querySelectorAll('.modal').forEach(m=>m.classList.remove('show')); }
function closePuzzle() {
    clearInterval(timerInterval);
    document.getElementById('puzzleOverlay').classList.remove('show');
    updateDashboard();
    const url = new URL(window.location);
    url.searchParams.delete('y'); url.searchParams.delete('d');
    history.replaceState({},'',url);
}
function toggleDark() { document.body.classList.toggle('dark'); localStorage.setItem('sudokuDark',document.body.classList.contains('dark')); }
function loadSettings() { if(localStorage.getItem('sudokuDark')==='true') document.body.classList.add('dark'); }
function showToast(msg) {
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2500);
}
function updateCountdown() {
    const now = new Date();
    let nextDec = new Date(now.getFullYear(),11,1);
    if(now >= nextDec) nextDec.setFullYear(now.getFullYear()+1);
    const msLeft = nextDec - now;
    const totalSecs = Math.floor(msLeft/1000);
    let str;
    if(msLeft < 86400000) {
        const h = Math.floor(totalSecs/3600), m = Math.floor((totalSecs%3600)/60), s = totalSecs%60;
        str = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} until beginning`;
    } else {
        str = `${Math.ceil(msLeft/(1000*60*60*24))}d until beginning`;
    }
    document.getElementById('countdown').textContent = str;
}

function verdureSandwich() { if(!activePuzzle) return; activePuzzle.sol.forEach((v,i)=>{ if(!init[i]){ grid[i]=v; cand[i]=[]; errs.delete(i); } }); drawGame(); if(!grid.includes(0)) autoCheck(); }

initApp();
</script>
