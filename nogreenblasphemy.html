<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidden Veggie Detector</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IM+Fell+English:ital@0;1&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --parchment: #f5edd6;
    --ink: #1a1008;
    --ink-light: #3d2b0f;
    --red: #8b1a1a;
    --red-light: #c0392b;
    --gold: #b8860b;
    --border: #6b4c11;
  }

  body {
    background: #1a0a00;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    font-family: 'IM Fell English', Georgia, serif;
  }

  .page {
    background: var(--parchment);
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(180,140,60,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(150,100,30,0.12) 0%, transparent 50%);
    max-width: 740px;
    width: 100%;
    border: 3px double var(--border);
    box-shadow: 0 0 0 6px #1a0a00, 0 0 0 8px var(--border), 0 20px 60px rgba(0,0,0,0.8);
    padding: 48px 52px 52px;
    position: relative;
  }

  .page::before {
    content: '';
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(107,76,17,0.3);
    pointer-events: none;
  }

  .header {
    text-align: center;
    border-bottom: 2px solid var(--border);
    padding-bottom: 24px;
    margin-bottom: 32px;
  }

  .header .eyebrow {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 900;
    color: var(--red);
    line-height: 1.1;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.15);
  }

  .subtitle {
    font-style: italic;
    color: var(--ink-light);
    font-size: 14px;
    margin-top: 8px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
    opacity: 0.5;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-light); }

  select, input[type="text"], input[type="number"] {
    background: rgba(255,255,255,0.5);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 9px 12px;
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }
  select:focus, input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 2px rgba(184,134,11,0.2);
  }

  .divider {
    border: none;
    border-top: 1px dashed rgba(107,76,17,0.4);
    margin: 24px 0;
  }

  .item-entry {
    display: grid;
    grid-template-columns: 1fr 110px auto;
    gap: 10px;
    align-items: end;
    margin-bottom: 10px;
  }

  .btn {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    padding: 10px 18px;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .btn-add {
    background: var(--ink);
    color: var(--parchment);
    white-space: nowrap;
  }
  .btn-add:hover { background: var(--ink-light); }

  .btn-calc {
    background: var(--red);
    color: var(--parchment);
    width: 100%;
    padding: 13px;
    font-size: 15px;
    margin-top: 8px;
    letter-spacing: 2px;
  }
  .btn-calc:hover { background: var(--red-light); }

  .btn-remove {
    background: none;
    border: 1px solid rgba(107,76,17,0.4);
    color: var(--border);
    width: 32px;
    height: 37px;
    font-size: 16px;
    padding: 0;
    border-radius: 2px;
    line-height: 1;
    flex-shrink: 0;
  }
  .btn-remove:hover { background: rgba(139,26,26,0.1); border-color: var(--red); color: var(--red); }

  #items-list { margin-bottom: 12px; }

  .results {
    margin-top: 32px;
    border-top: 2px solid var(--border);
    padding-top: 24px;
    display: none;
  }

  .result-header {
    text-align: center;
    margin-bottom: 20px;
  }
  .result-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--ink);
  }
  .result-header p {
    font-style: italic;
    font-size: 13px;
    color: var(--ink-light);
    margin-top: 4px;
  }

  .result-item {
    border-bottom: 1px solid rgba(107,76,17,0.2);
    padding: 10px 0;
  }

  .result-main {
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    user-select: none;
  }

  .result-main:hover .result-name { text-decoration: underline; text-decoration-style: dotted; }

  .risk-badge {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    min-width: 56px;
    text-align: right;
    flex-shrink: 0;
  }

  .risk-bar-wrap {
    flex: 1;
    height: 8px;
    background: rgba(107,76,17,0.15);
    border-radius: 99px;
    overflow: hidden;
  }
  .risk-bar {
    height: 100%;
    border-radius: 99px;
  }

  .result-name {
    font-size: 15px;
    color: var(--ink);
    min-width: 0;
    word-break: break-word;
    flex: 2;
  }

  .result-label {
    font-size: 12px;
    color: #888;
    font-style: italic;
  }

  .toggle-arrow {
    font-size: 11px;
    color: var(--border);
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .toggle-arrow.open { transform: rotate(180deg); }

  .breakdown {
    display: none;
    margin: 8px 0 4px 70px;
    font-size: 13px;
    color: var(--ink-light);
    line-height: 1.9;
    font-style: italic;
  }
  .breakdown.open { display: block; }

  .breakdown-row { display: flex; gap: 8px; }
  .breakdown-key { color: var(--ink-light); min-width: 160px; }
  .breakdown-val { font-weight: bold; font-style: normal; }
  .breakdown-val.pos { color: #8b1a1a; }
  .breakdown-val.neg { color: #2e7d32; }
  .breakdown-val.neu { color: #555; }

  .breakdown-keywords { margin-top: 4px; padding-left: 12px; }
  .breakdown-kw { display: flex; gap: 8px; }
  .breakdown-kw::before { content: '*'; color: var(--border); }

  .verdict {
    text-align: center;
    margin-top: 20px;
    padding: 16px;
    border: 1px solid var(--border);
    background: rgba(139,26,26,0.05);
    font-style: italic;
    color: var(--red);
    font-size: 15px;
  }

  .copy-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    justify-content: center;
  }

  .btn-copy {
    background: var(--ink);
    color: var(--parchment);
    font-size: 12px;
    padding: 8px 16px;
    letter-spacing: 1px;
  }
  .btn-copy:hover { background: var(--ink-light); }
  .btn-copy.copied { background: #2e7d32; }

  .error { color: var(--red); font-size: 13px; margin-top: 4px; display: none; }

  @media(max-width:560px) {
    .page { padding: 28px 20px 36px; }
    h1 { font-size: 26px; }
    .row { grid-template-columns: 1fr; }
    .item-entry { grid-template-columns: 1fr 90px auto; }
    .breakdown { margin-left: 0; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="eyebrow">Italian Dining Risk Assessment</div>
    <h1>Hidden Veggie Detector</h1>
    <div class="subtitle">How likely is your dish to arrive with unsolicited decorative greenery?</div>
  </div>

  <div class="section-title">Context</div>
  <div class="row">
    <div class="field">
      <label for="region">Region</label>
      <select id="region"></select>
    </div>
    <div class="field">
      <label for="venue">Venue Type</label>
      <select id="venue"></select>
    </div>
  </div>

  <hr class="divider">

  <div class="section-title">Menu Items</div>
  <div id="items-list"></div>

  <div class="item-entry">
    <div class="field">
      <label for="new-desc">Dish description</label>
      <input type="text" id="new-desc" placeholder="e.g. Cotoletta alla milanese">
    </div>
    <div class="field">
      <label for="new-price">Price €</label>
      <input type="number" id="new-price" min="0" step="0.5" placeholder="18.00">
    </div>
    <div class="field" style="gap:6px">
      <label style="opacity:0">Add</label>
      <button class="btn btn-add" id="btn-add">+ Add</button>
    </div>
  </div>
  <div class="error" id="input-error">Please enter a description and a valid price.</div>

  <button class="btn btn-calc" id="btn-calc">🥬 Assess the Risk</button>

  <div class="results" id="results">
    <div class="result-header">
      <h2>Risk Report</h2>
      <p id="result-subtitle"></p>
    </div>
    <div id="result-list"></div>
    <div class="verdict" id="verdict-text"></div>
    <div class="copy-row">
      <button class="btn btn-copy" id="btn-simple">📋 Copy (Simple)</button>
      <button class="btn btn-copy" id="btn-advanced">📋 Copy (Detailed)</button>
    </div>
  </div>
</div>

<script>
const REGIONS_DATA = {
  "BOBBIO":     [0.05, 0.01],
  "VARESE":     [0.20, 0.02],
  "LAIGUEGLIA": [0.25, 0.03],
  "ROMA":       [0.30, 0.025],
  "MILANO":     [0.35, 0.025]
};
const VENUES_DATA = {
  "BAR":         -0.30,
  "OSTERIA":     -0.20,
  "TRATTORIA":   -0.15,
  "BRASSERIE":    0.05,
  "STEAKHOUSE":   0.10,
  "RISTORANTE":   0.30
};
const TEXT_MODIFIERS = {
  "rucola": 1.00,
  "insalata": 0.70, "misticanza": 0.70,
  "scaglie": 0.40, "guarnito": 0.40,
  "agrumi": 0.35,
  "balsamico": 0.30,
  "pomodorini": 0.25,
  "con": 0.20, "verdure": 0.20, "radicchio": 0.20,
  "contorno": 0.15,
  "cotoletta": -0.40,
  "fiorentina": -0.30, "grigliata": -0.30,
  "alla griglia": -0.25, "alla brace": -0.25,
  "alla piastra": -0.20,
  "diavola": -0.15, "mista": -0.15
};

let items = [];
let lastScored = [];
let lastContext = {};

function populateSelects() {
  const rs = document.getElementById('region');
  const vs = document.getElementById('venue');
  Object.keys(REGIONS_DATA).forEach(r => {
    const o = document.createElement('option');
    o.value = r; o.textContent = r;
    rs.appendChild(o);
  });
  Object.keys(VENUES_DATA).forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    vs.appendChild(o);
  });
}

function calcDetailed(regData, venueBonus, reg, ven, desc, price) {
  const regionBonus = regData[0];
  const priceSensitivity = regData[1];
  const priceDiff = price - 15.0;
  const priceBonus = priceSensitivity * priceDiff;
  const wordCount = desc.split(/\s+/).length;
  const wordBonus = wordCount * 0.015;

  const dl = desc.toLowerCase();
  const matchedKeywords = [];
  let keywordTotal = 0;
  for (const [text, mod] of Object.entries(TEXT_MODIFIERS)) {
    if (dl.includes(text)) {
      matchedKeywords.push({ word: text, mod });
      keywordTotal += mod;
    }
  }

  const rawTotal = regionBonus + venueBonus + priceBonus + wordBonus + keywordTotal;
  const risk = Math.min(Math.max(rawTotal, 0), 1) * 100;

  return {
    desc, price, risk,
    regionBonus, venueBonus, priceBonus,
    priceDiff, priceSensitivity,
    wordCount, wordBonus,
    keywordTotal, matchedKeywords,
    reg, ven
  };
}

function addItem() {
  const descEl = document.getElementById('new-desc');
  const priceEl = document.getElementById('new-price');
  const desc = descEl.value.trim();
  const price = parseFloat(priceEl.value);
  const err = document.getElementById('input-error');
  if (!desc || isNaN(price) || price < 0) { err.style.display = 'block'; return; }
  err.style.display = 'none';
  items.push({ desc, price });
  descEl.value = ''; priceEl.value = '';
  renderItems();
  descEl.focus();
}

function removeItem(i) {
  items.splice(i, 1);
  renderItems();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderItems() {
  const list = document.getElementById('items-list');
  list.innerHTML = '';
  items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'item-entry';
    row.innerHTML = `
      <div class="field">
        <input type="text" value="${escHtml(item.desc)}" onchange="items[${i}].desc=this.value">
      </div>
      <div class="field">
        <input type="number" value="${item.price}" min="0" step="0.5" onchange="items[${i}].price=parseFloat(this.value)||0">
      </div>
      <div class="field" style="gap:6px">
        <button class="btn btn-remove" onclick="removeItem(${i})" title="Remove">×</button>
      </div>`;
    list.appendChild(row);
  });
}

function riskColor(r) {
  if (r < 25) return '#2e7d32';
  if (r < 50) return '#f9a825';
  if (r < 75) return '#e65100';
  return '#8b1a1a';
}

function riskLabel(r) {
  if (r < 20) return '✅ Probably safe';
  if (r < 40) return '🥬 Mildly suspicious';
  if (r < 60) return '🤨 Veggie likely';
  if (r < 80) return '🚨 Almost certain';
  return '🥗 It\'s basically a salad';
}

function sign(n) { return n >= 0 ? '+' : ''; }
function fmt(n) { return sign(n) + n.toFixed(3).replace(/\.?0+$/, '') ; }

function verdictText(avg) {
  if (avg < 20) return 'Looks clean. Your plate will arrive as ordered, unadorned and unashamed.';
  if (avg < 40) return 'Some risk detected. Keep an eye out for suspicious greenery near the edges.';
  if (avg < 60) return 'High likelihood of decorative intrusion. A rogue rucola leaf is probably already en route.';
  if (avg < 80) return 'This menu has "garnished whether you like it or not" written all over it.';
  return 'Your dish will arrive buried under a small ecosystem. You ordered meat. You\'re getting a garden.';
}

function renderBreakdown(d) {
  const priceLine = `${fmt(d.priceBonus)} (€${d.price} is ${Math.abs(d.priceDiff).toFixed(1)}€ ${d.priceDiff >= 0 ? 'above' : 'below'} baseline × ${d.priceSensitivity} sensitivity)`;
  const wordLine = `${fmt(d.wordBonus)} (${d.wordCount} words × 0.015)`;

  let kwHtml = '';
  if (d.matchedKeywords.length > 0) {
    kwHtml = `<div class="breakdown-keywords">` +
      d.matchedKeywords.map(k =>
        `<div class="breakdown-kw">
          <span class="breakdown-key">${k.word}</span>
          <span class="breakdown-val ${k.mod > 0 ? 'pos' : 'neg'}">${fmt(k.mod)}</span>
        </div>`
      ).join('') +
    `</div>`;
  } else {
    kwHtml = `<div style="padding-left:12px;font-style:italic;color:#888">No keyword matches</div>`;
  }

  return `
    <div class="breakdown-row"><span class="breakdown-key">Region (${d.reg})</span><span class="breakdown-val ${d.regionBonus>0?'pos':'neg'}">${fmt(d.regionBonus)}</span></div>
    <div class="breakdown-row"><span class="breakdown-key">Venue (${d.ven})</span><span class="breakdown-val ${d.venueBonus>0?'pos':'neg'}">${fmt(d.venueBonus)}</span></div>
    <div class="breakdown-row"><span class="breakdown-key">Price</span><span class="breakdown-val ${d.priceBonus>0?'pos':d.priceBonus<0?'neg':'neu'}">${priceLine}</span></div>
    <div class="breakdown-row"><span class="breakdown-key">Word count</span><span class="breakdown-val neu">${wordLine}</span></div>
    <div class="breakdown-row" style="margin-top:4px"><span class="breakdown-key">Keywords (${fmt(d.keywordTotal)})</span></div>
    ${kwHtml}
  `;
}

function calculate() {
  const err = document.getElementById('input-error');
  if (items.length === 0) {
    err.textContent = 'Add at least one menu item first.';
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';

  const reg = document.getElementById('region').value;
  const ven = document.getElementById('venue').value;
  const regData = REGIONS_DATA[reg];
  const venBonus = VENUES_DATA[ven];

  lastContext = { reg, ven };
  lastScored = items
    .map(item => calcDetailed(regData, venBonus, reg, ven, item.desc, item.price))
    .sort((a, b) => b.risk - a.risk);

  const avg = lastScored.reduce((s, x) => s + x.risk, 0) / lastScored.length;

  document.getElementById('result-subtitle').textContent =
    `${reg} · ${ven} · ${lastScored.length} item${lastScored.length !== 1 ? 's' : ''} · Avg risk: ${avg.toFixed(1)}%`;

  const list = document.getElementById('result-list');
  list.innerHTML = '';

  lastScored.forEach((item, i) => {
    const c = riskColor(item.risk);
    const id = `bd-${i}`;
    const div = document.createElement('div');
    div.className = 'result-item';
    div.innerHTML = `
      <div class="result-main" data-target="${id}">
        <span class="risk-badge" style="color:${c}">${item.risk.toFixed(1)}%</span>
        <div class="risk-bar-wrap">
          <div class="risk-bar" style="width:${item.risk}%;background:${c}"></div>
        </div>
        <span class="result-name">
          ${escHtml(item.desc)}
          <span class="result-label">· €${item.price.toFixed(2)} · ${riskLabel(item.risk)}</span>
        </span>
        <span class="toggle-arrow" id="arr-${id}">▼</span>
      </div>
      <div class="breakdown" id="${id}">${renderBreakdown(item)}</div>`;
    list.appendChild(div);
  });

  list.querySelectorAll('.result-main').forEach(el => {
    el.addEventListener('click', () => {
      const t = el.dataset.target;
      const bd = document.getElementById(t);
      const arr = document.getElementById('arr-' + t);
      const open = bd.classList.toggle('open');
      arr.classList.toggle('open', open);
    });
  });

  document.getElementById('verdict-text').textContent = verdictText(avg);

  const results = document.getElementById('results');
  results.style.display = 'block';
  results.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyText(advanced) {
  const { reg, ven } = lastContext;
  let lines = [`Hidden Veggie Risk Report — ${reg} · ${ven}`, ''];
  lastScored.forEach(item => {
    lines.push(`${item.desc.toUpperCase()} — €${item.price.toFixed(2)} — ${item.risk.toFixed(1)}% [${riskLabel(item.risk).replace(/./u, '').trim()}]`);
    if (advanced) {
      lines.push(`  Region (${item.reg}): ${fmt(item.regionBonus)}`);
      lines.push(`  Venue (${item.ven}): ${fmt(item.venueBonus)}`);
      const dir = item.priceDiff >= 0 ? 'above' : 'below';
      lines.push(`  Price: ${fmt(item.priceBonus)} (€${item.price} is ${Math.abs(item.priceDiff).toFixed(1)}€ ${dir} baseline × ${item.priceSensitivity})`);
      lines.push(`  Words: ${fmt(item.wordBonus)} (${item.wordCount} words × 0.015)`);
      if (item.matchedKeywords.length > 0) {
        lines.push(`  Keywords: ${fmt(item.keywordTotal)}`);
        item.matchedKeywords.forEach(k => lines.push(`    * ${k.word}: ${fmt(k.mod)}`));
      } else {
        lines.push(`  Keywords: none`);
      }
      lines.push('');
    }
  });
  const ta = document.createElement('textarea');
  ta.value = lines.join('\n');
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  const btn = document.getElementById(advanced ? 'btn-advanced' : 'btn-simple');
  const orig = btn.textContent;
  btn.textContent = '✓ Copied!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
}

document.getElementById('btn-add').addEventListener('click', addItem);
document.getElementById('btn-calc').addEventListener('click', calculate);
document.getElementById('btn-simple').addEventListener('click', () => copyText(false));
document.getElementById('btn-advanced').addEventListener('click', () => copyText(true));
document.getElementById('new-price').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
document.getElementById('new-desc').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('new-price').focus(); });

populateSelects();
</script>
</body>
</html>
