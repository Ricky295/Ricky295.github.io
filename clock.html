<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TFT Desktop Clock</title>
<style>
  :root {
    --panel-bg: #16181d;
    --panel-border: #33363e;
    --text-dim: #8b8f99;
    --text: #e4e6eb;
    --accent: #5ac8fa;
  }
  html, body {
    margin: 0; height: 100%;
    background: #0a0b0d;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #stage {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    width: 100%;
    height: 100%;
    padding: 20px;
    box-sizing: border-box;
  }
  #wrap {
    position: relative;
    flex: 1 1 auto;
    max-width: 78vmin;
    height: 62vmin;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    width: 100%; height: 100%;
    image-rendering: pixelated;
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
  }
  #topControls {
    position: fixed;
    top: 16px; right: 16px;
    display: flex; gap: 8px;
    z-index: 10;
  }
  #topControls select, #topControls button {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    background: #1a1a1a;
    color: #ddd;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 6px 10px;
    cursor: pointer;
  }
  #topControls select:hover, #topControls button:hover { border-color: #888; }
  #hint {
    position: fixed;
    bottom: 14px;
    left: 50%; transform: translateX(-50%);
    color: #555;
    font-size: 11px;
    letter-spacing: 0.5px;
  }

  /* ---- Layout editor ---- */
  #editorPanel {
    display: none;
    flex-direction: column;
    width: 340px;
    max-height: 84vh;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    color: var(--text);
    overflow: hidden;
  }
  #editorPanel.open { display: flex; }
  #editorHeader {
    padding: 12px 14px;
    border-bottom: 1px solid var(--panel-border);
    display: flex; align-items: center; justify-content: space-between;
  }
  #editorHeader h3 {
    margin: 0; font-size: 12px; letter-spacing: 0.6px;
    text-transform: uppercase; color: var(--text-dim);
  }
  #bgColorRow {
    display: flex; align-items: center; gap: 6px;
  }
  #bgColorRow input[type="color"] {
    width: 26px; height: 20px; border: 1px solid #444; border-radius: 4px; padding: 0; background: none; cursor: pointer;
  }
  #bgColorRow label { font-size: 10px; color: var(--text-dim); }

  #componentList {
    overflow-y: auto;
    flex: 1;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .compCard {
    background: #1d2026;
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 10px;
  }
  .compCardHead {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .compCardHead select {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    background: #12141a;
    color: var(--text);
    border: 1px solid #3a3d46;
    border-radius: 4px;
    padding: 4px 6px;
  }
  .compCardHead .cardBtns { display: flex; gap: 4px; }
  .compCardHead button {
    font-size: 10px;
    background: #262a32;
    color: #ccc;
    border: 1px solid #3a3d46;
    border-radius: 4px;
    padding: 3px 6px;
    cursor: pointer;
  }
  .compCardHead button:hover { border-color: #666; }
  .fieldGrid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 8px;
  }
  .fieldGrid.wide { grid-template-columns: 1fr; }
  .field {
    display: flex; flex-direction: column; gap: 2px;
  }
  .field label {
    font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.3px;
  }
  .field input, .field select {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    background: #12141a;
    color: var(--text);
    border: 1px solid #3a3d46;
    border-radius: 4px;
    padding: 4px 5px;
    width: 100%;
    box-sizing: border-box;
  }
  .field input[type="color"] {
    padding: 0; height: 24px; cursor: pointer;
  }
  #editorFooter {
    padding: 10px 14px;
    border-top: 1px solid var(--panel-border);
    display: flex; flex-direction: column; gap: 8px;
  }
  #addRow { display: flex; gap: 6px; }
  #addRow select { flex: 1; }
  #footerBtns { display: flex; gap: 6px; }
  #editorFooter select, #editorFooter button {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    background: #262a32;
    color: var(--text);
    border: 1px solid #3a3d46;
    border-radius: 6px;
    padding: 6px 8px;
    cursor: pointer;
  }
  #footerBtns button { flex: 1; }
  #editorFooter button:hover { border-color: #777; }
  #copyStatus {
    font-size: 10px;
    color: #6fcf97;
    text-align: center;
    min-height: 12px;
  }
</style>
</head>
<body>

<div id="topControls">
  <select id="presetSelect"></select>
  <button id="editBtn" title="Edit layout">Layout</button>
  <button id="helpBtn" title="Toggle help (C)">?</button>
</div>

<div id="stage">
  <div id="editorPanel">
    <div id="editorHeader">
      <h3>Layout Editor</h3>
      <div id="bgColorRow">
        <label>BG</label>
        <input type="color" id="bgColor">
      </div>
    </div>
    <div id="componentList"></div>
    <div id="editorFooter">
      <div id="addRow">
        <select id="addTypeSelect">
          <option value="digital_datetime">Digital date/time</option>
          <option value="countdown_timer">Countdown (text)</option>
          <option value="bar_countdown">Countdown (bar)</option>
          <option value="percent_countdown">Countdown (%)</option>
          <option value="analog_hand">Analog hand</option>
          <option value="face_circle">Clock face ring</option>
        </select>
        <button id="addCompBtn">+ Add</button>
      </div>
      <div id="footerBtns">
        <button id="resetLayoutBtn">Reset to preset</button>
        <button id="copyLayoutBtn">Copy JSON</button>
      </div>
      <div id="copyStatus"></div>
    </div>
  </div>

  <div id="wrap">
    <canvas id="clock"></canvas>
  </div>
</div>

<div id="hint">press [C] for controls</div>

<script>
/* =========================================================
   Component-driven config, same shape as the original
   MicroPython/tkinter JSON, now fully editable at runtime.
   ========================================================= */

const BASE_W = 160, BASE_H = 128;
const SLEEP_HOURS = [0, 8];
const SLEEP_TIMEZONE = 0;

const PRESETS = {
  classic: {
    label: "Classic TFT",
    background: "#000000",
    components: [
      { type: "digital_datetime", format: "HH:mm:SS", position: [60,70], color: "#ffff00", timezone:0, scale:1 },
      { type: "digital_datetime", format: "DD-MM-YY", position: [60,80], color: "#00ffff", timezone:0, scale:1 },
      { type: "countdown_timer", end_date: "2026-10-31T00:00:00", repetition:365, format:"Dd", position:[5,116], color:"#ff8000", timezone:0, scale:1 },
      { type: "bar_countdown", end_date: "2026-10-31T00:00:00", repetition:365, position:[5,13], size:[10,100], direction:0, color:"#ff8000", timezone:0, countup:1 },
      { type: "percent_countdown", end_date: "2026-10-31T00:00:00", repetition:365, position:[5,3], decimals:2, color:"#ffff00", timezone:0, countup:1, scale:1 },
      { type: "countdown_timer", end_date: "2026-12-25T00:00:00", repetition:365, format:"Dd", position:[140,116], color:"#00ffff", timezone:0, scale:1 },
      { type: "bar_countdown", end_date: "2026-12-25T00:00:00", repetition:365, position:[145,13], size:[10,100], direction:0, color:"#3377ff", timezone:0, countup:1 },
      { type: "percent_countdown", end_date: "2026-12-25T00:00:00", repetition:365, position:[120,3], decimals:2, color:"#ffff00", timezone:0, countup:1, scale:1 },
      { type: "analog_hand", length:40, width:4, position:[80,64], duration:60, color:"#ffff00", timezone:0 },
      { type: "analog_hand", length:30, width:4, position:[80,64], duration:3600, color:"#ff0000", timezone:0 },
      { type: "analog_hand", length:20, width:6, position:[80,64], duration:43200, color:"#00ff40", timezone:0 },
      { type: "face_circle", radius:60, notches:12, length:10, style:3, color:"#ffff00", position:[80,64] },
      { type: "face_circle", radius:60, notches:60, length:5, style:2, color:"#ffff00", position:[80,64] }
    ]
  },
  amber: {
    label: "Amber Terminal",
    background: "#0c0700",
    components: [
      { type: "digital_datetime", format: "HH:mm:SS", position: [60,70], color: "#ffb000", timezone:0, scale:1 },
      { type: "digital_datetime", format: "DD-MM-YY", position: [60,80], color: "#cc7a00", timezone:0, scale:1 },
      { type: "analog_hand", length:40, width:4, position:[80,64], duration:60, color:"#ffb000", timezone:0 },
      { type: "analog_hand", length:30, width:4, position:[80,64], duration:3600, color:"#ff9900", timezone:0 },
      { type: "analog_hand", length:20, width:6, position:[80,64], duration:43200, color:"#e08a00", timezone:0 },
      { type: "face_circle", radius:60, notches:12, length:10, style:3, color:"#ffb000", position:[80,64] },
      { type: "face_circle", radius:60, notches:60, length:5, style:2, color:"#7a4c00", position:[80,64] }
    ]
  },
  minimal: {
    label: "Minimal Digital",
    background: "#101014",
    components: [
      { type: "digital_datetime", format: "HH:mm:SS", position: [30,55], color: "#f2f2f2", timezone:0, scale:2 },
      { type: "digital_datetime", format: "DD-MM-YYYY", position: [30,90], color: "#666666", timezone:0, scale:1 }
    ]
  },
  countdownOnly: {
    label: "Countdown Board",
    background: "#0d0d0d",
    components: [
      { type: "countdown_timer", end_date: "2026-10-31T00:00:00", repetition:365, format:"Dd HhMm", position:[10,20], color:"#ff8000", timezone:0, scale:1.4 },
      { type: "bar_countdown", end_date: "2026-10-31T00:00:00", repetition:365, position:[10,45], size:[140,10], direction:1, color:"#ff8000", timezone:0, countup:1 },
      { type: "countdown_timer", end_date: "2026-12-25T00:00:00", repetition:365, format:"Dd HhMm", position:[10,75], color:"#22e0ff", timezone:0, scale:1.4 },
      { type: "bar_countdown", end_date: "2026-12-25T00:00:00", repetition:365, position:[10,100], size:[140,10], direction:1, color:"#22e0ff", timezone:0, countup:1 }
    ]
  }
};

/* Field schema per component type — drives the editor form */
const FIELD_SCHEMA = {
  digital_datetime: [
    { key: "format", label: "Format", type: "text", default: "HH:mm:SS" },
    { key: "posX", label: "X", type: "number", default: 60 },
    { key: "posY", label: "Y", type: "number", default: 70 },
    { key: "color", label: "Color", type: "color", default: "#ffffff" },
    { key: "scale", label: "Scale", type: "number", step: 0.1, default: 1 },
    { key: "timezone", label: "TZ offset", type: "number", default: 0 }
  ],
  countdown_timer: [
    { key: "end_date", label: "End date", type: "text", default: "2026-12-25T00:00:00" },
    { key: "format", label: "Format (D/H/M/S)", type: "text", default: "Dd" },
    { key: "posX", label: "X", type: "number", default: 10 },
    { key: "posY", label: "Y", type: "number", default: 100 },
    { key: "color", label: "Color", type: "color", default: "#ffffff" },
    { key: "scale", label: "Scale", type: "number", step: 0.1, default: 1 },
    { key: "repetition", label: "Repeat (days)", type: "number", default: 365 },
    { key: "timezone", label: "TZ offset", type: "number", default: 0 }
  ],
  bar_countdown: [
    { key: "end_date", label: "End date", type: "text", default: "2026-12-25T00:00:00" },
    { key: "posX", label: "X", type: "number", default: 10 },
    { key: "posY", label: "Y", type: "number", default: 10 },
    { key: "sizeW", label: "Width", type: "number", default: 10 },
    { key: "sizeH", label: "Height", type: "number", default: 100 },
    { key: "direction", label: "Direction (0-3)", type: "number", default: 0 },
    { key: "color", label: "Color", type: "color", default: "#ffffff" },
    { key: "countup", label: "Count up (0/1)", type: "number", default: 1 },
    { key: "repetition", label: "Repeat (days)", type: "number", default: 365 },
    { key: "timezone", label: "TZ offset", type: "number", default: 0 }
  ],
  percent_countdown: [
    { key: "end_date", label: "End date", type: "text", default: "2026-12-25T00:00:00" },
    { key: "posX", label: "X", type: "number", default: 10 },
    { key: "posY", label: "Y", type: "number", default: 3 },
    { key: "decimals", label: "Decimals", type: "number", default: 2 },
    { key: "color", label: "Color", type: "color", default: "#ffffff" },
    { key: "scale", label: "Scale", type: "number", step: 0.1, default: 1 },
    { key: "countup", label: "Count up (0/1)", type: "number", default: 1 },
    { key: "repetition", label: "Repeat (days)", type: "number", default: 365 },
    { key: "timezone", label: "TZ offset", type: "number", default: 0 }
  ],
  analog_hand: [
    { key: "posX", label: "Center X", type: "number", default: 80 },
    { key: "posY", label: "Center Y", type: "number", default: 64 },
    { key: "length", label: "Length", type: "number", default: 30 },
    { key: "width", label: "Width", type: "number", default: 4 },
    { key: "duration", label: "Duration (sec)", type: "number", default: 60 },
    { key: "color", label: "Color", type: "color", default: "#ffffff" },
    { key: "timezone", label: "TZ offset", type: "number", default: 0 }
  ],
  face_circle: [
    { key: "posX", label: "Center X", type: "number", default: 80 },
    { key: "posY", label: "Center Y", type: "number", default: 64 },
    { key: "radius", label: "Radius", type: "number", default: 60 },
    { key: "notches", label: "Notches", type: "number", default: 12 },
    { key: "length", label: "Tick length", type: "number", default: 10 },
    { key: "style", label: "Style (1/2/3)", type: "number", default: 3 },
    { key: "color", label: "Color", type: "color", default: "#ffffff" }
  ]
};

/* Convert a stored component (position:[x,y], size:[w,h]) into a flat
   form-friendly object, and back. Keeps the render-time shape identical
   to the original JSON structure. */
function toFormValues(c) {
  const v = { ...c };
  if (c.position) { v.posX = c.position[0]; v.posY = c.position[1]; }
  if (c.size) { v.sizeW = c.size[0]; v.sizeH = c.size[1]; }
  return v;
}
function fromFormValues(type, v) {
  const c = { type };
  for (const f of FIELD_SCHEMA[type]) {
    let val = v[f.key];
    if (f.type === "number") val = parseFloat(val);
    c[f.key] = val;
  }
  if ("posX" in c || "posY" in c) {
    c.position = [c.posX ?? 0, c.posY ?? 0];
    delete c.posX; delete c.posY;
  }
  if ("sizeW" in c || "sizeH" in c) {
    c.size = [c.sizeW ?? 10, c.sizeH ?? 10];
    delete c.sizeW; delete c.sizeH;
  }
  return c;
}
function defaultComponent(type) {
  const v = {};
  for (const f of FIELD_SCHEMA[type]) v[f.key] = f.default;
  return fromFormValues(type, v);
}

/* ---------- live state ---------- */
let currentPresetKey = "classic";
let CONFIG = JSON.parse(JSON.stringify(PRESETS[currentPresetKey]));
let scale = 1;
let showHelp = false;

const canvas = document.getElementById('clock');
const ctx = canvas.getContext('2d');

/* ---------- helpers ---------- */
function dateToTimestamp(dateStr, tzOffset) {
  const [datePart, timePart] = dateStr.split("T");
  const [y, m, d] = datePart.split("-").map(Number);
  const [hh, mm, ss] = timePart.split(":").map(Number);
  const ts = new Date(y, m - 1, d, hh, mm, ss).getTime() / 1000;
  return ts + tzOffset * 3600;
}
function pt([x, y]) { return [x * scale, y * scale]; }
function sz([w, h]) { return [w * scale, h * scale]; }

/* ---------- drawing primitives ---------- */
function drawFaceCircle(c) {
  const [cx, cy] = pt(c.position);
  const r = c.radius * scale;
  ctx.strokeStyle = c.color;
  ctx.lineWidth = Math.max(1, scale / 2);
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.stroke();

  if (c.style === 2 || c.style === 3) {
    ctx.lineWidth = Math.max(1, scale / 3);
    for (let i = 0; i < c.notches; i++) {
      const angle = (360 / c.notches) * i * Math.PI / 180;
      const x1 = cx + (r - c.length * scale) * Math.cos(angle);
      const y1 = cy + (r - c.length * scale) * Math.sin(angle);
      const x2 = cx + r * Math.cos(angle);
      const y2 = cy + r * Math.sin(angle);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
  }

  if (c.style === 1 || c.style === 3) {
    ctx.fillStyle = c.color;
    ctx.font = `bold ${Math.max(6, 7 * scale / 2)}px 'Courier New', monospace`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    for (let i = 1; i <= 12; i++) {
      const angle = ((360 / 12) * i - 90) * Math.PI / 180;
      const tx = cx + (r - (c.length + 8) * scale) * Math.cos(angle);
      const ty = cy + (r - (c.length + 8) * scale) * Math.sin(angle);
      ctx.fillText(String(i), tx, ty);
    }
  }
}

function drawAnalogHand(c, angleDeg) {
  const [cx, cy] = pt(c.position);
  const angleRad = angleDeg * Math.PI / 180;
  const x = cx + c.length * scale * Math.cos(angleRad);
  const y = cy + c.length * scale * Math.sin(angleRad);
  ctx.strokeStyle = c.color;
  ctx.lineWidth = Math.max(1, (c.width || 2) * scale / 3);
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(x, y);
  ctx.stroke();
}

function formatDateTime(c) {
  const now = new Date();
  const hour = (now.getHours() + c.timezone) % 24;
  let f = c.format;
  f = f.replace("YYYY", String(now.getFullYear()).padStart(4, "0"));
  f = f.replace("YY", String(now.getFullYear() - 2000).padStart(2, "0"));
  f = f.replace("MM", String(now.getMonth() + 1).padStart(2, "0"));
  f = f.replace("M", String(now.getMonth() + 1));
  f = f.replace("DD", String(now.getDate()).padStart(2, "0"));
  f = f.replace("HH", String(hour).padStart(2, "0"));
  f = f.replace("H", String(hour));
  f = f.replace("mm", String(now.getMinutes()).padStart(2, "0"));
  f = f.replace("SS", String(now.getSeconds()).padStart(2, "0"));
  return f;
}

function drawDigitalDatetime(c) {
  const text = formatDateTime(c);
  const [x, y] = pt(c.position);
  ctx.fillStyle = c.color;
  ctx.font = `bold ${Math.max(5, 8 * scale * c.scale / 2)}px 'Courier New', monospace`;
  ctx.textAlign = "left";
  ctx.textBaseline = "top";
  ctx.fillText(text, x, y);
}

function remainingSeconds(c) {
  let endTs = dateToTimestamp(c.end_date, c.timezone);
  const nowTs = Date.now() / 1000;
  let remaining = endTs - nowTs;
  if (remaining < 0 && c.repetition) {
    const daysPassed = Math.floor((nowTs - endTs) / (c.repetition * 86400)) + 1;
    endTs += daysPassed * c.repetition * 86400;
    remaining = endTs - nowTs;
  }
  return remaining;
}

function drawCountdownTimer(c) {
  const remaining = Math.max(0, remainingSeconds(c));
  const days = Math.floor(remaining / 86400);
  const hours = Math.floor((remaining % 86400) / 3600);
  const minutes = Math.floor((remaining % 3600) / 60);
  const seconds = Math.floor(remaining % 60);

  let f = c.format;
  f = f.replace("D", String(days));
  f = f.replace("H", String(hours));
  f = f.replace("M", String(minutes));
  f = f.replace("S", String(seconds));

  const [x, y] = pt(c.position);
  ctx.fillStyle = c.color;
  ctx.font = `bold ${Math.max(5, 8 * scale * c.scale / 2)}px 'Courier New', monospace`;
  ctx.textAlign = "left";
  ctx.textBaseline = "top";
  ctx.fillText(f, x, y);
}

function drawBarCountdown(c) {
  const remaining = remainingSeconds(c);
  const totalSpan = c.repetition * 86400;
  let fullness = remaining / totalSpan;
  if (c.countup % 2 === 1) fullness = 1 - fullness;
  fullness = Math.max(0, Math.min(1, fullness));

  const [x, y] = pt(c.position);
  const [w, h] = sz(c.size);
  ctx.fillStyle = c.color;

  const d = ((c.direction % 4) + 4) % 4;
  ctx.beginPath();
  if (d === 0) ctx.rect(x, y + (1 - fullness) * h, w, fullness * h);
  else if (d === 1) ctx.rect(x, y, w * fullness, h);
  else if (d === 2) ctx.rect(x, y, w, fullness * h);
  else if (d === 3) ctx.rect(x + (1 - fullness) * w, y, fullness * w, h);
  ctx.fill();

  ctx.strokeStyle = "white";
  ctx.lineWidth = Math.max(1, scale / 4);
  ctx.strokeRect(x, y, w, h);
}

function drawPercentCountdown(c) {
  const remaining = remainingSeconds(c);
  const totalSpan = c.repetition * 86400;
  let fullness = (remaining / totalSpan) * 100;
  if (c.countup % 2 === 1) fullness = 100 - fullness;
  fullness = Math.max(0, Math.min(100, fullness));

  const [x, y] = pt(c.position);
  ctx.fillStyle = c.color;
  ctx.font = `bold ${Math.max(5, 8 * scale * c.scale / 2)}px 'Courier New', monospace`;
  ctx.textAlign = "left";
  ctx.textBaseline = "top";
  ctx.fillText(`${fullness.toFixed(c.decimals)}%`, x, y);
}

/* ---------- sleep overlay ---------- */
function inSleepWindow() {
  const hour = (new Date().getHours() + SLEEP_TIMEZONE) % 24;
  return hour >= SLEEP_HOURS[0] && hour < SLEEP_HOURS[1];
}
function applyBacklight() {
  if (inSleepWindow()) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, 0, BASE_W * scale, BASE_H * scale);
  }
}

/* ---------- HUD ---------- */
function drawHud() {
  if (!showHelp) return;
  const margin = 10 * scale;
  ctx.fillStyle = "#111111";
  ctx.strokeStyle = "white";
  ctx.lineWidth = 1;
  ctx.fillRect(margin, margin, BASE_W * scale - margin * 2, BASE_H * scale - margin * 2);
  ctx.strokeRect(margin, margin, BASE_W * scale - margin * 2, BASE_H * scale - margin * 2);

  const lines = [
    "=== TFT WIDGET CONTROLS ===",
    "",
    "[C] Toggle this guide",
    "Layout button: top right",
    "",
    `Sleep Mode: ${inSleepWindow() ? "Active" : "Off"} (00:00-08:00)`
  ];
  ctx.fillStyle = "white";
  ctx.font = `${Math.max(7, 6 * scale / 1.5)}px 'Courier New', monospace`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  const lineHeight = Math.max(9, 8 * scale / 1.5);
  const startY = BASE_H * scale / 2 - (lines.length - 1) * lineHeight / 2;
  lines.forEach((line, i) => ctx.fillText(line, BASE_W * scale / 2, startY + i * lineHeight));
}

/* ---------- main redraw ---------- */
function redraw() {
  ctx.clearRect(0, 0, BASE_W * scale, BASE_H * scale);
  ctx.fillStyle = CONFIG.background;
  ctx.fillRect(0, 0, BASE_W * scale, BASE_H * scale);

  const now = new Date();

  for (const c of CONFIG.components) {
    try {
      switch (c.type) {
        case "face_circle": drawFaceCircle(c); break;
        case "digital_datetime": drawDigitalDatetime(c); break;
        case "countdown_timer": drawCountdownTimer(c); break;
        case "bar_countdown": drawBarCountdown(c); break;
        case "percent_countdown": drawPercentCountdown(c); break;
        case "analog_hand": {
          const seconds = (now.getHours() + c.timezone) * 3600 + now.getMinutes() * 60 + now.getSeconds();
          const handAngle = (seconds % c.duration) * (360 / c.duration) - 90;
          drawAnalogHand(c, handAngle);
          break;
        }
      }
    } catch (e) { /* skip a malformed component rather than crash the whole clock */ }
  }

  applyBacklight();
  drawHud();
}

/* ---------- resize handling (locks 5:4 aspect) ---------- */
function resizeCanvas() {
  const wrap = document.getElementById('wrap');
  const rect = wrap.getBoundingClientRect();
  let targetW, targetH;
  if (rect.width / rect.height > 5 / 4) {
    targetH = rect.height;
    targetW = targetH * (5 / 4);
  } else {
    targetW = rect.width;
    targetH = targetW * (4 / 5);
  }
  scale = targetW / BASE_W;

  const dpr = window.devicePixelRatio || 1;
  canvas.width = BASE_W * scale * dpr;
  canvas.height = BASE_H * scale * dpr;
  canvas.style.width = targetW + "px";
  canvas.style.height = targetH + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  redraw();
}

/* =========================================================
   Layout editor UI
   ========================================================= */
const presetSelect = document.getElementById('presetSelect');
for (const key in PRESETS) {
  const opt = document.createElement('option');
  opt.value = key;
  opt.textContent = PRESETS[key].label;
  presetSelect.appendChild(opt);
}
presetSelect.value = currentPresetKey;
presetSelect.addEventListener('change', () => {
  currentPresetKey = presetSelect.value;
  loadPreset(currentPresetKey);
});

function loadPreset(key) {
  CONFIG = JSON.parse(JSON.stringify(PRESETS[key]));
  bgColorInput.value = CONFIG.background;
  renderComponentList();
  redraw();
}

document.getElementById('helpBtn').addEventListener('click', () => {
  showHelp = !showHelp;
  redraw();
});

const editorPanel = document.getElementById('editorPanel');
const editBtn = document.getElementById('editBtn');
const componentList = document.getElementById('componentList');
const bgColorInput = document.getElementById('bgColor');
const addTypeSelect = document.getElementById('addTypeSelect');
const copyStatus = document.getElementById('copyStatus');

bgColorInput.value = CONFIG.background;
bgColorInput.addEventListener('input', () => {
  CONFIG.background = bgColorInput.value;
  redraw();
});

editBtn.addEventListener('click', () => {
  editorPanel.classList.toggle('open');
  if (editorPanel.classList.contains('open')) renderComponentList();
  requestAnimationFrame(resizeCanvas);
});

const TYPE_LABELS = {
  digital_datetime: "Digital date/time",
  countdown_timer: "Countdown (text)",
  bar_countdown: "Countdown (bar)",
  percent_countdown: "Countdown (%)",
  analog_hand: "Analog hand",
  face_circle: "Clock face ring"
};

function renderComponentList() {
  componentList.innerHTML = "";
  CONFIG.components.forEach((comp, index) => {
    componentList.appendChild(buildComponentCard(comp, index));
  });
}

function buildComponentCard(comp, index) {
  const card = document.createElement('div');
  card.className = 'compCard';

  const head = document.createElement('div');
  head.className = 'compCardHead';

  const typeSelect = document.createElement('select');
  for (const t in TYPE_LABELS) {
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = TYPE_LABELS[t];
    if (t === comp.type) opt.selected = true;
    typeSelect.appendChild(opt);
  }
  typeSelect.addEventListener('change', () => {
    CONFIG.components[index] = defaultComponent(typeSelect.value);
    renderComponentList();
    redraw();
  });

  const btns = document.createElement('div');
  btns.className = 'cardBtns';

  const upBtn = document.createElement('button');
  upBtn.textContent = '↑';
  upBtn.title = 'Move up (renders earlier / behind)';
  upBtn.addEventListener('click', () => {
    if (index === 0) return;
    const arr = CONFIG.components;
    [arr[index - 1], arr[index]] = [arr[index], arr[index - 1]];
    renderComponentList();
    redraw();
  });

  const downBtn = document.createElement('button');
  downBtn.textContent = '↓';
  downBtn.title = 'Move down (renders later / in front)';
  downBtn.addEventListener('click', () => {
    const arr = CONFIG.components;
    if (index === arr.length - 1) return;
    [arr[index + 1], arr[index]] = [arr[index], arr[index + 1]];
    renderComponentList();
    redraw();
  });

  const delBtn = document.createElement('button');
  delBtn.textContent = '✕';
  delBtn.title = 'Remove';
  delBtn.addEventListener('click', () => {
    CONFIG.components.splice(index, 1);
    renderComponentList();
    redraw();
  });

  btns.appendChild(upBtn);
  btns.appendChild(downBtn);
  btns.appendChild(delBtn);
  head.appendChild(typeSelect);
  head.appendChild(btns);
  card.appendChild(head);

  const grid = document.createElement('div');
  grid.className = 'fieldGrid';

  const formValues = toFormValues(comp);
  const schema = FIELD_SCHEMA[comp.type];

  schema.forEach(f => {
    const fieldWrap = document.createElement('div');
    fieldWrap.className = 'field';
    if (f.type === 'text' && f.key === 'end_date') fieldWrap.style.gridColumn = '1 / -1';

    const label = document.createElement('label');
    label.textContent = f.label;
    fieldWrap.appendChild(label);

    const input = document.createElement('input');
    input.type = f.type === 'color' ? 'color' : (f.type === 'number' ? 'number' : 'text');
    if (f.step) input.step = f.step;
    input.value = formValues[f.key] ?? f.default;

    input.addEventListener('input', () => {
      const updated = fromFormValues(comp.type, {
        ...toFormValues(CONFIG.components[index]),
        [f.key]: f.type === 'number' ? input.value : input.value
      });
      CONFIG.components[index] = updated;
      redraw();
    });

    fieldWrap.appendChild(input);
    grid.appendChild(fieldWrap);
  });

  card.appendChild(grid);
  return card;
}

document.getElementById('addCompBtn').addEventListener('click', () => {
  CONFIG.components.push(defaultComponent(addTypeSelect.value));
  renderComponentList();
  redraw();
  componentList.scrollTop = componentList.scrollHeight;
});

document.getElementById('resetLayoutBtn').addEventListener('click', () => {
  loadPreset(currentPresetKey);
});

document.getElementById('copyLayoutBtn').addEventListener('click', async () => {
  const json = JSON.stringify(CONFIG, null, 2);
  try {
    await navigator.clipboard.writeText(json);
    copyStatus.textContent = "Copied layout JSON to clipboard!";
  } catch {
    copyStatus.textContent = "Copy failed — select and copy manually.";
  }
  setTimeout(() => { copyStatus.textContent = ""; }, 2500);
});

window.addEventListener('keydown', (e) => {
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'SELECT') return; // don't hijack typing in the editor
  if (e.key === 'c' || e.key === 'C') {
    showHelp = !showHelp;
    redraw();
  }
});

window.addEventListener('resize', resizeCanvas);

/* ---------- boot ---------- */
resizeCanvas();
setInterval(redraw, 1000);
</script>
</body>
</html>
