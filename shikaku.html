<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shikaku - Premium Puzzle Experience</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
        },
      }
    }
  </script>

  <style>
    /* Premium range slider custom styles */
    input[type=range] {
      -webkit-appearance: none;
      background: transparent;
    }
    input[type=range]:focus {
      outline: none;
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 6px;
      cursor: pointer;
      background: #E2E8F0;
      border-radius: 9999px;
    }
    .dark input[type=range]::-webkit-slider-runnable-track {
      background: #334155;
    }
    input[type=range]::-webkit-slider-thumb {
      height: 18px;
      width: 18px;
      border-radius: 9999px;
      background: #4F46E5;
      cursor: pointer;
      -webkit-appearance: none;
      margin-top: -6px;
      box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2), 0 2px 4px -1px rgba(79, 70, 229, 0.1);
      transition: all 0.15s ease;
    }
    input[type=range]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      background: #4338CA;
    }
    .dark input[type=range]::-webkit-slider-thumb {
      background: #818CF8;
    }
    .dark input[type=range]::-webkit-slider-thumb:hover {
      background: #6366F1;
    }

    /* Print styling preserves pristine layouts */
    @media print {
      body {
        background: #ffffff !important;
        color: #000000 !important;
      }
      #app {
        display: none !important;
      }
      #print-area {
        display: block !important;
      }
    }
    #print-area {
      display: none;
    }
    .print-page {
      page-break-after: always;
      padding: 24px;
      font-family: sans-serif;
    }
    .print-page:last-child {
      page-break-after: avoid;
    }
    .print-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
    }
    .print-sub {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin-bottom: 16px;
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-300 flex items-center justify-center p-4">

  <div id="app" class="w-full max-w-md bg-white dark:bg-slate-900 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800 p-6 md:p-8 space-y-6">

    </div>

    <!-- PLAY INTERFACE -->
    <div id="play-ui" class="space-y-6">
      <!-- Dimensions sliders -->

        <div class="space-y-2 bg-slate-50 dark:bg-slate-800/40 p-3 rounded-2xl border border-slate-100 dark:border-slate-800">

        <div class="space-y-2 bg-slate-50 dark:bg-slate-800/40 p-3 rounded-2xl border border-slate-100 dark:border-slate-800">

      <!-- Difficulty Gauge -->

        </div>

      <!-- Live Stats Panel -->

        <div class="py-1 px-2 border-r border-slate-200 dark:border-slate-700">

      <!-- Status Message Panel -->
      <div class="msg min-h-[36px] flex items-center justify-center text-sm font-medium rounded-xl px-4 text-center transition-all duration-200" id="play-msg"></div>

      <!-- Game Controllers -->
      <div class="flex gap-3 relative">
        <button class="flex-1 py-3 px-4 font-bold text-sm text-white bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-500 dark:hover:bg-indigo-600 rounded-2xl transition shadow-lg shadow-indigo-200 dark:shadow-none hover:-translate-y-0.5 active:translate-y-0" onclick="newGame()">
          New Puzzle

        <div class="drop-wrap relative w-2/5">

            Print ▾

          <!-- Elegant dropdown context -->

            <button class="drop-item w-full px-4 py-2.5 text-left text-xs font-semibold hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300" onclick="doPrint('puzzle')">Print Puzzle</button>
            <button class="drop-item w-full px-4 py-2.5 text-left text-xs font-semibold hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300" onclick="doPrint('solution')">With Solution</button>
            <button class="drop-item w-full px-4 py-2.5 text-left text-xs font-semibold hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300" onclick="doPrint('compact')">Print Compact</button>
            <button class="drop-item w-full px-4 py-2.5 text-left text-xs font-semibold hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300" onclick="doPrint('bw-solution')">B&W Solution</button>
            <button class="drop-item w-full px-4 py-2.5 text-left text-xs font-semibold hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300" onclick="doPrint('bw-compact')">B&W Compact</button>
          </div>
        </div>
      </div>

      <!-- Sharing Panel -->
      <div class="share-row flex gap-2 bg-slate-50 dark:bg-slate-800/30 p-2 rounded-2xl border border-slate-150 dark:border-slate-800">
        <input type="text" id="share-input" placeholder="Paste code to load…" spellcheck="false" class="flex-1 bg-white dark:bg-slate-800/50 text-slate-700 dark:text-slate-200 font-mono text-xs px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/40">
        <button class="px-4 py-2 font-bold text-xs text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-950/40 hover:bg-indigo-100 dark:hover:bg-indigo-950 rounded-xl transition" onclick="copyCode()">Copy</button>
        <button class="px-4 py-2 font-bold text-xs text-white bg-slate-800 dark:bg-slate-700 hover:bg-slate-900 dark:hover:bg-slate-600 rounded-xl transition" onclick="loadCode()">Load</button>
      </div>
    </div>

    <!-- CONSTRUCTOR INTERFACE -->
    <div id="edit-ui" class="space-y-6" style="display:none">
      <!-- Edit Dimension Sliders -->
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-2 bg-slate-50 dark:bg-slate-800/40 p-3 rounded-2xl border border-slate-100 dark:border-slate-800">
          <div class="flex justify-between text-xs font-semibold text-slate-500 dark:text-slate-400">
            <span>Rows</span>
            <span id="erows-val" class="text-violet-600 dark:text-violet-400 font-bold">6</span>
          </div>
          <input type="range" id="erows-slider" min="5" max="12" value="6" oninput="onEditSlider()" class="w-full">
        </div>
        <div class="space-y-2 bg-slate-50 dark:bg-slate-800/40 p-3 rounded-2xl border border-slate-100 dark:border-slate-800">
          <div class="flex justify-between text-xs font-semibold text-slate-500 dark:text-slate-400">
            <span>Cols</span>
            <span id="ecols-val" class="text-violet-600 dark:text-violet-400 font-bold">6</span>
          </div>
          <input type="range" id="ecols-slider" min="5" max="12" value="6" oninput="onEditSlider()" class="w-full">
        </div>
      </div>

      <!-- Edit Canvas wrap -->
      <div class="grid-wrap flex justify-center bg-slate-50 dark:bg-slate-900/40 p-4 rounded-3xl border border-dashed border-slate-200 dark:border-slate-800">
        <canvas id="edit-canvas" style="cursor:cell" class="border border-slate-200 dark:border-slate-700 rounded-2xl shadow-inner max-w-full touch-none"></canvas>
      </div>

      <div class="msg min-h-[36px] flex items-center justify-center text-sm font-medium rounded-xl px-4 text-center text-slate-500 dark:text-slate-400 bg-slate-50 dark:bg-slate-800/20" id="edit-msg">
        Click a cell and type a number
      </div>

      <!-- Editor Buttons -->
      <div class="flex gap-3">
        <button class="flex-1 py-3 px-4 font-semibold text-sm text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-700 rounded-2xl transition hover:-translate-y-0.5 active:translate-y-0" onclick="editClear()">
          Clear Grid
        </button>
        <button id="play-btn" class="flex-[1.5] py-3 px-4 font-bold text-sm text-white bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 rounded-2xl transition shadow-lg shadow-emerald-100 dark:shadow-none hover:-translate-y-0.5 active:translate-y-0 hidden" onclick="playFromEditor()">
          ▶ Play This Puzzle
        </button>
      </div>

      <!-- Editor Share Area -->
      <div class="share-row flex gap-2 bg-slate-50 dark:bg-slate-800/30 p-2 rounded-2xl border border-slate-150 dark:border-slate-800">
        <input type="text" id="edit-share" placeholder="Code appears when puzzle is valid…" spellcheck="false" readonly class="flex-1 bg-white dark:bg-slate-800/50 text-slate-700 dark:text-slate-200 font-mono text-xs px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-xl focus:outline-none">
        <button class="px-5 py-2 font-bold text-xs text-violet-600 dark:text-violet-400 bg-violet-50 dark:bg-violet-950/40 hover:bg-violet-100 dark:hover:bg-violet-950 rounded-xl transition" onclick="copyEditCode()">Copy</button>
      </div>
    </div>

  </div>

  <div id="print-area"></div>

  <script>
    // ── RNG ───────────────────────────────────────────────────────────────────────
    function mulberry32(seed) {
      return function() {
        seed = (seed + 0x6D2B79F5) | 0;
        var t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    // ── Encoding ──────────────────────────────────────────────────────────────────
    var B64 = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
    function encodeSize(r,c){return B64[(r-5)*8+(c-5)];}
    function decodeSize(ch){var v=B64.indexOf(ch);return{rows:Math.floor(v/8)+5,cols:v%8+5};}
    function pad2(n){return n.toString(36).padStart(2,'0');}
    function buildCode(rows,cols,clues){
      var s=encodeSize(rows,cols);
      for(var i=0;i<clues.length;i++) s+=pad2(clues[i].r*cols+clues[i].c)+pad2(clues[i].n);
      return s;
    }
    function parseCode(code){
      var sz=decodeSize(code[0]),rows=sz.rows,cols=sz.cols,clues=[];
      for(var i=1;i<code.length;i+=4){
        var idx=parseInt(code.slice(i,i+2),36);
        var n=parseInt(code.slice(i+2,i+4),36);
        clues.push({r:Math.floor(idx/cols),c:idx%cols,n:n});
      }
      return{rows:rows,cols:cols,clues:clues};
    }

    // ── Core ──────────────────────────────────────────────────────────────────────
    function candidatesForClue(R,C,cl){
      var area=cl.n,res=[];
      for(var h=1;h<=R;h++){
        if(area%h!==0) continue;
        var w=area/h; if(w>C) continue;
        var y0=cl.r-h+1; if(y0<0)y0=0;
        for(var y=y0;y<=cl.r&&y+h<=R;y++){
          var x0=cl.c-w+1; if(x0<0)x0=0;
          for(var x=x0;x<=cl.c&&x+w<=C;x++) res.push({x:x,y:y,w:w,h:h});
        }
      }
      return res;
    }
    function computeDifficulty(R,C,cl){
      var d=1;
      for(var i=0;i<cl.length;i++) d*=Math.max(1,candidatesForClue(R,C,cl[i]).length);
      return Math.log10(Math.max(1,d));
    }
    function diffLabel(d){return d<10?'Easy':d<15?'Medium':'Hard';}
    function diffColor(d){
      var t=Math.min(1,d/20);
      if(t<0.5){var u=t*2;return'rgb('+Math.round(16+u*170)+','+Math.round(185-u*35)+','+Math.round(129-u*78)+')';}
      var u=(t-0.5)*2;return'rgb('+Math.round(186+u*50)+','+Math.round(150-u*90)+','+Math.round(51+u*20)+')';
    }
    function computeScore(d,cs){return Math.round(d/Math.max(1/6000,cs/6000)*1000);}

    function solve(R,C,clueList,limit){
      var occ=new Int8Array(R*C).fill(-1),sols=[],placed=[];
      for(var i=0;i<clueList.length;i++) placed.push(null);
      var pre=[];
      for(var i=0;i<clueList.length;i++) pre.push(candidatesForClue(R,C,clueList[i]));
      function bt(i){
        if(sols.length>=limit) return;
        if(i===clueList.length){
          var full=true;
          for(var k=0;k<occ.length;k++) if(occ[k]<0){full=false;break;}
          if(full){var s=[];for(var k=0;k<placed.length;k++) s.push({x:placed[k].x,y:placed[k].y,w:placed[k].w,h:placed[k].h});sols.push(s);}
          return;
        }
        for(var j=0;j<pre[i].length;j++){
          var rect=pre[i][j],ok=true;
          outer:for(var rr=rect.y;rr<rect.y+rect.h;rr++)
            for(var cc=rect.x;cc<rect.x+rect.w;cc++)
              if(occ[rr*C+cc]>=0){ok=false;break outer;}
          if(!ok) continue;
          for(var rr=rect.y;rr<rect.y+rect.h;rr++) for(var cc=rect.x;cc<rect.x+rect.w;cc++) occ[rr*C+cc]=i;
          placed[i]=rect; bt(i+1);
          for(var rr=rect.y;rr<rect.y+rect.h;rr++) for(var cc=rect.x;cc<rect.x+rect.w;cc++) occ[rr*C+cc]=-1;
          placed[i]=null;
          if(sols.length>=limit) return;
        }
      }
      bt(0); return sols;
    }
    function partitionGrid(R,C,rng){
      var grid=new Int8Array(R*C).fill(-1),rects=[],id=0;
      var minC=Math.max(4,Math.floor((R+C)/2)-1),maxC=R*2;
      for(var r=0;r<R;r++){
        for(var c=0;c<C;c++){
          if(grid[r*C+c]>=0) continue;
          var opts=[];
          for(var h=1;r+h<=R;h++){
            var cf=true;
            for(var rr=r;rr<r+h;rr++) if(grid[rr*C+c]>=0){cf=false;break;}
            if(!cf) break;
            for(var w=1;c+w<=C;w++){
              var area=h*w;
              if(area>Math.ceil(R*C*0.3)) break;
              var ok=true;
              outer2:for(var rr=r;rr<r+h;rr++) for(var cc=c;cc<c+w;cc++) if(grid[rr*C+cc]>=0){ok=false;break outer2;}
              if(ok) opts.push({x:c,y:r,w:w,h:h});
            }
          }
          if(!opts.length) return null;
          var pick=opts[Math.floor(rng()*Math.min(opts.length,8))];
          for(var rr=pick.y;rr<pick.y+pick.h;rr++) for(var cc=pick.x;cc<pick.x+pick.w;cc++) grid[rr*C+cc]=id;
          rects.push(pick); id++;
        }
      }
      if(rects.length<minC||rects.length>maxC) return null;
      return rects;
    }
    function pickClues(rects,rng){
      var res=[];
      for(var i=0;i<rects.length;i++){
        var r=rects[i];
        res.push({r:r.y+Math.floor(rng()*r.h),c:r.x+Math.floor(rng()*r.w),n:r.w*r.h});
      }
      return res;
    }
    function generatePuzzle(R,C,seed){
      for(var i=0;i<400;i++){
        var rng=mulberry32(seed+i*997);
        var p=partitionGrid(R,C,rng); if(!p) continue;
        var cl=pickClues(p,rng);
        if(solve(R,C,cl,2).length===1) return cl;
      }
      return null;
    }

    // ── Canvas rendering ──────────────────────────────────────────────────────────
    var TL=['rgba(99,102,241,0.18)','rgba(16,185,129,0.18)','rgba(244,63,94,0.18)','rgba(217,70,239,0.18)','rgba(6,182,212,0.18)','rgba(245,158,11,0.18)','rgba(139,92,246,0.18)'];
    var TD=['rgba(99,102,241,0.25)','rgba(16,185,129,0.25)','rgba(244,63,94,0.25)','rgba(217,70,239,0.25)','rgba(6,182,212,0.25)','rgba(245,158,11,0.25)','rgba(139,92,246,0.25)'];
    var SL=['rgba(79,70,229,0.7)','rgba(5,150,105,0.7)','rgba(225,29,72,0.7)','rgba(192,38,211,0.7)','rgba(8,145,178,0.7)','rgba(217,119,6,0.7)','rgba(124,58,237,0.7)'];
    var SD=['rgba(129,140,248,0.7)','rgba(52,211,153,0.7)','rgba(251,113,133,0.7)','rgba(240,119,252,0.7)','rgba(34,211,238,0.7)','rgba(251,191,36,0.7)','rgba(167,139,250,0.7)'];
    var BW_FILLS=['rgba(0,0,0,0.06)','rgba(0,0,0,0.12)','rgba(0,0,0,0.18)','rgba(0,0,0,0.08)','rgba(0,0,0,0.14)','rgba(0,0,0,0.10)','rgba(0,0,0,0.16)'];

    function isDark(){return window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;}
    function getWrapSize(id){
      var el=document.getElementById(id);
      return Math.min(el?el.clientWidth||420:420,420);
    }

    function renderPuzzle(ctx,R,C,CELL,clues,rects,mode,selR,selC,typing){
      var dark=(mode==='play')&&isDark();
      var gap=Math.max(1,Math.round(CELL*0.04));
      var radius=Math.max(4,Math.round(CELL*0.12));
      ctx.clearRect(0,0,C*CELL,R*CELL);
      ctx.fillStyle=dark?'#0f172a':'#ffffff';
      ctx.fillRect(0,0,C*CELL,R*CELL);

      // draw cell backgrounds (rounded)
      for(var row=0;row<R;row++){
        for(var col=0;col<C;col++){
          var x=col*CELL+gap, y=row*CELL+gap, w=CELL-gap*2, h=CELL-gap*2;
          ctx.fillStyle=dark?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.02)';
          ctx.beginPath(); ctx.roundRect(x,y,w,h,radius); ctx.fill();
          ctx.strokeStyle=dark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.03)';
          ctx.lineWidth=1;
          ctx.beginPath(); ctx.roundRect(x,y,w,h,radius); ctx.stroke();
        }
      }

      // draw rectangles
      var tints=(mode==='print-bw-solution')?BW_FILLS:(dark?TD:TL);
      var strks=(mode==='print-bw-solution')?BW_FILLS.map(function(){return'rgba(0,0,0,0.5)'}):(dark?SD:SL);
      if(rects&&(mode==='play'||mode==='print-solution'||mode==='print-bw-solution')){
        for(var i=0;i<rects.length;i++){
          var r=rects[i];
          var x=r.x*CELL+gap, y=r.y*CELL+gap, w=r.w*CELL-gap*2, h=r.h*CELL-gap*2;
          ctx.fillStyle=tints[i%tints.length];
          ctx.beginPath(); ctx.roundRect(x,y,w,h,radius); ctx.fill();
          ctx.strokeStyle=strks[i%strks.length]; ctx.lineWidth=2.5; ctx.setLineDash([]);
          ctx.beginPath(); ctx.roundRect(x+1,y+1,w-2,h-2,radius); ctx.stroke();
        }
      }

      // clue numbers
      if(!clues) return;
      var sz=Math.max(12,Math.min(24,CELL*0.44));
      ctx.font='700 '+sz+'px "Plus Jakarta Sans",sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      for(var i=0;i<clues.length;i++){
        var cl=clues[i];
        var cx=cl.c*CELL+CELL/2, cy=cl.r*CELL+CELL/2;
        ctx.fillStyle=dark?'#e2e8f0':'#1e293b';
        ctx.fillText(cl.n,cx,cy);
      }
    }

    // ── Print ─────────────────────────────────────────────────────────────────────
    function makePrintCanvas(R,C,clues,rects,bw){
      var CELL=56, canv=document.createElement('canvas');
      canv.width=C*CELL; canv.height=R*CELL;
      var mode=rects?(bw?'print-bw-solution':'print-solution'):'print-puzzle';
      renderPuzzle(canv.getContext('2d'),R,C,CELL,clues,rects,mode,-1,-1,'');
      return canv.toDataURL('image/png');
    }

          +'<div class="print-page"><div class="print-title">Solution</div><div class="print-sub"> </div><img src="'+imgS+'" style="max-width:100%;display:block;margin:0 auto"></div>';

    // ══════════════════════════════════════════════════════════════════
    // PLAY
    // ══════════════════════════════════════════════════════════════════
    var pR=6,pC=6,pCELL,pClues=null,pRects=[];
    var pDrag=false,pDS=null,pDC={c:0,r:0};
    var pSolved=false,pTID=null,pElapsed=0,pDiff=0,pBest={};
    var pCV=document.getElementById('play-canvas');
    var pCtx=pCV.getContext('2d');

    function onSlider(){
      document.getElementById('rows-val').textContent=document.getElementById('rows-slider').value;
      document.getElementById('cols-val').textContent=document.getElementById('cols-slider').value;
    }
    function pSetSize(){
      var sz=getWrapSize('play-ui') - 32; // deduct margin padding
      pCELL=Math.floor(sz/Math.max(pR,pC));
      pCV.width=pC*pCELL; pCV.height=pR*pCELL;
    }
    function pDraw(){
      var dark=isDark();
      var gap=Math.max(1,Math.round(pCELL*0.04));
      var radius=Math.max(4,Math.round(pCELL*0.12));
      pCtx.clearRect(0,0,pCV.width,pCV.height);
      pCtx.fillStyle=dark?'#0f172a':'#ffffff';
      pCtx.fillRect(0,0,pCV.width,pCV.height);

      // cell backgrounds
      for(var row=0;row<pR;row++) for(var col=0;col<pC;col++){
        pCtx.fillStyle=dark?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.02)';
        pCtx.beginPath(); pCtx.roundRect(col*pCELL+gap,row*pCELL+gap,pCELL-gap*2,pCELL-gap*2,radius); pCtx.fill();
        pCtx.strokeStyle=dark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.03)';
        pCtx.lineWidth=1;
        pCtx.beginPath(); pCtx.roundRect(col*pCELL+gap,row*pCELL+gap,pCELL-gap*2,pCELL-gap*2,radius); pCtx.stroke();
      }

      // user rects
      var tints=dark?TD:TL, strks=dark?SD:SL;
      for(var i=0;i<pRects.length;i++){
        var r=pRects[i];
        var x=r.x*pCELL+gap,y=r.y*pCELL+gap,w=r.w*pCELL-gap*2,h=r.h*pCELL-gap*2;
        pCtx.fillStyle=tints[i%tints.length];
        pCtx.beginPath(); pCtx.roundRect(x,y,w,h,radius); pCtx.fill();
        pCtx.strokeStyle=strks[i%strks.length]; pCtx.lineWidth=2.5; pCtx.setLineDash([]);
        pCtx.beginPath(); pCtx.roundRect(x+1,y+1,w-2,h-2,radius); pCtx.stroke();
      }

      // drag preview
      if(pDrag&&pDS){
        var c1=Math.min(pDS.c,pDC.c),r1=Math.min(pDS.r,pDC.r),c2=Math.max(pDS.c,pDC.c),r2=Math.max(pDS.r,pDC.r);
        var x=c1*pCELL+gap,y=r1*pCELL+gap,w=(c2-c1+1)*pCELL-gap*2,h=(r2-r1+1)*pCELL-gap*2;
        pCtx.fillStyle=dark?'rgba(99,102,241,0.15)':'rgba(79,70,229,0.08)';
        pCtx.beginPath(); pCtx.roundRect(x,y,w,h,radius); pCtx.fill();
        pCtx.strokeStyle=dark?'rgba(129,140,248,0.8)':'rgba(79,70,229,0.8)';
        pCtx.lineWidth=2; pCtx.setLineDash([4,3]);
        pCtx.beginPath(); pCtx.roundRect(x+1,y+1,w-2,h-2,radius); pCtx.stroke(); pCtx.setLineDash([]);
      }

      // clues
      if(!pClues) return;
      var sz=Math.max(12,Math.min(24,pCELL*0.44));
      pCtx.font='700 '+sz+'px "Plus Jakarta Sans",sans-serif';
      pCtx.textAlign='center'; pCtx.textBaseline='middle';
      for(var i=0;i<pClues.length;i++){
        var cl=pClues[i];
        pCtx.fillStyle=dark?'#e2e8f0':'#1e293b';
        pCtx.fillText(cl.n,cl.c*pCELL+pCELL/2,cl.r*pCELL+pCELL/2);
      }
    }
    function pReset(){
      clearInterval(pTID);pElapsed=0;pSolved=false;pClues=null;pDiff=0;pRects=[];pDrag=false;pDS=null;
      document.getElementById('score').textContent='—';
      document.getElementById('diff-val').textContent='—'; document.getElementById('diff-val').style.color='';
      document.getElementById('diff-lbl').textContent='generating…';
      document.getElementById('gauge-arrow').style.left='0%';
      pMsg(''); pUpdateTimer(); pDraw();
    }
    function pApply(cl){
      pClues=cl; pDiff=computeDifficulty(pR,pC,cl);
      var fmt=pDiff.toFixed(2);
      document.getElementById('diff-val').textContent=fmt; document.getElementById('diff-val').style.color=diffColor(pDiff);
      document.getElementById('diff-lbl').textContent=diffLabel(pDiff);
      document.getElementById('gauge-arrow').style.left=Math.min(100,pDiff/20*100)+'%';
      document.getElementById('share-input').value=buildCode(pR,pC,cl);
      pDraw();
      pTID=setInterval(function(){if(!pSolved){pElapsed++;pUpdateTimer();pUpdateScore();}},10);
    }
    function newGame(){
      pR=+document.getElementById('rows-slider').value;
      pC=+document.getElementById('cols-slider').value;
      pSetSize();pReset();
      var seed=Math.floor(Math.random()*0xFFFFFF);
      setTimeout(function(){
        var cl=generatePuzzle(pR,pC,seed);
        if(!cl){document.getElementById('diff-lbl').textContent='retrying…';setTimeout(newGame,50);return;}
        pApply(cl);
      },10);
    }
    function pUpdateTimer(){
      var m=Math.floor(pElapsed/6000),s=Math.floor((pElapsed%6000)/100),cs=pElapsed%100;
      document.getElementById('timer').textContent=m+':'+(s<10?'0':'')+s+'.'+(cs<10?'0':'')+cs;
    }
    function pUpdateScore(){
      if(!pDiff) return;
      document.getElementById('score').textContent=computeScore(pDiff,pElapsed).toLocaleString();
    }
    function pMsg(t,cls){
      var m=document.getElementById('play-msg');
      m.textContent=t;
      if (t === '') {
        m.className = 'msg min-h-[36px] flex items-center justify-center text-sm font-medium rounded-xl px-4 text-center transition-all duration-200';
      } else if (cls === 'win') {
        m.className = 'msg min-h-[36px] flex items-center justify-center text-sm font-semibold rounded-xl px-4 text-center transition-all duration-200 bg-emerald-50 dark:bg-emerald-950/40 text-emerald-600 dark:text-emerald-400 border border-emerald-100 dark:border-emerald-900/50';
      } else if (cls === 'err') {
        m.className = 'msg min-h-[36px] flex items-center justify-center text-sm font-semibold rounded-xl px-4 text-center transition-all duration-200 bg-rose-50 dark:bg-rose-950/40 text-rose-600 dark:text-rose-400 border border-rose-100 dark:border-rose-900/50';
      } else {
        m.className = 'msg min-h-[36px] flex items-center justify-center text-sm font-semibold rounded-xl px-4 text-center transition-all duration-200 bg-slate-50 dark:bg-slate-800/40 text-slate-600 dark:text-slate-400 border border-slate-100 dark:border-slate-800';
      }
    }
    function pCellAt(px,py){
      var r=pCV.getBoundingClientRect(),sx=pCV.width/r.width,sy=pCV.height/r.height;
      return{c:Math.floor((px-r.left)*sx/pCELL),r:Math.floor((py-r.top)*sy/pCELL)};
    }
    pCV.addEventListener('pointerdown',function(e){
      if(!pClues)return;e.preventDefault();
      var p=pCellAt(e.clientX,e.clientY);if(p.c<0||p.c>=pC||p.r<0||p.r>=pR)return;
      pDrag=true;pDS={c:p.c,r:p.r};pDC={c:p.c,r:p.r};pCV.setPointerCapture(e.pointerId);pDraw();
    });
    pCV.addEventListener('pointermove',function(e){
      if(!pDrag)return;e.preventDefault();
      var p=pCellAt(e.clientX,e.clientY);
      pDC={c:Math.max(0,Math.min(pC-1,p.c)),r:Math.max(0,Math.min(pR-1,p.r))};pDraw();
    });
    pCV.addEventListener('pointerup',function(e){
      if(!pDrag)return;pDrag=false;
      var c1=Math.min(pDS.c,pDC.c),r1=Math.min(pDS.r,pDC.r),c2=Math.max(pDS.c,pDC.c),r2=Math.max(pDS.r,pDC.r);
      var nr={x:c1,y:r1,w:c2-c1+1,h:r2-r1+1};
      pRects=pRects.filter(function(r){for(var rr=nr.y;rr<nr.y+nr.h;rr++) for(var cc=nr.x;cc<nr.x+nr.w;cc++) if(cc>=r.x&&cc<r.x+r.w&&rr>=r.y&&rr<r.y+r.h)return false;return true;});
      pRects.push(nr);pDS=null;pDraw();pAutoCheck();
    });
    function pAutoCheck(){
      if(!pClues||pSolved)return;
      var occ=new Int8Array(pR*pC).fill(-1),hasOverlap=false;
      for(var i=0;i<pRects.length;i++){var r=pRects[i];for(var rr=r.y;rr<r.y+r.h;rr++) for(var cc=r.x;cc<r.x+r.w;cc++){if(occ[rr*pC+cc]>=0)hasOverlap=true;else occ[rr*pC+cc]=i;}}
      if(!hasOverlap){
        var fr1=pR,fr2=-1,fc1=pC,fc2=-1,fc=0;
        for(var rr=0;rr<pR;rr++) for(var cc=0;cc<pC;cc++) if(occ[rr*pC+cc]<0){fc++;if(rr<fr1)fr1=rr;if(rr>fr2)fr2=rr;if(cc<fc1)fc1=cc;if(cc>fc2)fc2=cc;}
        if(fc>0){var rw=fc2-fc1+1,rh=fr2-fr1+1;if(rw*rh===fc){var found=null,multi=false;for(var i=0;i<pClues.length;i++){var cl=pClues[i];if(cl.r>=fr1&&cl.r<=fr2&&cl.c>=fc1&&cl.c<=fc2){if(found)multi=true;else found=cl;}}if(found&&!multi&&found.n===rw*rh){pRects.push({x:fc1,y:fr1,w:rw,h:rh});pDraw();}}}
      }
      var cm=new Int8Array(pR*pC).fill(-1);
      for(var i=0;i<pRects.length;i++){var r=pRects[i];for(var rr=r.y;rr<r.y+r.h;rr++) for(var cc=r.x;cc<r.x+r.w;cc++){if(cm[rr*pC+cc]>=0)return;cm[rr*pC+cc]=i;}}
      for(var k=0;k<pR*pC;k++) if(cm[k]<0)return;
      for(var i=0;i<pClues.length;i++){var cl=pClues[i],ok=false;for(var j=0;j<pRects.length;j++){var r=pRects[j];if(cl.c>=r.x&&cl.c<r.x+r.w&&cl.r>=r.y&&cl.r<r.y+r.h){if(r.w*r.h!==cl.n)return;ok=true;break;}}if(!ok)return;}
      pSolved=true;clearInterval(pTID);
      var sc=computeScore(pDiff,pElapsed);
      document.getElementById('score').textContent=sc.toLocaleString();
      var key=pR+'x'+pC;if(!pBest[key]||sc>pBest[key]){pBest[key]=sc;document.getElementById('best').textContent=sc.toLocaleString();}
      pMsg('Solved! Score: '+sc.toLocaleString(),'win');
    }
    function copyCode(){
      var v=document.getElementById('share-input').value;if(!v){pMsg('Generate a puzzle first.','err');return;}
      navigator.clipboard.writeText(v).then(function(){pMsg('Copied to clipboard!','');}).catch(function(){document.getElementById('share-input').select();document.execCommand('copy');pMsg('Copied to clipboard!','');});
    }
    function loadCode(){
      var raw=document.getElementById('share-input').value.trim();if(!raw){pMsg('Paste a code first.','err');return;}
      try{var parsed=parseCode(raw);if(parsed.clues.length<2)throw new Error();pR=parsed.rows;pC=parsed.cols;document.getElementById('rows-slider').value=pR;document.getElementById('cols-slider').value=pC;document.getElementById('rows-val').textContent=pR;document.getElementById('cols-val').textContent=pC;pSetSize();pReset();pApply(parsed.clues);}catch(e){pMsg('Invalid code.','err');}}

    // ══════════════════════════════════════════════════════════════════
    // EDITOR
    // ══════════════════════════════════════════════════════════════════
    var eR=6,eC=6,eCELL;
    var eClues=[],eSel=null,eTyping='';
    var eCV=document.getElementById('edit-canvas');
    var eCtx=eCV.getContext('2d');

    function onEditSlider(){
      eR=+document.getElementById('erows-slider').value;eC=+document.getElementById('ecols-slider').value;
      document.getElementById('erows-val').textContent=eR;document.getElementById('ecols-val').textContent=eC;
      eClues=[];eSel=null;eTyping='';eSetSize();eDraw();eValidate();
    }
    function eSetSize(){
      var sz=getWrapSize('edit-ui') - 32;
      eCELL=Math.floor(sz/Math.max(eR,eC));
      eCV.width=eC*eCELL;eCV.height=eR*eCELL;
    }
    function eDraw(){
      var dark=isDark();
      var gap=Math.max(1,Math.round(eCELL*0.04));
      var radius=Math.max(4,Math.round(eCELL*0.12));
      eCtx.clearRect(0,0,eCV.width,eCV.height);
      eCtx.fillStyle=dark?'#0f172a':'#ffffff';
      eCtx.fillRect(0,0,eCV.width,eCV.height);
      for(var row=0;row<eR;row++) for(var col=0;col<eC;col++){
        var isSel=eSel&&eSel.r===row&&eSel.c===col;
        eCtx.fillStyle=isSel?(dark?'rgba(129,140,248,0.2)':'rgba(79,70,229,0.1)'):(dark?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.02)');
        eCtx.beginPath();eCtx.roundRect(col*eCELL+gap,row*eCELL+gap,eCELL-gap*2,eCELL-gap*2,radius);eCtx.fill();
        eCtx.strokeStyle=isSel?(dark?'rgba(129,140,248,0.6)':'rgba(79,70,229,0.5)'):(dark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.03)');
        eCtx.lineWidth=1.5;
        eCtx.beginPath();eCtx.roundRect(col*eCELL+gap,row*eCELL+gap,eCELL-gap*2,eCELL-gap*2,radius);eCtx.stroke();
      }
      var sz=Math.max(12,Math.min(24,eCELL*0.44));
      eCtx.font='700 '+sz+'px "Plus Jakarta Sans",sans-serif';eCtx.textAlign='center';eCtx.textBaseline='middle';
      for(var i=0;i<eClues.length;i++){
        var cl=eClues[i];
        var isSel=eSel&&eSel.r===cl.r&&eSel.c===cl.c;
        var label=isSel&&eTyping!==''?eTyping:String(cl.n);
        eCtx.fillStyle=isSel?(dark?'#fff':'#111'):(dark?'#e2e8f0':'#1e293b');
        eCtx.fillText(label,cl.c*eCELL+eCELL/2,cl.r*eCELL+eCELL/2);
      }
      if(eSel&&eTyping){
        var hasClue=false;for(var i=0;i<eClues.length;i++) if(eClues[i].r===eSel.r&&eClues[i].c===eSel.c){hasClue=true;break;}
        if(!hasClue){eCtx.fillStyle=dark?'#fff':'#111';eCtx.fillText(eTyping,eSel.c*eCELL+eCELL/2,eSel.r*eCELL+eCELL/2);}
      }
    }
    function eCommit(){
      if(!eSel)return;
      var n=eTyping!==''?parseInt(eTyping,10):0;
      eClues=eClues.filter(function(cl){return!(cl.r===eSel.r&&cl.c===eSel.c);});
      if(n>0)eClues.push({r:eSel.r,c:eSel.c,n:n});
      eTyping='';
    }
    function eValidate(){
      var total=eR*eC,sum=0;
      for(var i=0;i<eClues.length;i++) sum+=eClues[i].n;
      var msgEl=document.getElementById('edit-msg');
      var playBtn=document.getElementById('play-btn');
      var shareInput=document.getElementById('edit-share');
      playBtn.style.display='none';shareInput.value='';
      
      if(eClues.length===0){
        msgEl.textContent='Click a cell and type a number';
        msgEl.className='msg min-h-[36px] flex items-center justify-center text-sm font-medium rounded-xl px-4 text-center bg-slate-50 dark:bg-slate-800/20 text-slate-500 dark:text-slate-400 border border-slate-100 dark:border-slate-800';
        return;
      }
      if(sum<total){
        msgEl.textContent='Sum: '+sum+' / '+total;
        msgEl.className='msg min-h-[36px] flex items-center justify-center text-sm font-medium rounded-xl px-4 text-center bg-indigo-50 dark:bg-indigo-950/20 text-indigo-600 dark:text-indigo-400 border border-indigo-100 dark:border-indigo-900/40';
        return;
      }
      if(sum>total){
        msgEl.textContent='Sum '+sum+' exceeds grid size '+total;
        msgEl.className='msg min-h-[36px] flex items-center justify-center text-sm font-semibold rounded-xl px-4 text-center bg-rose-50 dark:bg-rose-950/40 text-rose-600 dark:text-rose-400 border border-rose-100 dark:border-rose-900/50';
        return;
      }
      msgEl.textContent='Checking puzzle uniqueness…';
      msgEl.className='msg min-h-[36px] flex items-center justify-center text-sm font-medium rounded-xl px-4 text-center bg-slate-50 dark:bg-slate-800/20 text-slate-500';
      
      setTimeout(function(){
        var sols=solve(eR,eC,eClues,2);
        if(sols.length===0){
          msgEl.textContent='No solution exists';
          msgEl.className='msg min-h-[36px] flex items-center justify-center text-sm font-semibold rounded-xl px-4 text-center bg-rose-50 dark:bg-rose-950/40 text-rose-600 dark:text-rose-400 border border-rose-100 dark:border-rose-900/50';
        }
        else if(sols.length>1){
          msgEl.textContent='Multiple solutions — add more clues';
          msgEl.className='msg min-h-[36px] flex items-center justify-center text-sm font-semibold rounded-xl px-4 text-center bg-amber-50 dark:bg-amber-950/40 text-amber-600 dark:text-amber-400 border border-amber-100 dark:border-amber-900/50';
        }
        else{
          var d=computeDifficulty(eR,eC,eClues);
          msgEl.textContent='Unique solution · '+diffLabel(d)+' ('+d.toFixed(2)+')';
          msgEl.className='msg min-h-[36px] flex items-center justify-center text-sm font-semibold rounded-xl px-4 text-center bg-emerald-50 dark:bg-emerald-950/40 text-emerald-600 dark:text-emerald-400 border border-emerald-100 dark:border-emerald-900/50';
          playBtn.style.display='';
          shareInput.value=buildCode(eR,eC,eClues);
        }
      },10);
    }
    function editClear(){eClues=[];eSel=null;eTyping='';eDraw();eValidate();}
    function copyEditCode() {
      var v = document.getElementById('edit-share').value;
      if(!v) return;
      navigator.clipboard.writeText(v).then(function(){
        var msg = document.getElementById('edit-msg');
        msg.textContent = 'Copied constructor code!';
        msg.className = 'msg min-h-[36px] flex items-center justify-center text-sm font-semibold rounded-xl px-4 text-center bg-emerald-50 dark:bg-emerald-950/40 text-emerald-600 dark:text-emerald-400 border border-emerald-100';
      }).catch(function(){
        document.getElementById('edit-share').select();
        document.execCommand('copy');
      });
    }

    eCV.addEventListener('pointerdown',function(e){
      e.preventDefault();
      var rect=eCV.getBoundingClientRect(),sx=eCV.width/rect.width,sy=eCV.height/rect.height;
      var c=Math.floor((e.clientX-rect.left)*sx/eCELL),r=Math.floor((e.clientY-rect.top)*sy/eCELL);
      if(c<0||c>=eC||r<0||r>=eR)return;
      eCommit();eValidate();
      eSel={r:r,c:c};eTyping='';
      for(var i=0;i<eClues.length;i++) if(eClues[i].r===r&&eClues[i].c===c){eTyping=String(eClues[i].n);break;}
      eDraw();
    });
    document.addEventListener('pointerdown',function(e){
      if(document.getElementById('edit-ui').style.display==='none')return;
      if(!eSel)return;
      if(e.target!==eCV){eCommit();eValidate();eSel=null;eDraw();}
    });
    document.addEventListener('keydown',function(e){
      if(document.getElementById('edit-ui').style.display==='none')return;
      if(!eSel)return;
      if(e.key>='0'&&e.key<='9'){eTyping=(eTyping+e.key).slice(-3);eDraw();}
      else if(e.key==='Backspace'){eTyping=eTyping.slice(0,-1);if(eTyping==='')eClues=eClues.filter(function(cl){return!(cl.r===eSel.r&&cl.c===eSel.c);});eDraw();eValidate();}
      else if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();eCommit();eValidate();var nc=eSel.c+1,nr=eSel.r;if(nc>=eC){nc=0;nr++;}if(nr<eR){eSel={r:nr,c:nc};eTyping='';eDraw();}else{eSel=null;eDraw();}}
      else if(e.key==='Escape'){eTyping='';eSel=null;eDraw();}
      else if(e.key==='Delete'){eClues=eClues.filter(function(cl){return!(cl.r===eSel.r&&cl.c===eSel.c);});eTyping='';eDraw();eValidate();}
    });
    function playFromEditor(){pR=eR;pC=eC;document.getElementById('rows-slider').value=pR;document.getElementById('cols-slider').value=pC;document.getElementById('rows-val').textContent=pR;document.getElementById('cols-val').textContent=pC;switchTab('play');pSetSize();pReset();pApply(eClues.slice());}

    // ── Resizing ──────────────────────────────────────────────────────────────────
    window.addEventListener('resize', function() {
      if (document.getElementById('play-ui').style.display !== 'none') {
        pSetSize();
        pDraw();
      } else {
        eSetSize();
        eDraw();
      }
    });

    // ── Initial Setup ─────────────────────────────────────────────────────────────
    window.onload = function() {
      switchTab('play');
      newGame();
    }
  </script>
</body>
</html>
