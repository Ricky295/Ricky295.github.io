<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,sans-serif);background:transparent;color:var(--color-text-primary)}
#app{padding:.75rem .75rem 1rem;max-width:520px;margin:0 auto}
h1{font-size:22px;font-weight:500;letter-spacing:.04em;text-align:center;margin-bottom:.75rem}
.tabs{display:flex;margin-bottom:.85rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);overflow:hidden}
.tab{flex:1;padding:8px;background:transparent;border:none;cursor:pointer;font-size:13px;color:var(--color-text-secondary)}
.tab.active{background:var(--color-background-info);color:var(--color-text-info)}
.sliders{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.85rem}
.slider-group{display:flex;flex-direction:column;gap:4px}
.slider-label{font-size:11px;color:var(--color-text-secondary);display:flex;justify-content:space-between}
.slider-label span{color:var(--color-text-primary);font-weight:500}
input[type=range]{width:100%;accent-color:var(--color-text-info)}
.diff-row{display:flex;align-items:center;gap:12px;margin-bottom:.6rem}
.diff-val{font-size:20px;font-weight:500}
.diff-lbl{font-size:11px;color:var(--color-text-secondary)}
.gauge{flex:1;position:relative;height:22px}
.gauge-track{position:absolute;bottom:0;left:0;right:0;height:6px;border-radius:3px;background:linear-gradient(to right,#1D9E75,#EF9F27 50%,#E24B4A)}
.gauge-arrow{position:absolute;bottom:5px;font-size:13px;line-height:1;transform:translateX(-50%);transition:left .3s;user-select:none;color:var(--color-text-primary)}
.meta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem;font-size:13px;color:var(--color-text-secondary)}
.meta-row strong{color:var(--color-text-primary);font-weight:500}
.grid-wrap{display:flex;justify-content:center;margin-bottom:.65rem}
canvas{border:1px solid var(--color-border-primary);border-radius:4px;touch-action:none;max-width:100%}
.msg{text-align:center;font-size:13px;min-height:18px;margin-bottom:.5rem}
.msg.win{color:var(--color-text-success);font-weight:500}
.msg.err{color:var(--color-text-danger)}
.msg.info{color:var(--color-text-secondary)}
.btn-row{display:flex;gap:6px;margin-bottom:.5rem;position:relative}
.btn{flex:1;padding:9px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;font-size:13px;color:var(--color-text-primary)}
.btn:hover{background:var(--color-background-secondary)}
.btn.primary{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.share-row{display:flex;gap:6px;align-items:center}
.share-row input{flex:1;padding:6px 8px;font-size:12px;font-family:monospace;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);min-width:0}
.share-row button{padding:6px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;font-size:12px;color:var(--color-text-primary);white-space:nowrap}
.share-row button:hover{background:var(--color-background-secondary)}
/* dropdown */
.drop-wrap{position:relative;flex:1}
.drop-menu{display:none;position:absolute;bottom:calc(100% + 4px);left:0;right:0;background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);overflow:hidden;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.drop-menu.open{display:block}
.drop-item{display:block;width:100%;padding:9px 12px;background:transparent;border:none;cursor:pointer;font-size:13px;color:var(--color-text-primary);text-align:left}
.drop-item:hover{background:var(--color-background-secondary)}
.drop-item+.drop-item{border-top:0.5px solid var(--color-border-secondary)}
@media print{
  body{background:#fff!important;color:#000!important}
  #app{display:none}
  #print-area{display:block!important}
}
#print-area{display:none}
.print-page{page-break-after:always;padding:24px;font-family:sans-serif}
.print-page:last-child{page-break-after:avoid}
.print-title{font-size:18px;font-weight:600;margin-bottom:8px;text-align:center}
.print-sub{font-size:12px;color:#666;text-align:center;margin-bottom:16px}
</style>
</head>
<body>
<div id="app">
  <h1>SHIKAKU</h1>
  <div class="tabs">
    <button class="tab active" id="tab-play" onclick="switchTab('play')">Play</button>
    <button class="tab" id="tab-edit" onclick="switchTab('edit')">Constructor</button>
  </div>

  <div id="play-ui">
    <div class="sliders">
      <div class="slider-group">
        <div class="slider-label">Rows <span id="rows-val">6</span></div>
        <input type="range" id="rows-slider" min="5" max="12" value="6" oninput="onSlider()">
      </div>
      <div class="slider-group">
        <div class="slider-label">Cols <span id="cols-val">6</span></div>
        <input type="range" id="cols-slider" min="5" max="12" value="6" oninput="onSlider()">
      </div>
    </div>
    <div class="diff-row">
      <div>
        <div class="diff-val" id="diff-val">—</div>
        <div class="diff-lbl" id="diff-lbl">difficulty</div>
      </div>
      <div class="gauge">
        <div class="gauge-track"></div>
        <div class="gauge-arrow" id="gauge-arrow" style="left:0%">▼</div>
      </div>
    </div>
    <div class="meta-row">
      <span id="timer">0:00.00</span>
      <span>Score: <strong id="score">—</strong></span>
      <span>Best: <strong id="best">—</strong></span>
    </div>
    <div class="grid-wrap"><canvas id="play-canvas" style="cursor:crosshair"></canvas></div>
    <div class="msg" id="play-msg"></div>
    <div class="btn-row">
      <button class="btn" onclick="newGame()">New puzzle</button>
      <div class="drop-wrap">
        <button class="btn" onclick="toggleDrop()">Print ▾</button>
        <div class="drop-menu" id="drop-menu">
          <button class="drop-item" onclick="doPrint('puzzle')">Print puzzle</button>
          <button class="drop-item" onclick="doPrint('solution')">Print with solution</button>
          <button class="drop-item" onclick="doPrint('compact')">Print compact</button>
          <button class="drop-item" onclick="doPrint('bw-solution')">Print with BW solution</button>
          <button class="drop-item" onclick="doPrint('bw-compact')">Print compact BW</button>
        </div>
      </div>
    </div>
    <div class="share-row">
      <input type="text" id="share-input" placeholder="Paste code to load…" spellcheck="false">
      <button onclick="copyCode()">Copy</button>
      <button onclick="loadCode()">Load</button>
    </div>
  </div>

  <div id="edit-ui" style="display:none">
    <div class="sliders">
      <div class="slider-group">
        <div class="slider-label">Rows <span id="erows-val">6</span></div>
        <input type="range" id="erows-slider" min="5" max="12" value="6" oninput="onEditSlider()">
      </div>
      <div class="slider-group">
        <div class="slider-label">Cols <span id="ecols-val">6</span></div>
        <input type="range" id="ecols-slider" min="5" max="12" value="6" oninput="onEditSlider()">
      </div>
    </div>
    <div class="grid-wrap"><canvas id="edit-canvas" style="cursor:cell"></canvas></div>
    <div class="msg info" id="edit-msg">Click a cell and type a number</div>
    <div class="btn-row">
      <button class="btn" onclick="editClear()">Clear</button>
      <button class="btn primary" id="play-btn" style="display:none" onclick="playFromEditor()">▶ Play this puzzle</button>
    </div>
    <div class="share-row">
      <input type="text" id="edit-share" placeholder="Code appears when puzzle is valid…" spellcheck="false" readonly>
      <button onclick="copyEditCode()">Copy</button>
    </div>
  </div>
</div>

<div id="print-area"></div>

<script>
// ── RNG ───────────────────────────────────────────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed = (seed + 0x6D2B79F5) | 0;
    var t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ── Encoding ──────────────────────────────────────────────────────────────────
var B64 = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
function encodeSize(r,c){return B64[(r-5)*8+(c-5)];}
function decodeSize(ch){var v=B64.indexOf(ch);return{rows:Math.floor(v/8)+5,cols:v%8+5};}
function pad2(n){return n.toString(36).padStart(2,'0');}
function buildCode(rows,cols,clues){
  var s=encodeSize(rows,cols);
  for(var i=0;i<clues.length;i++) s+=pad2(clues[i].r*cols+clues[i].c)+pad2(clues[i].n);
  return s;
}
function parseCode(code){
  var sz=decodeSize(code[0]),rows=sz.rows,cols=sz.cols,clues=[];
  for(var i=1;i<code.length;i+=4){
    var idx=parseInt(code.slice(i,i+2),36);
    var n=parseInt(code.slice(i+2,i+4),36);
    clues.push({r:Math.floor(idx/cols),c:idx%cols,n:n});
  }
  return{rows:rows,cols:cols,clues:clues};
}

// ── Core ──────────────────────────────────────────────────────────────────────
function candidatesForClue(R,C,cl){
  var area=cl.n,res=[];
  for(var h=1;h<=R;h++){
    if(area%h!==0) continue;
    var w=area/h; if(w>C) continue;
    var y0=cl.r-h+1; if(y0<0)y0=0;
    for(var y=y0;y<=cl.r&&y+h<=R;y++){
      var x0=cl.c-w+1; if(x0<0)x0=0;
      for(var x=x0;x<=cl.c&&x+w<=C;x++) res.push({x:x,y:y,w:w,h:h});
    }
  }
  return res;
}
function computeDifficulty(R,C,cl){
  var d=1;
  for(var i=0;i<cl.length;i++) d*=Math.max(1,candidatesForClue(R,C,cl[i]).length);
  return Math.log10(Math.max(1,d));
}
function diffLabel(d){return d<10?'Easy':d<15?'Medium':'Hard';}
function diffColor(d){
  var t=Math.min(1,d/20);
  if(t<0.5){var u=t*2;return'rgb('+Math.round(29+u*157)+','+Math.round(158+u*5)+','+Math.round(117-u*78)+')';}
  var u=(t-0.5)*2;return'rgb('+Math.round(186+u*40)+','+Math.round(163-u*88)+','+Math.round(39+u*35)+')';
}
function computeScore(d,cs){return Math.round(d/Math.max(1/6000,cs/6000)*1000);}

function solve(R,C,clueList,limit){
  var occ=new Int8Array(R*C).fill(-1),sols=[],placed=[];
  for(var i=0;i<clueList.length;i++) placed.push(null);
  var pre=[];
  for(var i=0;i<clueList.length;i++) pre.push(candidatesForClue(R,C,clueList[i]));
  function bt(i){
    if(sols.length>=limit) return;
    if(i===clueList.length){
      var full=true;
      for(var k=0;k<occ.length;k++) if(occ[k]<0){full=false;break;}
      if(full){var s=[];for(var k=0;k<placed.length;k++) s.push({x:placed[k].x,y:placed[k].y,w:placed[k].w,h:placed[k].h});sols.push(s);}
      return;
    }
    for(var j=0;j<pre[i].length;j++){
      var rect=pre[i][j],ok=true;
      outer:for(var rr=rect.y;rr<rect.y+rect.h;rr++)
        for(var cc=rect.x;cc<rect.x+rect.w;cc++)
          if(occ[rr*C+cc]>=0){ok=false;break outer;}
      if(!ok) continue;
      for(var rr=rect.y;rr<rect.y+rect.h;rr++) for(var cc=rect.x;cc<rect.x+rect.w;cc++) occ[rr*C+cc]=i;
      placed[i]=rect; bt(i+1);
      for(var rr=rect.y;rr<rect.y+rect.h;rr++) for(var cc=rect.x;cc<rect.x+rect.w;cc++) occ[rr*C+cc]=-1;
      placed[i]=null;
      if(sols.length>=limit) return;
    }
  }
  bt(0); return sols;
}
function partitionGrid(R,C,rng){
  var grid=new Int8Array(R*C).fill(-1),rects=[],id=0;
  var minC=Math.max(4,Math.floor((R+C)/2)-1),maxC=R*2;
  for(var r=0;r<R;r++){
    for(var c=0;c<C;c++){
      if(grid[r*C+c]>=0) continue;
      var opts=[];
      for(var h=1;r+h<=R;h++){
        var cf=true;
        for(var rr=r;rr<r+h;rr++) if(grid[rr*C+c]>=0){cf=false;break;}
        if(!cf) break;
        for(var w=1;c+w<=C;w++){
          var area=h*w;
          if(area>Math.ceil(R*C*0.3)) break;
          var ok=true;
          outer2:for(var rr=r;rr<r+h;rr++) for(var cc=c;cc<c+w;cc++) if(grid[rr*C+cc]>=0){ok=false;break outer2;}
          if(ok) opts.push({x:c,y:r,w:w,h:h});
        }
      }
      if(!opts.length) return null;
      var pick=opts[Math.floor(rng()*Math.min(opts.length,8))];
      for(var rr=pick.y;rr<pick.y+pick.h;rr++) for(var cc=pick.x;cc<pick.x+pick.w;cc++) grid[rr*C+cc]=id;
      rects.push(pick); id++;
    }
  }
  if(rects.length<minC||rects.length>maxC) return null;
  return rects;
}
function pickClues(rects,rng){
  var res=[];
  for(var i=0;i<rects.length;i++){
    var r=rects[i];
    res.push({r:r.y+Math.floor(rng()*r.h),c:r.x+Math.floor(rng()*r.w),n:r.w*r.h});
  }
  return res;
}
function generatePuzzle(R,C,seed){
  for(var i=0;i<400;i++){
    var rng=mulberry32(seed+i*997);
    var p=partitionGrid(R,C,rng); if(!p) continue;
    var cl=pickClues(p,rng);
    if(solve(R,C,cl,2).length===1) return cl;
  }
  return null;
}

// ── Canvas rendering ──────────────────────────────────────────────────────────
var TL=['rgba(206,203,246,0.55)','rgba(159,225,203,0.55)','rgba(245,196,179,0.6)','rgba(244,192,209,0.55)','rgba(181,212,244,0.55)','rgba(250,199,117,0.5)','rgba(192,221,151,0.55)'];
var TD=['rgba(83,74,183,0.28)','rgba(15,110,86,0.28)','rgba(153,60,29,0.32)','rgba(153,53,86,0.28)','rgba(24,95,165,0.28)','rgba(133,79,11,0.32)','rgba(59,109,17,0.28)'];
var SL=['rgba(83,74,183,0.7)','rgba(15,110,86,0.7)','rgba(153,60,29,0.7)','rgba(153,53,86,0.7)','rgba(24,95,165,0.7)','rgba(133,79,11,0.7)','rgba(59,109,17,0.7)'];
var SD=['rgba(175,169,236,0.7)','rgba(93,202,165,0.7)','rgba(240,153,123,0.7)','rgba(237,147,177,0.7)','rgba(133,183,235,0.7)','rgba(239,159,39,0.7)','rgba(151,196,89,0.7)'];
var BW_FILLS=['rgba(0,0,0,0.06)','rgba(0,0,0,0.12)','rgba(0,0,0,0.18)','rgba(0,0,0,0.08)','rgba(0,0,0,0.14)','rgba(0,0,0,0.10)','rgba(0,0,0,0.16)'];

function isDark(){return window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;}
function getWrapSize(id){var el=document.getElementById(id);return Math.min(el?el.clientWidth||480:480,480);}

// Draw a complete puzzle onto any canvas context
// mode: 'play' (dark-aware, with userRects), 'print-puzzle', 'print-solution', 'print-bw-solution'
function renderPuzzle(ctx,R,C,CELL,clues,rects,mode,selR,selC,typing){
  var dark=(mode==='play')&&isDark();
  var gap=Math.max(2,Math.round(CELL*0.06));
  var radius=Math.max(2,Math.round(CELL*0.15));
  ctx.clearRect(0,0,C*CELL,R*CELL);
  ctx.fillStyle=dark?'#18181c':'#ffffff';
  ctx.fillRect(0,0,C*CELL,R*CELL);

  // draw cell backgrounds (rounded)
  for(var row=0;row<R;row++){
    for(var col=0;col<C;col++){
      var x=col*CELL+gap, y=row*CELL+gap, w=CELL-gap*2, h=CELL-gap*2;
      ctx.fillStyle=dark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.04)';
      ctx.beginPath(); ctx.roundRect(x,y,w,h,radius); ctx.fill();
    }
  }

  // draw rectangles
  var tints=(mode==='print-bw-solution')?BW_FILLS:(dark?TD:TL);
  var strks=(mode==='print-bw-solution')?BW_FILLS.map(function(){return'rgba(0,0,0,0.5)'}):(dark?SD:SL);
  if(rects&&(mode==='play'||mode==='print-solution'||mode==='print-bw-solution')){
    for(var i=0;i<rects.length;i++){
      var r=rects[i];
      var x=r.x*CELL+gap, y=r.y*CELL+gap, w=r.w*CELL-gap*2, h=r.h*CELL-gap*2;
      ctx.fillStyle=tints[i%tints.length];
      ctx.beginPath(); ctx.roundRect(x,y,w,h,radius); ctx.fill();
      ctx.strokeStyle=strks[i%strks.length]; ctx.lineWidth=2; ctx.setLineDash([]);
      ctx.beginPath(); ctx.roundRect(x+1,y+1,w-2,h-2,radius); ctx.stroke();
    }
  }

  // drag preview
  if(mode==='play'&&selR>=0&&selC>=0){
    // nothing extra needed here
  }

  // clue numbers
  if(!clues) return;
  var sz=Math.max(11,Math.min(22,CELL*0.48));
  ctx.font='600 '+sz+'px var(--font-sans,sans-serif)';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  for(var i=0;i<clues.length;i++){
    var cl=clues[i];
    var cx=cl.c*CELL+CELL/2, cy=cl.r*CELL+CELL/2;
    ctx.fillStyle=dark?'#d0cef5':'#3C3489';
    ctx.fillText(cl.n,cx,cy);
  }
}

// ── Print ─────────────────────────────────────────────────────────────────────
function makePrintCanvas(R,C,clues,rects,bw){
  var CELL=56, canv=document.createElement('canvas');
  canv.width=C*CELL; canv.height=R*CELL;
  var mode=rects?(bw?'print-bw-solution':'print-solution'):'print-puzzle';
  renderPuzzle(canv.getContext('2d'),R,C,CELL,clues,rects,mode,-1,-1,'');
  return canv.toDataURL('image/png');
}

function doPrint(type){
  closeDrop();
  if(!pClues){pMsg('No puzzle loaded.','err');return;}
  var solRects=null;
  if(type!=='puzzle'){
    var sols=solve(pR,pC,pClues,1);
    if(sols.length) solRects=sols[0];
  }
  var bw=(type==='bw-solution'||type==='bw-compact');
  var compact=(type==='compact'||type==='bw-compact');
  var pa=document.getElementById('print-area');
  pa.innerHTML='';

  if(type==='puzzle'){
    var img=makePrintCanvas(pR,pC,pClues,null,false);
    pa.innerHTML='<div class="print-page"><div class="print-title">SHIKAKU</div><div class="print-sub">'+pR+'×'+pC+' · '+diffLabel(pDiff)+' ('+pDiff.toFixed(2)+')</div><img src="'+img+'" style="max-width:100%;display:block;margin:0 auto"></div>';
  } else if(compact){
    var imgP=makePrintCanvas(pR,pC,pClues,null,false);
    var imgS=makePrintCanvas(pR,pC,pClues,solRects,bw);
    pa.innerHTML='<div class="print-page" style="page-break-after:avoid"><div class="print-title">SHIKAKU</div><div class="print-sub">'+pR+'×'+pC+' · '+diffLabel(pDiff)+' ('+pDiff.toFixed(2)+')</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start">'
      +'<div><div style="font-size:11px;text-align:center;margin-bottom:6px;color:#666">Puzzle</div><img src="'+imgP+'" style="width:100%"></div>'
      +'<div><div style="font-size:11px;text-align:center;margin-bottom:6px;color:#666">Solution</div><img src="'+imgS+'" style="width:100%"></div>'
      +'</div></div>';
  } else {
    var imgP=makePrintCanvas(pR,pC,pClues,null,false);
    var imgS=makePrintCanvas(pR,pC,pClues,solRects,bw);
    pa.innerHTML='<div class="print-page"><div class="print-title">SHIKAKU</div><div class="print-sub">'+pR+'×'+pC+' · '+diffLabel(pDiff)+' ('+pDiff.toFixed(2)+')</div><img src="'+imgP+'" style="max-width:100%;display:block;margin:0 auto"></div>'
      +'<div class="print-page"><div class="print-title">Solution</div><div class="print-sub"> </div><img src="'+imgS+'" style="max-width:100%;display:block;margin:0 auto"></div>';
  }
  setTimeout(function(){window.print();},100);
}

function toggleDrop(){
  var m=document.getElementById('drop-menu');
  m.classList.toggle('open');
}
function closeDrop(){document.getElementById('drop-menu').classList.remove('open');}
document.addEventListener('pointerdown',function(e){
  if(!e.target.closest('.drop-wrap')) closeDrop();
});

// ── Tab ───────────────────────────────────────────────────────────────────────
function switchTab(t){
  document.getElementById('play-ui').style.display=t==='play'?'':'none';
  document.getElementById('edit-ui').style.display=t==='edit'?'':'none';
  document.getElementById('tab-play').classList.toggle('active',t==='play');
  document.getElementById('tab-edit').classList.toggle('active',t==='edit');
  if(t==='edit'){eSetSize();eDraw();}
}

// ══════════════════════════════════════════════════════════════════
// PLAY
// ══════════════════════════════════════════════════════════════════
var pR=6,pC=6,pCELL,pClues=null,pRects=[];
var pDrag=false,pDS=null,pDC={c:0,r:0};
var pSolved=false,pTID=null,pElapsed=0,pDiff=0,pBest={};
var pCV=document.getElementById('play-canvas');
var pCtx=pCV.getContext('2d');

function onSlider(){
  document.getElementById('rows-val').textContent=document.getElementById('rows-slider').value;
  document.getElementById('cols-val').textContent=document.getElementById('cols-slider').value;
}
function pSetSize(){
  var sz=getWrapSize('play-ui');
  pCELL=Math.floor(sz/Math.max(pR,pC));
  pCV.width=pC*pCELL; pCV.height=pR*pCELL;
}
function pDraw(){
  var dark=isDark();
  var gap=Math.max(2,Math.round(pCELL*0.06));
  var radius=Math.max(2,Math.round(pCELL*0.15));
  pCtx.clearRect(0,0,pCV.width,pCV.height);
  pCtx.fillStyle=dark?'#18181c':'#ffffff';
  pCtx.fillRect(0,0,pCV.width,pCV.height);
  // cell backgrounds
  for(var row=0;row<pR;row++) for(var col=0;col<pC;col++){
    pCtx.fillStyle=dark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.04)';
    pCtx.beginPath(); pCtx.roundRect(col*pCELL+gap,row*pCELL+gap,pCELL-gap*2,pCELL-gap*2,radius); pCtx.fill();
  }
  // user rects
  var tints=dark?TD:TL, strks=dark?SD:SL;
  for(var i=0;i<pRects.length;i++){
    var r=pRects[i];
    var x=r.x*pCELL+gap,y=r.y*pCELL+gap,w=r.w*pCELL-gap*2,h=r.h*pCELL-gap*2;
    pCtx.fillStyle=tints[i%tints.length];
    pCtx.beginPath(); pCtx.roundRect(x,y,w,h,radius); pCtx.fill();
    pCtx.strokeStyle=strks[i%strks.length]; pCtx.lineWidth=2; pCtx.setLineDash([]);
    pCtx.beginPath(); pCtx.roundRect(x+1,y+1,w-2,h-2,radius); pCtx.stroke();
  }
  // drag preview
  if(pDrag&&pDS){
    var c1=Math.min(pDS.c,pDC.c),r1=Math.min(pDS.r,pDC.r),c2=Math.max(pDS.c,pDC.c),r2=Math.max(pDS.r,pDC.r);
    var x=c1*pCELL+gap,y=r1*pCELL+gap,w=(c2-c1+1)*pCELL-gap*2,h=(r2-r1+1)*pCELL-gap*2;
    pCtx.fillStyle=dark?'rgba(100,120,200,0.15)':'rgba(55,138,221,0.10)';
    pCtx.beginPath(); pCtx.roundRect(x,y,w,h,radius); pCtx.fill();
    pCtx.strokeStyle=dark?'rgba(175,190,255,0.6)':'rgba(55,138,221,0.7)';
    pCtx.lineWidth=1.5; pCtx.setLineDash([4,3]);
    pCtx.beginPath(); pCtx.roundRect(x+1,y+1,w-2,h-2,radius); pCtx.stroke(); pCtx.setLineDash([]);
  }
  // clues
  if(!pClues) return;
  var sz=Math.max(11,Math.min(22,pCELL*0.48));
  pCtx.font='600 '+sz+'px var(--font-sans,sans-serif)';
  pCtx.textAlign='center'; pCtx.textBaseline='middle';
  for(var i=0;i<pClues.length;i++){
    var cl=pClues[i];
    pCtx.fillStyle=dark?'#d0cef5':'#3C3489';
    pCtx.fillText(cl.n,cl.c*pCELL+pCELL/2,cl.r*pCELL+pCELL/2);
  }
}
function pReset(){
  clearInterval(pTID);pElapsed=0;pSolved=false;pClues=null;pDiff=0;pRects=[];pDrag=false;pDS=null;
  document.getElementById('score').textContent='—';
  document.getElementById('diff-val').textContent='—'; document.getElementById('diff-val').style.color='';
  document.getElementById('diff-lbl').textContent='generating…';
  document.getElementById('gauge-arrow').style.left='0%';
  pMsg(''); pUpdateTimer(); pDraw();
}
function pApply(cl){
  pClues=cl; pDiff=computeDifficulty(pR,pC,cl);
  var fmt=pDiff.toFixed(2);
  document.getElementById('diff-val').textContent=fmt; document.getElementById('diff-val').style.color=diffColor(pDiff);
  document.getElementById('diff-lbl').textContent=diffLabel(pDiff);
  document.getElementById('gauge-arrow').style.left=Math.min(100,pDiff/20*100)+'%';
  document.getElementById('share-input').value=buildCode(pR,pC,cl);
  pDraw();
  pTID=setInterval(function(){if(!pSolved){pElapsed++;pUpdateTimer();pUpdateScore();}},10);
}
function newGame(){
  pR=+document.getElementById('rows-slider').value;
  pC=+document.getElementById('cols-slider').value;
  pSetSize();pReset();
  var seed=Math.floor(Math.random()*0xFFFFFF);
  setTimeout(function(){
    var cl=generatePuzzle(pR,pC,seed);
    if(!cl){document.getElementById('diff-lbl').textContent='retrying…';setTimeout(newGame,50);return;}
    pApply(cl);
  },10);
}
function pUpdateTimer(){
  var m=Math.floor(pElapsed/6000),s=Math.floor((pElapsed%6000)/100),cs=pElapsed%100;
  document.getElementById('timer').textContent=m+':'+(s<10?'0':'')+s+'.'+(cs<10?'0':'')+cs;
}
function pUpdateScore(){
  if(!pDiff) return;
  document.getElementById('score').textContent=computeScore(pDiff,pElapsed).toLocaleString();
}
function pMsg(t,cls){var m=document.getElementById('play-msg');m.textContent=t;m.className='msg'+(cls?' '+cls:'');}
function pCellAt(px,py){
  var r=pCV.getBoundingClientRect(),sx=pCV.width/r.width,sy=pCV.height/r.height;
  return{c:Math.floor((px-r.left)*sx/pCELL),r:Math.floor((py-r.top)*sy/pCELL)};
}
pCV.addEventListener('pointerdown',function(e){
  if(!pClues)return;e.preventDefault();
  var p=pCellAt(e.clientX,e.clientY);if(p.c<0||p.c>=pC||p.r<0||p.r>=pR)return;
  pDrag=true;pDS={c:p.c,r:p.r};pDC={c:p.c,r:p.r};pCV.setPointerCapture(e.pointerId);pDraw();
});
pCV.addEventListener('pointermove',function(e){
  if(!pDrag)return;e.preventDefault();
  var p=pCellAt(e.clientX,e.clientY);
  pDC={c:Math.max(0,Math.min(pC-1,p.c)),r:Math.max(0,Math.min(pR-1,p.r))};pDraw();
});
pCV.addEventListener('pointerup',function(e){
  if(!pDrag)return;pDrag=false;
  var c1=Math.min(pDS.c,pDC.c),r1=Math.min(pDS.r,pDC.r),c2=Math.max(pDS.c,pDC.c),r2=Math.max(pDS.r,pDC.r);
  var nr={x:c1,y:r1,w:c2-c1+1,h:r2-r1+1};
  pRects=pRects.filter(function(r){for(var rr=nr.y;rr<nr.y+nr.h;rr++) for(var cc=nr.x;cc<nr.x+nr.w;cc++) if(cc>=r.x&&cc<r.x+r.w&&rr>=r.y&&rr<r.y+r.h)return false;return true;});
  pRects.push(nr);pDS=null;pDraw();pAutoCheck();
});
function pAutoCheck(){
  if(!pClues||pSolved)return;
  var occ=new Int8Array(pR*pC).fill(-1),hasOverlap=false;
  for(var i=0;i<pRects.length;i++){var r=pRects[i];for(var rr=r.y;rr<r.y+r.h;rr++) for(var cc=r.x;cc<r.x+r.w;cc++){if(occ[rr*pC+cc]>=0)hasOverlap=true;else occ[rr*pC+cc]=i;}}
  if(!hasOverlap){
    var fr1=pR,fr2=-1,fc1=pC,fc2=-1,fc=0;
    for(var rr=0;rr<pR;rr++) for(var cc=0;cc<pC;cc++) if(occ[rr*pC+cc]<0){fc++;if(rr<fr1)fr1=rr;if(rr>fr2)fr2=rr;if(cc<fc1)fc1=cc;if(cc>fc2)fc2=cc;}
    if(fc>0){var rw=fc2-fc1+1,rh=fr2-fr1+1;if(rw*rh===fc){var found=null,multi=false;for(var i=0;i<pClues.length;i++){var cl=pClues[i];if(cl.r>=fr1&&cl.r<=fr2&&cl.c>=fc1&&cl.c<=fc2){if(found)multi=true;else found=cl;}}if(found&&!multi&&found.n===rw*rh){pRects.push({x:fc1,y:fr1,w:rw,h:rh});pDraw();}}}
  }
  var cm=new Int8Array(pR*pC).fill(-1);
  for(var i=0;i<pRects.length;i++){var r=pRects[i];for(var rr=r.y;rr<r.y+r.h;rr++) for(var cc=r.x;cc<r.x+r.w;cc++){if(cm[rr*pC+cc]>=0)return;cm[rr*pC+cc]=i;}}
  for(var k=0;k<pR*pC;k++) if(cm[k]<0)return;
  for(var i=0;i<pClues.length;i++){var cl=pClues[i],ok=false;for(var j=0;j<pRects.length;j++){var r=pRects[j];if(cl.c>=r.x&&cl.c<r.x+r.w&&cl.r>=r.y&&cl.r<r.y+r.h){if(r.w*r.h!==cl.n)return;ok=true;break;}}if(!ok)return;}
  pSolved=true;clearInterval(pTID);
  var sc=computeScore(pDiff,pElapsed);
  document.getElementById('score').textContent=sc.toLocaleString();
  var key=pR+'x'+pC;if(!pBest[key]||sc>pBest[key]){pBest[key]=sc;document.getElementById('best').textContent=sc.toLocaleString();}
  pMsg('Solved! Score: '+sc.toLocaleString(),'win');
}
function copyCode(){
  var v=document.getElementById('share-input').value;if(!v){pMsg('Generate a puzzle first.','err');return;}
  navigator.clipboard.writeText(v).then(function(){pMsg('Copied!','');}).catch(function(){document.getElementById('share-input').select();document.execCommand('copy');pMsg('Copied!','');});
}
function loadCode(){
  var raw=document.getElementById('share-input').value.trim();if(!raw){pMsg('Paste a code first.','err');return;}
  try{var parsed=parseCode(raw);if(parsed.clues.length<2)throw new Error();pR=parsed.rows;pC=parsed.cols;document.getElementById('rows-slider').value=pR;document.getElementById('cols-slider').value=pC;document.getElementById('rows-val').textContent=pR;document.getElementById('cols-val').textContent=pC;pSetSize();pReset();pApply(parsed.clues);}catch(e){pMsg('Invalid code.','err');}
}

// ══════════════════════════════════════════════════════════════════
// EDITOR
// ══════════════════════════════════════════════════════════════════
var eR=6,eC=6,eCELL;
var eClues=[],eSel=null,eTyping='';
var eCV=document.getElementById('edit-canvas');
var eCtx=eCV.getContext('2d');

function onEditSlider(){
  eR=+document.getElementById('erows-slider').value;eC=+document.getElementById('ecols-slider').value;
  document.getElementById('erows-val').textContent=eR;document.getElementById('ecols-val').textContent=eC;
  eClues=[];eSel=null;eTyping='';eSetSize();eDraw();eValidate();
}
function eSetSize(){
  var sz=getWrapSize('edit-ui');
  eCELL=Math.floor(sz/Math.max(eR,eC));
  eCV.width=eC*eCELL;eCV.height=eR*eCELL;
}
function eDraw(){
  var dark=isDark();
  var gap=Math.max(2,Math.round(eCELL*0.06));
  var radius=Math.max(2,Math.round(eCELL*0.15));
  eCtx.clearRect(0,0,eCV.width,eCV.height);
  eCtx.fillStyle=dark?'#18181c':'#ffffff';
  eCtx.fillRect(0,0,eCV.width,eCV.height);
  for(var row=0;row<eR;row++) for(var col=0;col<eC;col++){
    var isSel=eSel&&eSel.r===row&&eSel.c===col;
    eCtx.fillStyle=isSel?(dark?'rgba(100,120,200,0.3)':'rgba(55,138,221,0.15)'):(dark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.04)');
    eCtx.beginPath();eCtx.roundRect(col*eCELL+gap,row*eCELL+gap,eCELL-gap*2,eCELL-gap*2,radius);eCtx.fill();
  }
  var sz=Math.max(11,Math.min(22,eCELL*0.48));
  eCtx.font='600 '+sz+'px var(--font-sans,sans-serif)';eCtx.textAlign='center';eCtx.textBaseline='middle';
  for(var i=0;i<eClues.length;i++){
    var cl=eClues[i];
    var isSel=eSel&&eSel.r===cl.r&&eSel.c===cl.c;
    var label=isSel&&eTyping!==''?eTyping:String(cl.n);
    eCtx.fillStyle=isSel?(dark?'#fff':'#111'):(dark?'#d0cef5':'#3C3489');
    eCtx.fillText(label,cl.c*eCELL+eCELL/2,cl.r*eCELL+eCELL/2);
  }
  if(eSel&&eTyping){
    var hasClue=false;for(var i=0;i<eClues.length;i++) if(eClues[i].r===eSel.r&&eClues[i].c===eSel.c){hasClue=true;break;}
    if(!hasClue){eCtx.fillStyle=dark?'#fff':'#111';eCtx.fillText(eTyping,eSel.c*eCELL+eCELL/2,eSel.r*eCELL+eCELL/2);}
  }
}
function eCommit(){
  if(!eSel)return;
  var n=eTyping!==''?parseInt(eTyping,10):0;
  eClues=eClues.filter(function(cl){return!(cl.r===eSel.r&&cl.c===eSel.c);});
  if(n>0)eClues.push({r:eSel.r,c:eSel.c,n:n});
  eTyping='';
}
function eValidate(){
  var total=eR*eC,sum=0;
  for(var i=0;i<eClues.length;i++) sum+=eClues[i].n;
  var msgEl=document.getElementById('edit-msg');
  var playBtn=document.getElementById('play-btn');
  var shareInput=document.getElementById('edit-share');
  playBtn.style.display='none';shareInput.value='';
  if(eClues.length===0){msgEl.textContent='Click a cell and type a number';msgEl.className='msg info';return;}
  if(sum<total){msgEl.textContent='Sum: '+sum+' / '+total;msgEl.className='msg info';return;}
  if(sum>total){msgEl.textContent='Sum '+sum+' exceeds grid size '+total;msgEl.className='msg err';return;}
  msgEl.textContent='Checking…';msgEl.className='msg info';
  setTimeout(function(){
    var sols=solve(eR,eC,eClues,2);
    if(sols.length===0){msgEl.textContent='No solution exists';msgEl.className='msg err';}
    else if(sols.length>1){msgEl.textContent='Multiple solutions — add more clues';msgEl.className='msg err';}
    else{var d=computeDifficulty(eR,eC,eClues);msgEl.textContent='Unique solution · '+diffLabel(d)+' ('+d.toFixed(2)+')';msgEl.className='msg win';playBtn.style.display='';shareInput.value=buildCode(eR,eC,eClues);}
  },10);
}
function editClear(){eClues=[];eSel=null;eTyping='';eDraw();eValidate();}

eCV.addEventListener('pointerdown',function(e){
  e.preventDefault();
  var rect=eCV.getBoundingClientRect(),sx=eCV.width/rect.width,sy=eCV.height/rect.height;
  var c=Math.floor((e.clientX-rect.left)*sx/eCELL),r=Math.floor((e.clientY-rect.top)*sy/eCELL);
  if(c<0||c>=eC||r<0||r>=eR)return;
  eCommit();eValidate();
  eSel={r:r,c:c};eTyping='';
  for(var i=0;i<eClues.length;i++) if(eClues[i].r===r&&eClues[i].c===c){eTyping=String(eClues[i].n);break;}
  eDraw();
});
document.addEventListener('pointerdown',function(e){
  if(document.getElementById('edit-ui').style.display==='none')return;
  if(!eSel)return;
  if(e.target!==eCV){eCommit();eValidate();eSel=null;eDraw();}
});
document.addEventListener('keydown',function(e){
  if(document.getElementById('edit-ui').style.display==='none')return;
  if(!eSel)return;
  if(e.key>='0'&&e.key<='9'){eTyping=(eTyping+e.key).slice(-3);eDraw();}
  else if(e.key==='Backspace'){eTyping=eTyping.slice(0,-1);if(eTyping==='')eClues=eClues.filter(function(cl){return!(cl.r===eSel.r&&cl.c===eSel.c);});eDraw();eValidate();}
  else if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();eCommit();eValidate();var nc=eSel.c+1,nr=eSel.r;if(nc>=eC){nc=0;nr++;}if(nr<eR){eSel={r:nr,c:nc};eTyping='';eDraw();}else{eSel=null;eDraw();}}
  else if(e.key==='Escape'){eTyping='';eSel=null;eDraw();}
  else if(e.key==='Delete'){eClues=eClues.filter(function(cl){return!(cl.r===eSel.r&&cl.c===eSel.c);});eTyping='';eDraw();eValidate();}
});
function playFromEditor(){pR=eR;pC=eC;document.getElementById('rows-slider').value=pR;document.getElementById('cols-slider').value=pC;document.getElementById('rows-val').textContent=pR;document.getElementById('cols-val').textContent=pC;switchTab('play');pSetSize();pReset();pApply(eClues.slice());}
function copyEditCode(){var v=document.getElementById('edit-share').value;if(!v)return;navigator.clipboard.writeText(v).then(function(){document.getElementById('edit-msg').textContent+=' · Copied!';}).catch(function(){document.getElementById('edit-share').select();document.execCommand('copy');});}

window.addEventListener('resize',function(){pSetSize();pDraw();eSetSize();eDraw();});
eSetSize();eDraw();pSetSize();newGame();
</script>
