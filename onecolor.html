<!DOCTYPE html>
<html color="lightblue">
<head>
    <title>Dynamic Background</title>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.body.style.backgroundColor = document.documentElement.getAttribute('color');
        });
    </script>
</head>
<body style="margin:0; height:100vh;">
    <p></p>
</body>
</html>
