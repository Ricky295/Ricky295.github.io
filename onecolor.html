<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Background</title>
    <style>
        body {
            background-color: attr(data-color);
            color: attr(data-color);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }
        .message {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="message">oh hello there lol</div>
    <script>
        // Fallback for browsers not supporting attr() in CSS
        const color = document.documentElement.getAttribute('color');
        if(color) {
            document.body.style.backgroundColor = color;
            document.body.style.color = color;
        }
    </script>
</body>
</html>
