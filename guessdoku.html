
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guessdoku</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00ff88;
            --primary-glow: rgba(0, 255, 136, 0.4);
            --primary-shadow: 0 0 8px rgba(0, 255, 136, 0.4);
            --bg-dark: #0f0f1e;
            --bg-light: #1a1a2e;
            --bg-cell: #16213e;
            --error: #ff0055;
            --border: #333;
            --text: #fff;
        }

        body.theme-sunset {
            --primary: #ff6b35;
            --primary-glow: rgba(255, 107, 53, 0.4);
            --primary-shadow: 0 0 8px rgba(255, 107, 53, 0.4);
            --bg-dark: #1a0f0f;
            --bg-light: #2e1810;
            --bg-cell: #3d2817;
            --error: #00d9ff;
            --border: #4a2820;
        }

        body.theme-ocean {
            --primary: #00d9ff;
            --primary-glow: rgba(0, 217, 255, 0.4);
            --primary-shadow: 0 0 8px rgba(0, 217, 255, 0.4);
            --bg-dark: #0a1628;
            --bg-light: #0f1f3c;
            --bg-cell: #132a52;
            --error: #ff006e;
            --border: #1a3a6b;
        }

        body.theme-cyberpunk {
            --primary: #ff00ff;
            --primary-glow: rgba(255, 0, 255, 0.4);
            --primary-shadow: 0 0 8px rgba(255, 0, 255, 0.4);
            --bg-dark: #0d0020;
            --bg-light: #1a003c;
            --bg-cell: #2a0052;
            --error: #00ff00;
            --border: #3a0066;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text);
            transition: all 0.3s ease;
        }

        .container {
            background: var(--bg-light);
            border: 2px solid var(--primary);
            border-radius: 0;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary);
            font-size: 2.2em;
            text-shadow: var(--primary-shadow);
            letter-spacing: 3px;
            flex: 1;
        }

        .theme-switcher {
            display: flex;
            gap: 5px;
        }

        .theme-btn {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            background: var(--bg-cell);
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 2px;
        }

        .theme-btn:hover {
            border-color: var(--primary);
        }

        .theme-btn.active {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .theme-neon { background: linear-gradient(135deg, #00ff88, #00ff88); }
        .theme-sunset { background: linear-gradient(135deg, #ff6b35, #ff6b35); }
        .theme-ocean { background: linear-gradient(135deg, #00d9ff, #00d9ff); }
        .theme-cyberpunk { background: linear-gradient(135deg, #ff00ff, #ff00ff); }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9em;
            letter-spacing: 1px;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .mode-btn {
            padding: 10px 20px;
            border: 2px solid var(--border);
            background: var(--bg-cell);
            color: var(--text);
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .mode-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .mode-btn.active {
            background: var(--primary);
            color: var(--bg-dark);
            border-color: var(--primary);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 15px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.75em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--primary);
            text-shadow: var(--primary-shadow);
        }

        .grid-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            overflow-x: auto;
        }

        table {
            border-collapse: collapse;
            background: var(--bg-dark);
        }

        td {
            border: 1px solid var(--border);
            text-align: center;
            font-weight: 700;
            color: var(--primary);
            cursor: pointer;
            background: var(--bg-cell);
            transition: all 0.1s ease;
            font-family: 'Space Mono', monospace;
            padding: 0;
        }

        /* Size-responsive cell sizing */
        .size-6 td { width: 55px; height: 55px; font-size: 1.4em; }
        .size-9 td { width: 55px; height: 55px; font-size: 1.4em; }
        .size-12 td { width: 45px; height: 45px; font-size: 1.1em; }

        td:hover {
            background: var(--bg-cell);
            border-color: var(--primary);
            filter: brightness(1.2);
        }

        td.selected {
            background: var(--primary);
            color: var(--bg-dark);
            border-color: var(--primary);
        }

        td.error {
            background: #3a0f0f;
            color: var(--error);
            border-color: var(--error);
        }

        /* 3x3 / 2x2 / 3x4 box borders */
        .size-6 td:nth-child(3n) { border-right: 2px solid var(--primary); }
        .size-6 tr:nth-child(2n) td { border-bottom: 2px solid var(--primary); }
        .size-6 td:nth-child(6n) { border-right: 1px solid var(--border); }
        .size-6 tr:last-child td { border-bottom: 1px solid var(--border); }

        .size-9 td:nth-child(3n) { border-right: 2px solid var(--primary); }
        .size-9 tr:nth-child(3n) td { border-bottom: 2px solid var(--primary); }
        .size-9 td:nth-child(9n) { border-right: 1px solid var(--border); }
        .size-9 tr:last-child td { border-bottom: 1px solid var(--border); }

        .size-12 td:nth-child(3n) { border-right: 2px solid var(--primary); }
        .size-12 tr:nth-child(4n) td { border-bottom: 2px solid var(--primary); }
        .size-12 td:nth-child(12n) { border-right: 1px solid var(--border); }
        .size-12 tr:last-child td { border-bottom: 1px solid var(--border); }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 120px;
            padding: 12px;
            border: 2px solid var(--primary);
            background: var(--bg-cell);
            color: var(--primary);
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            font-size: 0.85em;
        }

        .btn:hover {
            background: var(--primary);
            color: var(--bg-dark);
        }

        .message {
            text-align: center;
            padding: 15px;
            margin-top: 20px;
            font-weight: 700;
            display: none;
            letter-spacing: 1px;
            border: 2px solid;
            text-transform: uppercase;
        }

        .message.success {
            background: #0f3a2a;
            color: var(--primary);
            border-color: var(--primary);
            text-shadow: var(--primary-shadow);
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
            gap: 5px;
            margin-bottom: 20px;
        }

        .key-btn {
            padding: 10px;
            border: 2px solid var(--border);
            background: var(--bg-cell);
            color: var(--text);
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            transition: all 0.1s ease;
            font-size: 0.9em;
        }

        .key-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.6em;
            }

            .mode-selector {
                gap: 5px;
            }

            .mode-btn {
                padding: 8px 12px;
                font-size: 0.8em;
            }

            .header {
                flex-direction: column;
                gap: 10px;
            }

            .theme-switcher {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body class="theme-neon">
    <div class="container">
        <div class="header">
            <h1>GUESSDOKU</h1>
            <div class="theme-switcher">
                <button class="theme-btn theme-neon active" data-theme="neon" title="Neon"></button>
                <button class="theme-btn theme-sunset" data-theme="sunset" title="Sunset"></button>
                <button class="theme-btn theme-ocean" data-theme="ocean" title="Ocean"></button>
                <button class="theme-btn theme-cyberpunk" data-theme="cyberpunk" title="Cyberpunk"></button>
            </div>
        </div>
        <p class="subtitle">// NO HINTS. PURE LOGIC.</p>

        <div class="mode-selector">
            <button class="mode-btn active" data-size="6">6×6</button>
            <button class="mode-btn" data-size="9">9×9</button>
            <button class="mode-btn" data-size="12">12×12</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Filled</div>
                <div class="stat-value"><span id="filled">0</span>/<span id="total">36</span></div>
            </div>
            <div class="stat">
                <div class="stat-label">Time</div>
                <div class="stat-value"><span id="time">0:00</span></div>
            </div>
            <div class="stat">
                <div class="stat-label">Score (Mistakes)</div>
                <div class="stat-value"><span id="mistakes">0</span></div>
            </div>
        </div>

        <div class="keypad" id="keypad"></div>

        <div class="grid-wrapper">
            <table id="grid"></table>
        </div>

        <div class="controls">
            <button class="btn" id="clearBtn">Clear Cell</button>
            <button class="btn" id="restartBtn">New Game</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        let grid = [];
        let solution = [];
        let selectedCell = null;
        let mistakes = 0;
        let bestScore = Infinity;
        let startTime = Date.now();
        let timerInterval = null;
        let currentSize = 6;

        const themes = {
            neon: { name: 'Neon' },
            sunset: { name: 'Sunset' },
            ocean: { name: 'Ocean' },
            cyberpunk: { name: 'Cyberpunk' }
        };

        function getSudokuConfig(size) {
            if (size === 6) return { rows: 6, cols: 6, boxRows: 2, boxCols: 3 };
            if (size === 9) return { rows: 9, cols: 9, boxRows: 3, boxCols: 3 };
            if (size === 12) return { rows: 12, cols: 12, boxRows: 3, boxCols: 4 };
        }

        function initGame(size) {
            currentSize = size;
            const config = getSudokuConfig(size);
            grid = Array(config.rows).fill(null).map(() => Array(config.cols).fill(0));
            solution = Array(config.rows).fill(null).map(() => Array(config.cols).fill(0));
            mistakes = 0;
            startTime = Date.now();
            selectedCell = null;
            document.getElementById('mistakes').textContent = '0';
            document.getElementById('filled').textContent = '0';
            document.getElementById('total').textContent = config.rows * config.cols;
            document.getElementById('message').style.display = 'none';

            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 100);

            generateSudoku(size);
            renderGrid(size);
            renderKeypad(size);
        }

        function generateSudoku(size) {
            const config = getSudokuConfig(size);
            solution = Array(config.rows).fill(null).map(() => Array(config.cols).fill(0));
            
            // Fill initial diagonal boxes
            for (let box = 0; box < Math.min(config.rows / config.boxRows, config.cols / config.boxCols); box++) {
                const startRow = box * config.boxRows;
                const startCol = box * config.boxCols;
                let nums = shuffle(Array.from({length: size}, (_, i) => i + 1));
                let idx = 0;
                
                for (let i = startRow; i < startRow + config.boxRows && i < config.rows; i++) {
                    for (let j = startCol; j < startCol + config.boxCols && j < config.cols; j++) {
                        solution[i][j] = nums[idx++];
                    }
                }
            }
            
            solveSudoku(solution, size);
        }

        function solveSudoku(board, size) {
            const config = getSudokuConfig(size);
            
            for (let row = 0; row < config.rows; row++) {
                for (let col = 0; col < config.cols; col++) {
                    if (board[row][col] === 0) {
                        let nums = shuffle(Array.from({length: size}, (_, i) => i + 1));
                        for (let num of nums) {
                            if (isValidMove(board, row, col, num, size)) {
                                board[row][col] = num;
                                if (solveSudoku(board, size)) return true;
                                board[row][col] = 0;
                            }
                        }
                        return false;
                    }
                }
            }
            return true;
        }

        function isValidMove(board, row, col, num, size) {
            const config = getSudokuConfig(size);
            
            // Check row
            for (let j = 0; j < config.cols; j++) {
                if (j !== col && board[row][j] === num) return false;
            }
            
            // Check column
            for (let i = 0; i < config.rows; i++) {
                if (i !== row && board[i][col] === num) return false;
            }
            
            // Check box
            const boxRow = Math.floor(row / config.boxRows) * config.boxRows;
            const boxCol = Math.floor(col / config.boxCols) * config.boxCols;
            for (let i = boxRow; i < boxRow + config.boxRows; i++) {
                for (let j = boxCol; j < boxCol + config.boxCols; j++) {
                    if ((i !== row || j !== col) && board[i][j] === num) return false;
                }
            }
            
            return true;
        }

        function shuffle(arr) {
            return arr.sort(() => Math.random() - 0.5);
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('time').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        function renderGrid(size) {
            const config = getSudokuConfig(size);
            const table = document.getElementById('grid');
            table.innerHTML = '';
            table.className = `size-${size}`;
            let filled = 0;

            for (let i = 0; i < config.rows; i++) {
                const row = document.createElement('tr');
                for (let j = 0; j < config.cols; j++) {
                    const cell = document.createElement('td');
                    cell.textContent = grid[i][j] || '';
                    cell.dataset.row = i;
                    cell.dataset.col = j;

                    if (grid[i][j] !== 0) filled++;

                    if (grid[i][j] !== 0 && grid[i][j] !== solution[i][j]) {
                        cell.classList.add('error');
                    }

                    cell.addEventListener('click', () => selectCell(i, j, cell));
                    row.appendChild(cell);
                }
                table.appendChild(row);
            }
            document.getElementById('filled').textContent = filled;
        }

        function renderKeypad(size) {
            const keypad = document.getElementById('keypad');
            keypad.innerHTML = '';
            keypad.style.gridTemplateColumns = `repeat(${size}, minmax(40px, 1fr))`;

            for (let i = 1; i <= size; i++) {
                const btn = document.createElement('button');
                btn.className = 'key-btn';
                btn.textContent = i > 9 ? String.fromCharCode(64 + i) : i;
                btn.addEventListener('click', () => enterNumber(i));
                keypad.appendChild(btn);
            }

            const clearBtn = document.createElement('button');
            clearBtn.className = 'key-btn';
            clearBtn.textContent = '✕';
            clearBtn.style.gridColumn = `span ${size}`;
            clearBtn.addEventListener('click', () => clearCell());
            keypad.appendChild(clearBtn);
        }

        function selectCell(row, col, cellEl) {
            if (selectedCell) {
                selectedCell.classList.remove('selected');
            }
            selectedCell = cellEl;
            cellEl.classList.add('selected');
        }

        function enterNumber(num) {
            if (!selectedCell) return;
            const row = parseInt(selectedCell.dataset.row);
            const col = parseInt(selectedCell.dataset.col);
            grid[row][col] = num;

            if (num !== solution[row][col]) {
                mistakes++;
                document.getElementById('mistakes').textContent = mistakes;
            }

            renderGrid(currentSize);
            selectCell(row, col, document.querySelector(`[data-row="${row}"][data-col="${col}"]`));
            checkWin();
        }

        function clearCell() {
            if (!selectedCell) return;
            const row = parseInt(selectedCell.dataset.row);
            const col = parseInt(selectedCell.dataset.col);
            grid[row][col] = 0;
            renderGrid(currentSize);
            selectCell(row, col, document.querySelector(`[data-row="${row}"][data-col="${col}"]`));
        }

        document.addEventListener('keydown', (e) => {
            if (!selectedCell) return;
            const row = parseInt(selectedCell.dataset.row);
            const col = parseInt(selectedCell.dataset.col);

            if (e.key >= '1' && e.key <= '9') {
                enterNumber(parseInt(e.key));
            } else if (e.key === 'a' || e.key === 'A') {
                enterNumber(10);
            } else if (e.key === 'b' || e.key === 'B') {
                enterNumber(11);
            } else if (e.key === 'c' || e.key === 'C') {
                enterNumber(12);
            } else if (e.key === '0' || e.key === 'Backspace' || e.key === 'Delete') {
                clearCell();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                if (col < currentSize - 1) selectCell(row, col + 1, document.querySelector(`[data-row="${row}"][data-col="${col + 1}"]`));
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                if (col > 0) selectCell(row, col - 1, document.querySelector(`[data-row="${row}"][data-col="${col - 1}"]`));
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (row < currentSize - 1) selectCell(row + 1, col, document.querySelector(`[data-row="${row + 1}"][data-col="${col}"]`));
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (row > 0) selectCell(row - 1, col, document.querySelector(`[data-row="${row - 1}"][data-col="${col}"]`));
            }
        });

        function checkWin() {
            const config = getSudokuConfig(currentSize);
            for (let i = 0; i < config.rows; i++) {
                for (let j = 0; j < config.cols; j++) {
                    if (grid[i][j] === 0) return;
                }
            }

            if (JSON.stringify(grid) === JSON.stringify(solution)) {
                clearInterval(timerInterval);
                bestScore = Math.min(bestScore, mistakes);
                const msg = document.getElementById('message');
                msg.textContent = `> SUCCESS! Score: ${mistakes} (Best: ${bestScore})`;
                msg.className = 'message success';
                msg.style.display = 'block';
            }
        }

        // Theme switching
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.body.className = `theme-${btn.dataset.theme}`;
            });
        });

        // Mode switching
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                initGame(parseInt(btn.dataset.size));
            });
        });

        // Control buttons
        document.getElementById('clearBtn').addEventListener('click', clearCell);
        document.getElementById('restartBtn').addEventListener('click', () => initGame(currentSize));

        // Start game
        initGame(6);
    </script>
</body>
</html>
